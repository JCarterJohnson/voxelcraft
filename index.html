  // outline ONLY the face the player is looking at (using the raycast normal),
  // not the whole cube wireframe
  _drawSelection(ctx, game) {
    const t = game.target, vp = game.vp, W = this.W, H = this.H;
    const corners = this._faceCorners(t.x, t.y, t.z, t.nx, t.ny, t.nz);
    const pts = corners.map(p => projectPoint(vp, p[0], p[1], p[2], W, H));
    if (pts.some(p => !p)) return;                  // any corner behind camera -> skip
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
    ctx.closePath();
    ctx.fillStyle = 'rgba(255,255,255,0.10)'; ctx.fill();          // faint highlight
    ctx.strokeStyle = 'rgba(0,0,0,0.7)'; ctx.lineWidth = 2.5; ctx.stroke();
  }
  // the 4 world-space corners of the block face whose outward normal is (nx,ny,nz)
  _faceCorners(x, y, z, nx, ny, nz) {
    if (nx !== 0) { const fx = x + (nx > 0 ? 1 : 0); return [[fx, y, z], [fx, y + 1, z], [fx, y + 1, z + 1], [fx, y, z + 1]]; }
    if (ny !== 0) { const fy = y + (ny > 0 ? 1 : 0); return [[x, fy, z], [x + 1, fy, z], [x + 1, fy, z + 1], [x, fy, z + 1]]; }
    const fz = z + (nz > 0 ? 1 : 0); return [[x, y, fz], [x + 1, y, fz], [x + 1, y + 1, fz], [x, y + 1, fz]];
  }

  // ---- minimap: sample biome/height around the player, cache it --------
  updateMinimap(game, dt) {
    this._miniTimer += dt;
    if (this._miniTimer < 0.4) return;
    this._miniTimer = 0;
    const ctx = this.miniCtx, S = 128, samples = 64, step = S / samples;
    const world = game.world, p = game.player;
    const span = 96;                                   // world blocks shown across the map
    for (let j = 0; j < samples; j++) {
      for (let i = 0; i < samples; i++) {
        const wx = Math.floor(p.pos.x + (i / samples - 0.5) * span);
        const wz = Math.floor(p.pos.z + (j / samples - 0.5) * span);
        const h = world.heightAt(wx, wz);
        let col;
        if (h < SEA_LEVEL - 1) {
          // water: deeper = darker blue (clear contrast vs land)
          const dd = clamp((SEA_LEVEL - h) / 24, 0, 1);
          col = mixRGB([70, 120, 200], [20, 40, 110], dd);
        } else {
          const biome = world.biomeAtH(wx, wz, h);   // reuse h (no redundant heightAt)
          col = BIOME_COLOR[biome].slice();
          // a tree/forest speckle so forests read distinctly from plains
          if ((biome === BIOME.FOREST || biome === BIOME.PLAINS) && world.hash2(wx, wz, 21) > 0.86)
            col = [42, 84, 38];
          // hill-shade by north-south slope so terrain has relief, not flat green
          const slope = world.heightAt(wx, wz - 1) - h;
          const lite = clamp(1 + slope * 0.12 + (h - SEA_LEVEL) / 70, 0.55, 1.4);
          col = [col[0] * lite, col[1] * lite, col[2] * lite];
        }
        ctx.fillStyle = rgbStr(col);
        ctx.fillRect(i * step, j * step, step + 1, step + 1);
      }
    }
  }
  _drawMiniPlayer(ctx, x, y, S, p) {
    const cx = x + S / 2, cy = y + S / 2;
    ctx.fillStyle = '#fff'; ctx.strokeStyle = '#000'; ctx.lineWidth = 1;
    // triangle pointing in the player's facing direction
    const a = p.yaw;
    ctx.save(); ctx.translate(cx, cy); ctx.rotate(a);
    ctx.beginPath(); ctx.moveTo(0, -6); ctx.lineTo(4, 5); ctx.lineTo(-4, 5); ctx.closePath();
    ctx.fill(); ctx.stroke(); ctx.restore();
  }

  tick(dt) {
    if (this._toastTimer > 0) {
      this._toastTimer -= dt;
      if (this._toastTimer <= 0) this.toastEl.style.opacity = '0';
    }
  }

  /* ---------------- TITLE SCREEN ANIMATION ---------------------------
     A parallax landscape silhouette + a slowly rotating textured cube. */
  startMenuAnimation() {
    const bg = document.getElementById('menuBg');
    const bx = bg.getContext('2d');
    const logo = document.getElementById('logoCube');
    const lx = logo.getContext('2d');
    this.stopMenuAnimation();                                   // cancel any prior loop first
    bg.style.display = 'block'; logo.style.display = 'block';   // then show menu visuals
    const noise = new Noise(((Math.random() * 1e9) | 0) || 7);
    // pre-bake three hill layers at different depths
    const layers = [
      { col: '#1d2b3a', amp: 60, base: 0.62, freq: 0.004, speed: 6 },
      { col: '#26405a', amp: 90, base: 0.74, freq: 0.006, speed: 12 },
      { col: '#34597a', amp: 130, base: 0.9, freq: 0.009, speed: 22 },
    ];
    let t0 = performance.now();
    const loop = () => {
      const now = performance.now(), time = (now - t0) / 1000;
      bg.width = window.innerWidth; bg.height = window.innerHeight;
      const W = bg.width, Hh = bg.height;
      // sky gradient
      const g = bx.createLinearGradient(0, 0, 0, Hh);
      g.addColorStop(0, '#0b1430'); g.addColorStop(0.5, '#22406e'); g.addColorStop(1, '#e08a4a');
      bx.fillStyle = g; bx.fillRect(0, 0, W, Hh);
      // sun glow low on the horizon
      bx.save(); bx.globalAlpha = 0.8; bx.fillStyle = '#ffd27a';
      bx.beginPath(); bx.arc(W * 0.5, Hh * 0.86, 70, 0, 7); bx.fill(); bx.restore();
      // parallax hills
      for (const L of layers) {
        bx.fillStyle = L.col; bx.beginPath(); bx.moveTo(0, Hh);
        for (let x = 0; x <= W; x += 4) {
          const wx = x + time * L.speed;
          const y = Hh * L.base - noise.fbm2(wx * L.freq, 10, 3) * L.amp;
          bx.lineTo(x, y);
        }
        bx.lineTo(W, Hh); bx.closePath(); bx.fill();
      }
      this._drawLogoCube(lx, logo.width, logo.height, time);
      this._menuRAF = requestAnimationFrame(loop);
    };
    loop();
  }
  stopMenuAnimation() {
    if (this._menuRAF) cancelAnimationFrame(this._menuRAF);
    this._menuRAF = null;
    // hide the menu-only canvases so they don't cover the game
    document.getElementById('menuBg').style.display = 'none';
    document.getElementById('logoCube').style.display = 'none';
  }

  // a rotating cube textured with real block tiles (software-projected)
  _drawLogoCube(ctx, W, H, time) {
    ctx.clearRect(0, 0, W, H);
    const ay = time * 0.7, ax = -0.5;
    const cosY = Math.cos(ay), sinY = Math.sin(ay), cosX = Math.cos(ax), sinX = Math.sin(ax);
    const verts = [];
    for (let i = 0; i < 8; i++) {
      let x = (i & 1) ? 1 : -1, y = (i & 2) ? 1 : -1, z = (i & 4) ? 1 : -1;
      // rotate Y then X
      let xz = x * cosY - z * sinY, zz = x * sinY + z * cosY; x = xz; z = zz;
      let yz = y * cosX - z * sinX; zz = y * sinX + z * cosX; y = yz; z = zz;
      const persp = 3.2 / (z + 4.2), scale = 70;
      verts.push({ x: W / 2 + x * scale * persp, y: H / 2 + y * scale * persp, z });
    }
    // cube faces -> [corner indices, tile name]
    const faces = [
      { idx: [0,1,3,2], tile: 'wood_side', z: 0 },   // -z
      { idx: [4,5,7,6], tile: 'wood_side', z: 0 },   // +z
      { idx: [0,1,5,4], tile: 'grass_side', z: 0 },  // -y? (sides)
      { idx: [2,3,7,6], tile: 'dirt', z: 0 },
      { idx: [1,3,7,5], tile: 'grass_top', z: 0 },
      { idx: [0,2,6,4], tile: 'wood_side', z: 0 },
    ];
    for (const f of faces) f.z = (verts[f.idx[0]].z + verts[f.idx[1]].z + verts[f.idx[2]].z + verts[f.idx[3]].z) / 4;
    // smaller z projects larger (nearer), so draw farthest (largest z) first
    faces.sort((a, b) => b.z - a.z);                  // painter's algorithm, back-to-front
    const T = Blocks.TILE;
    for (const f of faces) {
      if (f.z > 0.2) continue;                        // skip clearly back faces
      const tn = Blocks._tileNames[f.tile];
      const tcol = (tn % Blocks.COLS) * T, trow = ((tn / Blocks.COLS) | 0) * T;
      const q = f.idx.map(i => verts[i]);
      // two textured triangles map the tile onto the projected quad
      drawTexturedTri(ctx, Blocks.atlas, tcol, trow, tcol + T, trow, tcol + T, trow + T, q[0], q[1], q[2]);
      drawTexturedTri(ctx, Blocks.atlas, tcol, trow, tcol + T, trow + T, tcol, trow + T, q[0], q[2], q[3]);
    }
  }

  /* ---------------- WIN SEQUENCE -------------------------------------
     Fade to black, scroll an original "End Poem", then a big YOU WIN!
     with confetti + fireworks while the fanfare loops. */
  playWin(audio) {
    const screen = document.getElementById('winScreen');
    const cv = document.getElementById('winCanvas');
    const ctx = cv.getContext('2d');
    screen.classList.remove('hidden');
    const resize = () => { cv.width = window.innerWidth; cv.height = window.innerHeight; };
    resize();
    audio.startFanfare();
    const poem = [
      'And so the wanderer reached the edge of all things.',
      '',
      'You shaped a world from nothing but noise and will,',
      'carved light into stone and coaxed forests from seed.',
      '',
      'Every block you broke was a question.',
      'Every block you placed was an answer.',
      '',
      'The mountains remember your footsteps.',
      'The caves still echo with your torchlight.',
      '',
      'You were the dreamer, and this was the dream.',
      'Now wake, traveller, and carry the world with you.',
      '',
      '~ The End ~',
    ];
    const stars = [];
    for (let i = 0; i < 160; i++) stars.push({ x: Math.random(), y: Math.random(), s: Math.random() * 2 });
    const confetti = [], fireworks = [];
    const COLORS = ['#ff4b4b', '#ffd24b', '#4bff6e', '#4bd2ff', '#b54bff', '#ff7fdc'];
    let t0 = performance.now();
    const POEM_MS = 30000;                             // 30 seconds of poem

    const spawnFirework = (W, H) => {
      const cx = Math.random() * W, cy = H * (0.2 + Math.random() * 0.4);
      const col = COLORS[(Math.random() * COLORS.length) | 0];
      for (let i = 0; i < 60; i++) {
        const a = Math.random() * 7, sp = 1 + Math.random() * 4;
        fireworks.push({ x: cx, y: cy, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, life: 1, col });
      }
    };
    let fwTimer = 0;

    const loop = () => {
      const now = performance.now(), el = now - t0, W = cv.width, H = cv.height;
      ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
      // starfield
      ctx.fillStyle = '#fff';
      for (const s of stars) { ctx.globalAlpha = 0.3 + 0.5 * Math.abs(Math.sin(now/700 + s.x*10)); ctx.fillRect(s.x*W, s.y*H, s.s, s.s); }
      ctx.globalAlpha = 1;

      if (el < POEM_MS) {
        // scrolling gold poem (font scaled so the longest line fits the width)
        ctx.textAlign = 'center';
        const fs = clamp(Math.floor(W / 34), 12, 24);
        const lh = fs + 16;
        ctx.font = 'bold ' + fs + 'px "Courier New", monospace';
        const scroll = H - (el / POEM_MS) * (H + poem.length * lh + 100);
        for (let i = 0; i < poem.length; i++) {
          const y = scroll + i * lh;
          if (y < -40 || y > H + 40) continue;
          ctx.fillStyle = '#f6c652'; ctx.fillText(poem[i], W / 2, y);
        }
        ctx.font = '14px "Courier New", monospace'; ctx.fillStyle = '#888';
        ctx.fillText('the credits roll...', W / 2, H - 30);
      } else {
        // YOU WIN finale with confetti + fireworks
        fwTimer += 1; if (fwTimer % 35 === 0) spawnFirework(W, H);
        if (confetti.length < 240 && Math.random() < 0.8)
          confetti.push({ x: Math.random()*W, y: -10, vx:(Math.random()-0.5)*2, vy:1+Math.random()*3,
                          col: COLORS[(Math.random()*COLORS.length)|0], s: 4+Math.random()*5, rot: Math.random()*7, vr:(Math.random()-0.5)*0.4 });
        for (const c of confetti) { c.x += c.vx; c.y += c.vy; c.rot += c.vr;
          ctx.save(); ctx.translate(c.x, c.y); ctx.rotate(c.rot); ctx.fillStyle = c.col; ctx.fillRect(-c.s/2, -c.s/2, c.s, c.s); ctx.restore(); }
        for (let i = confetti.length - 1; i >= 0; i--) if (confetti[i].y > H + 20) confetti.splice(i, 1);
        for (const f of fireworks) { f.x += f.vx; f.y += f.vy; f.vy += 0.04; f.life -= 0.012;
          if (f.life > 0) { ctx.globalAlpha = Math.max(0, f.life); ctx.fillStyle = f.col; ctx.fillRect(f.x, f.y, 3, 3); } }
        ctx.globalAlpha = 1;
        for (let i = fireworks.length - 1; i >= 0; i--) if (fireworks[i].life <= 0) fireworks.splice(i, 1);

        ctx.textAlign = 'center';
        ctx.font = 'bold ' + Math.min(110, W * 0.13) + 'px "Courier New", monospace';
        ctx.fillStyle = '#ffd700'; ctx.strokeStyle = '#7a5a00'; ctx.lineWidth = 6;
        const yy = H * 0.42 + Math.sin(now / 400) * 8;
        ctx.strokeText('YOU WIN! 🏆', W / 2, yy);
        ctx.fillText('YOU WIN! 🏆', W / 2, yy);
        ctx.font = '20px "Courier New", monospace'; ctx.fillStyle = '#fff';
        ctx.fillText('Press ESC to return to the title screen', W / 2, H * 0.6);
      }
      this._winRAF = requestAnimationFrame(loop);
    };
    addEventListener('resize', resize);
    this.stopWin = () => { if (this._winRAF) cancelAnimationFrame(this._winRAF); this._winRAF = null; removeEventListener('resize', resize); audio.stopFanfare(); screen.classList.add('hidden'); };
    loop();
  }
}

// map a tile-rectangle triangle from the atlas image onto a screen triangle
function drawTexturedTri(ctx, img, sx0, sy0, sx1, sy1, sx2, sy2, d0, d1, d2) {
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(d0.x, d0.y); ctx.lineTo(d1.x, d1.y); ctx.lineTo(d2.x, d2.y); ctx.closePath();
  ctx.clip();
  // solve the affine transform taking (s)->(d)
  const D = sx0 * (sy1 - sy2) - sy0 * (sx1 - sx2) + (sx1 * sy2 - sx2 * sy1);
  if (Math.abs(D) < 1e-6) { ctx.restore(); return; }
  const a = (d0.x * (sy1 - sy2) - sy0 * (d1.x - d2.x) + (d1.x * sy2 - d2.x * sy1)) / D;
  const c = (sx0 * (d1.x - d2.x) - d0.x * (sx1 - sx2) + (sx1 * d2.x - sx2 * d1.x)) / D;
  const e = (sx0 * (sy1 * d2.x - sy2 * d1.x) - sy0 * (sx1 * d2.x - sx2 * d1.x) + d0.x * (sx1 * sy2 - sx2 * sy1)) / D;
  const b = (d0.y * (sy1 - sy2) - sy0 * (d1.y - d2.y) + (d1.y * sy2 - d2.y * sy1)) / D;
  const d = (sx0 * (d1.y - d2.y) - d0.y * (sx1 - sx2) + (sx1 * d2.y - sx2 * d1.y)) / D;
  const f = (sx0 * (sy1 * d2.y - sy2 * d1.y) - sy0 * (sx1 * d2.y - sx2 * d1.y) + d0.y * (sx1 * sy2 - sx2 * sy1)) / D;
  ctx.setTransform(a, b, c, d, e, f);
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(img, 0, 0);
  ctx.restore();
}

/* ===========================================================================
   SECTION 16 - SAVE MANAGER  (localStorage)
   Saves the seed, time, player state, inventory, settings and every player
   block edit (stored sparsely per chunk). Loading regenerates the world from
   the seed and replays the edits.
   =========================================================================== */
const SAVE_KEY = 'voxelcraft_save_v1';
const SETTINGS_KEY = 'voxelcraft_settings_v1';
class SaveManager {
  hasSave() { try { return !!localStorage.getItem(SAVE_KEY); } catch (e) { return false; } }
  save(game) {
    // gather sparse edits from every loaded + pending chunk
    const edits = {};
    for (const [k, ch] of game.world.chunks) if (ch.edits) edits[k] = ch.edits;
    for (const [k, e] of game.world.pendingEdits) edits[k] = Object.assign(edits[k] || {}, e);
    const p = game.player;
    const data = {
      seed: game.world.seed, time: game.time, day: game.day,
      player: {
        pos: [p.pos.x, p.pos.y, p.pos.z], yaw: p.yaw, pitch: p.pitch,
        health: p.health, hunger: p.hunger, saturation: p.saturation,
        xp: p.xp, level: p.level, spawn: [p.spawn.x, p.spawn.y, p.spawn.z],
      },
      inventory: game.inventory.slots, selected: game.inventory.selected,
      edits,
      gotPlushie: !!game._gotPlushie,
      collectedPlushies: [...game.world.collectedPlushieKeys],
      collectedNotes: [...game.world.collectedNoteKeys],
    };
    try { localStorage.setItem(SAVE_KEY, JSON.stringify(data)); return true; }
    catch (e) { console.warn('save failed', e); return false; }
  }
  load() { try { return JSON.parse(localStorage.getItem(SAVE_KEY)); } catch (e) { return null; } }
  saveSettings(s) { try { localStorage.setItem(SETTINGS_KEY, JSON.stringify(s)); } catch (e) {} }
  loadSettings() { try { return JSON.parse(localStorage.getItem(SETTINGS_KEY)); } catch (e) { return null; } }
}

/* ===========================================================================
   SECTION 16.5 - THE HORROR LAYER
   A night-only eldritch "Stalker" rebuilt from cubes and skinned with the
   embedded "Obsessed" pack: long limbs, a face that splits into three with a
   detaching jaw/maw, rapid stuttering movement, advances only when unobserved,
   hides behind real tree trunks and peeks around them, and jumpscares the
   player on contact. Plus physical dropped items and bloody notes addressed to
   u/Emergency_Resort7135.
   =========================================================================== */

// a block dropped in the world that the player walks over to collect
class DroppedItem {
  constructor(x, y, z, id, count) {
    this.pos = new Vec3(x, y, z);
    this.vel = new Vec3((Math.random() - 0.5) * 2.5, 2 + Math.random() * 2, (Math.random() - 0.5) * 2.5);
    this.id = id; this.count = count; this.age = 0; this.alive = true;
    this.half = 0.18; this.height = 0.36; this.onGround = false;
  }
}

// append an axis-aligned box rotated by yaw (cos/sin) about a world origin,
// mapping a UV rect [u0,v0,u1,v1] of the *currently bound* texture to all faces
// `lean` (optional {pivY, c, s, fwd}) smoothly tilts everything ABOVE pivY as one
// rigid unit - a real per-vertex rotation about the waist (NOT a per-box shear), so
// the body cranes/leans with flow instead of staircasing. fwd cranes it forward (-Z).
function boxRot(v, idx, ox, oy, oz, cos, sin, lx, ly, lz, sx, sy, sz, u0, v0, u1, v1, bright, anim, flipY, lean) {
  anim = anim || 0; const fy = flipY ? -1 : 1;
  for (let f = 0; f < 6; f++) {
    const fd = FACE_DATA[f];
    const base = v.length / 7;
    for (let k = 0; k < 4; k++) {
      const vp = fd.verts[k], uvc = fd.uv[k];
      let px = lx + vp[0] * sx, py = ly + vp[1] * sy, pz = lz + vp[2] * sz;
      if (lean && py > lean.pivY) {             // cohesive upper-body lean (rotate about the waist)
        const dy = py - lean.pivY, nx = px * lean.c - dy * lean.s;
        py = lean.pivY + px * lean.s + dy * lean.c; px = nx; pz -= lean.fwd * dy;
      }
      const wx = ox + px * cos - pz * sin;     // rotate around Y
      const wz = oz + px * sin + pz * cos;
      v.push(wx, oy + fy * py, wz, u0 + uvc[0] * (u1 - u0), v0 + uvc[1] * (v1 - v0), fd.shade * bright, anim);
    }
    idx.push(base, base + 1, base + 2, base, base + 2, base + 3);
  }
}

        if (Math.random() < 0.35) audio && audio.whisper();
      }
    }
    }
    // vertical placement: drape over the canopy top / sink the peek below the leaves / else stand
    if (this.mode === 'canopy' && this.tree) this.pos.y = (this.tree.leafBottom || this.tree.h + 5);
    else if (this.mode === 'peek' && this.tree) this.pos.y = this.peekY;
    else this.pos.y = this.world.heightAt(Math.floor(this.pos.x), Math.floor(this.pos.z)) + 1;

    // erratic body spasms + an unsettling head tilt/twitch
    this.spasmT -= dt;
    if (this.spasmT <= 0) { this.twitch = 1; this.spasmT = 0.6 + Math.random() * 2.4; if (Math.random() < 0.4) audio && audio.whisper(); }
    this.twitch = Math.max(0, this.twitch - dt * 3.2);
    this.headJ = Math.sin(this.t * 9) * 0.03 + Math.sin(this.t * 27) * this.twitch * 0.12;

    // face only "opens up" when hunting up close; otherwise a subtle grin
    const want = (this.hunting && dist < 8) ? 1 : 0;
    this.aggro = lerp(this.aggro, this.hunting ? 1 : 0.15, dt * 0.6);
    this.split = lerp(this.split, want, dt * 3);
    this.mouth = lerp(this.mouth, want * 0.9, dt * 3);

    // whispers + proximity dread
    this._whisperT -= dt;
    if (this._whisperT <= 0) { audio && audio.whisper(); this._whisperT = 5 + Math.random() * 8; }
    audio && audio.setDread(clamp(1 - dist / 38, 0, 1) * (this.hunting ? 1 : 0.5));

    // it only catches you during a hunt, at point-blank range, and only while it's
    // genuinely in your forward view (hdot > 0.3 ~= within ~70deg of where you face)
    // - so it can never claim you from the side/behind without you getting a glance.
    const hdot = Math.sin(player.yaw) * (-dx / dist) + (-Math.cos(player.yaw)) * (-dz / dist);
    if (this.hunting && !this.hang && dist < 2.1 && Math.abs(player.pos.y - this.pos.y) < 3 && hdot > 0.3)
      game.triggerScare(this);
  }

  skinName() {
    if (this.hunting && this.aggro > 0.7) return 'arachnoid_angry';
    if (this.hunting) return 'humanoid_angry';
    return 'mysterious';                         // distant lurking form most of the time
  }

  // Build the body from SOLID, CONNECTED boxes (overlapping at the joints) so it
  // reads as one cohesive creature: ~5 tall, hunched, asymmetric, with bent
  // spindly legs, very long bent arms ending in claws, a long neck and a
  // misshapen splitting head. The canopy "drape" uses a dedicated posed mesh.
  buildMesh() {
    if (this.drape > 0) return this._canopyMesh();            // clinging over the canopy edge (hand-posed, not warped)
    if (this.crawl > 0.15) return this._crawlMesh();          // crawl-running at the player on the kill
    const v = [], i = [];
    const cos = this._cos, sin = this._sin, ox = this.pos.x, oy = this.pos.y, oz = this.pos.z;
    const split = this.split, mouth = this.mouth, tw = this.twitch, t = this.t, hj = this.headJ;
    const cr = 0;
    const LIMB = [0.5, 0, 1, 0.5], TORSO = [0, 0, 0.5, 0.5], HEAD = [0, 0.5, 0.5, 1], JAW = [0.5, 0.5, 1, 1];
    // `loom` bends the body forward+down, pivoting at the waist (y=2.3): everything
    // above shears toward the player so the head/maw juts down over a downed victim
    const lo = this.loom || 0;
    // PEEK lean: above the waist (y>3.0) the upper body cranes sideways past the
    // trunk's vertical edge (+X*peekSide) and forward toward the player (-Z) so ONLY
    // the head + a sliver of near shoulder emerge, while pelvis/legs stay hidden
    // behind the trunk. loom (downed) and peek (lurking) never co-occur; loom wins.
    const pk = (lo > 0) ? 0 : ((this.mode === 'peek') ? this.peek : 0);
    const ps = this.peekSide;
    // the peek lean is a single rigid rotation of the whole upper body about the
    // waist (y=3.0) - smooth FLOW, not a per-box staircase. It cranes sideways past
    // the trunk edge (toward the player's view of it) and slightly forward.
    const th = -ps * pk * 0.62;                                  // sideways tilt angle (rad)
    const peekLean = pk > 0 ? { pivY: 2.5, c: Math.cos(th), s: Math.sin(th), fwd: pk * 0.40 } : null;
    const box = (lx, ly, lz, sx, sy, sz, uv, b, an) => {
      let yy = ly, zz = lz;
      if (lo > 0 && ly > 2.3) {                                 // downed loom (per-box shear)
        const hh = ly - 2.3; yy = ly - lo * hh * 0.42; zz = lz - lo * hh * 0.62;
      }
      return boxRot(v, i, ox, oy, oz, cos, sin, lx, yy, zz, sx, sy, sz, uv[0], uv[1], uv[2], uv[3], b === undefined ? 1 : b, an, 0, peekLean);
    };
    // whole-limb sway/twitch (each limb's boxes share the offset, so they stay joined)
    const sway = (f, ph) => Math.sin(t * f + ph) * (0.02 + tw * 0.07);
    const reach = (this.hunting && !this.hang) ? -0.45 : 0;   // arms reach forward during a hunt

    // ---- spindly legs: thigh + bent shin + foot (overlap at the joints) ----
    for (const s of [-1, 1]) {
      const lx = s < 0 ? -0.22 : 0.06, sw = sway(7, s * 2), sp = cr ? s * 0.3 : 0;
      box(lx, 1.15, -0.09 + sw, 0.17, 1.3, 0.18, LIMB);                   // thigh
      box(lx + sp, 0, -0.2 + sw, 0.15, 1.3, 0.16, LIMB);                  // shin (forward = bent knee)
      box(lx + sp, 0, -0.34 + sw, 0.17, 0.14, 0.3, LIMB);                 // foot
    }
    // ---- pelvis + tapered hunched torso + shoulders + a jagged spine ridge ----
    box(-0.22, 2.3, -0.13, 0.44, 0.34, 0.26, TORSO);                      // pelvis
    box(-0.2, 2.55, -0.15, 0.4, 0.74, 0.26, TORSO);                       // lower torso
    box(-0.24, 3.22, -0.17, 0.48, 0.8, 0.28, TORSO);                      // chest (wider)
    box(-0.36, 3.84, -0.19, 0.72, 0.26, 0.3, TORSO);                      // hunched shoulders
    box(-0.05, 3.0, 0.08, 0.1, 0.95, 0.12, TORSO);                        // protruding spine
    // ---- long bent arms (asymmetric) ending in clawed hands ----
    const aL = sway(2.3, 1);
    const aR = sway(2.7, 4);                                              // right arm raised higher (asymmetry)
    // when peeking, the NEAR arm (on the lean side) reaches up and forward to brace a
    // splayed hand on the trunk. EVERY braced-arm box sits ABOVE the lean pivot (2.5),
    // so the whole arm rotates RIGIDLY with the upper body (stays joined to the shoulder,
    // no torn elbow) and the hand lands on the bark after the lean. The far arm hangs
    // normally behind the trunk (occluded).
    const braceL = (pk > 0 && ps < 0), braceR = (pk > 0 && ps > 0);
    const braceArm = (sgn) => {
      const ex = sgn * 0.30;
      box(ex - 0.07, 2.95, -0.16, 0.16, 0.95, 0.17, LIMB);              // upper arm down from the shoulder
      box(ex - 0.06, 2.62, -0.95, 0.15, 0.46, 0.86, LIMB);             // forearm angling forward to the bark
      box(ex - 0.05, 2.62, -1.16, 0.24, 0.24, 0.11, LIMB);             // palm flat on the bark (wide X, thin Z)
      for (let f = 0; f < 4; f++) box(ex - 0.13 + f * 0.075, 2.82, -1.18, 0.05, 0.30, 0.05, LIMB); // splayed fingers up the bark
    };
    // ---- LEFT arm ----
    if (braceL) braceArm(-1);
    else {
      box(-0.42, 2.45 + aL, -0.13 + reach * 0.3, 0.15, 1.5, 0.16, LIMB); // L upper arm
      box(-0.45, 1.0 + aL, -0.2 + reach, 0.14, 1.5, 0.15, LIMB);         // L forearm (bent forward)
      box(-0.48, 0.72 + aL, -0.24 + reach, 0.2, 0.24, 0.18, LIMB);       // L hand
      for (let f = 0; f < 3; f++) box(-0.49 + f * 0.06, 0.34 + aL + sway(11, f) * 0.5, -0.26 + reach, 0.05, 0.44, 0.05, LIMB); // claws
    }
    // ---- RIGHT arm ----
    if (braceR) braceArm(1);
    else {
      box(0.27, 2.7 + aR, -0.13 + reach * 0.3, 0.15, 1.38, 0.16, LIMB);  // R upper arm
      box(0.30, 1.35 + aR, -0.3 + reach, 0.14, 1.45, 0.15, LIMB);        // R forearm
      box(0.29, 1.06 + aR, -0.36 + reach, 0.2, 0.24, 0.18, LIMB);        // R hand
      for (let f = 0; f < 3; f++) box(0.28 + f * 0.06, 0.68 + aR + sway(13, f) * 0.5, -0.38 + reach, 0.05, 0.44, 0.05, LIMB);
    }
    // ---- long neck + a head with big UNCANNY EYES (buildEyes) above a petaled maw ----
    box(-0.08 + hj, 4.0, -0.12, 0.16, 0.45, 0.16, TORSO);                 // neck
    box(-0.2 + hj, 4.42, -0.16, 0.4, 0.56, 0.32, HEAD);                   // skull (solid from behind; backs the eyes)
    box(-0.12 + hj, 4.9, -0.12, 0.3, 0.24, 0.24, HEAD);                   // off-centre crown lump
    // The face's gaping maw (the red fleshy flaps) is drawn in buildEyes' emissive pass
    // with the dedicated 'maw' tile so it reads as one solid glowing mouth. Here we only
    // place a dark recessed gullet box behind it as solid backing (so nothing shows through).
    const bloom = mouth, mcx = hj, mcy = 4.46, mcz = -0.22;               // maw sits low on the face, below the eyes
    box(mcx - 0.15, mcy - 0.15, mcz + 0.02, 0.30, 0.30, 0.18 + bloom * 0.22, HEAD, 0.45);  // dark gullet backing
    return { verts: new Float32Array(v), idx: new Uint32Array(i) };
  }

  // the glowing pass (eye_glow tile, anim=2 -> stays lit + resists fog): the maw
  // itself glows - a faint cruciform seam when the bud is closed, blooming into a
  // ring of glowing fangs around a hot throat. Flipped with the body when hanging.
  buildEyes() {
    if (this.drape > 0) return this._canopyEyes();       // glowing eyes + maw on the draped head
    if (this.crawl > 0.15) return this._crawlEyes();     // glowing eyes + maw on the low crawl-running head
    const v = [], i = [];
    const cos = this._cos, sin = this._sin, ox = this.pos.x, oy = this.pos.y, oz = this.pos.z;
    const mouth = this.mouth, hj = this.headJ, tile = Blocks._tileNames['eye_glow'], eyeTile = Blocks._tileNames['eye'];
    const bloom = mouth, mcx = hj, mcy = 4.46, lo = this.loom || 0, t = this.t;
    const rest = Math.max(0, 1 - bloom * 2);             // 1 = closed bud (lurking), 0 = mouth half+ open
    // an emissive tile-box, centred at (lx,ly,lz). Sheared by `loom` (downed) OR rotated
    // by the SAME peek lean as buildMesh's box() (pivot 2.5), so the eyes + maw stay
    // welded to the head as it cranes around the trunk. Optional tl overrides the tile.
    const pk = (lo > 0) ? 0 : ((this.mode === 'peek') ? this.peek : 0);
    const ps = this.peekSide, th = -ps * pk * 0.62;
    const peekLean = pk > 0 ? { pivY: 2.5, c: Math.cos(th), s: Math.sin(th), fwd: pk * 0.40 } : null;
    const glow = (lx, ly, lz, w, h, d, br, tl) => {
      let yy = ly, zz = lz;
      if (lo > 0 && ly > 2.3) { const hh = ly - 2.3; yy = ly - lo * hh * 0.42; zz = lz - lo * hh * 0.62; }
      return boxRotTile(v, i, ox, oy, oz, cos, sin, lx - w / 2, yy - h / 2, zz - d / 2, w, h, d, tl === undefined ? tile : tl, br, 2, 0, peekLean);
    };
    // ---- two real eyes (the supplied eye PNG), emissive so they glow like eyeshine ----
    const eyeY = 4.74, eyeBr = 1.25 + rest * 0.4;        // a touch brighter at rest (the lurking stare)
    glow(mcx - 0.16, eyeY, -0.205, 0.26, 0.20, 0.07, eyeBr, eyeTile);   // wider than tall, like a real eye
    glow(mcx + 0.16, eyeY, -0.205, 0.26, 0.20, 0.07, eyeBr, eyeTile);
    // the gaping maw: SOLID red fleshy flaps. Each of the 5 flaps is a DENSE chain of
    // overlapping tapering boxes (boxes far wider than the radial step) sharing an
    // overlapping base rim, so it reads as ONE cohesive red mouth - not loose cubes.
    // Drawn in this emissive pass with the 'maw' tile so the flesh glows red.
    const mawTile = Blocks._tileNames['maw'];
    const mawReach = 0.11 + bloom * 0.42, NSEG = 8;
    for (let p = 0; p < 5; p++) {
      const ang = -1.5708 + p * 1.25664 + hj * 0.4, rx = Math.cos(ang), ry = Math.sin(ang);
      for (let j = 0; j <= NSEG; j++) {
        const q = j / NSEG, radial = mawReach * q, peel = bloom * 0.14 * q * q, w = 0.24 - 0.17 * q;
        glow(mcx + rx * radial, mcy + ry * radial, -0.24 - peel, w, w, 0.09, 1.15, mawTile);
      }
    }
    // a hot ember deep in the throat centre (the inner mouth light), hotter when gaping
    glow(mcx, mcy, -0.25, 0.13 + bloom * 0.12, 0.13 + bloom * 0.12, 0.06, 2.0 + bloom * 1.2);
    return { verts: new Float32Array(v), idx: new Uint32Array(i) };
  }

  // ---- CANOPY DRAPE pose (hand-built, NOT a warp). pos sits at the player-facing
  // canopy rim with pos.y = the leaf underside. The lower body + hind legs grip the
  // leaf-top BEHIND the rim (+z, up in the foliage); the upper torso curls over the
  // front lip and the long neck + head + long arms DROOP straight DOWN into open air
  // toward the viewer. `drape` (0..1) animates head/arms from a perched crouch to a
  // full hang — the "curling over the edge" motion. Head/neck/arm anchors here MUST
  // match _canopyEyes so the glowing face stays welded. ----
  // shared head anchor so _canopyMesh + _canopyEyes stay welded. pos.y = leaf underside;
  // the head hangs ~2 below it (kept above the ground by the _pickMode clearance check).
  _canopyAnchors() {
    const dr = Math.max(0, Math.min(1, this.drape || 0));
    const sw = Math.sin(this.t * 0.9) * 0.04 * dr;
    const headCy = -2.05, headCz = -0.55;                    // head centre: below the leaves, leaned forward over the edge
    return { dr, sw, headCy, headCz };
  }
  _canopyMesh() {
    const v = [], i = [];
    const cos = this._cos, sin = this._sin, ox = this.pos.x, oy = this.pos.y, oz = this.pos.z, t = this.t;
    const LIMB = [0.5, 0, 1, 0.5], TORSO = [0, 0, 0.5, 0.5], HEAD = [0, 0.5, 0.5, 1];
    const { dr, sw } = this._canopyAnchors();
    const sy = Math.sin(t * 0.7) * 0.05 * dr;                          // gentle pendulum sway of the hung body
    const cb = (cx, cy, cz, w, h, d, uv, b) => boxRot(v, i, ox, oy, oz, cos, sin, cx - w / 2, cy - h / 2, cz - d / 2, w, h, d, uv[0], uv[1], uv[2], uv[3], b === undefined ? 1 : b, 0, 0, null);
    // ONE CONTINUOUS body (every box overlaps its neighbour by >=0.2 so there are NO gaps),
    // curling from the grip legs up in the leaves (leaning BACK +z over the canopy) down and
    // FORWARD (-z, toward you) so the torso + head hang openly below the leaves, head lowest.
    for (const s of [-1, 1]) {                                          // hind legs hooking back over the leaf edge (grip)
      const lx = s * 0.28, fx = Math.sin(t * 5 + s) * 0.02;
      cb(lx, 1.55, 0.50 + fx, 0.24, 0.55, 0.40, LIMB);                 // shin/claws hooked back onto the leaf-top (+z)
      cb(lx, 1.05, 0.24, 0.24, 0.75, 0.34, LIMB);                     // thigh down to the hip
    }
    cb(0, 1.55, 0.62, 0.10, 0.9, 0.12, TORSO);                         // spine ridge over the back
    cb(0 + sy * 0.2, 0.85, 0.20, 0.50, 0.90, 0.44, TORSO);             // pelvis  (overlaps thighs)
    cb(0 + sy * 0.4, 0.15, 0.00, 0.50, 0.90, 0.44, TORSO);             // belly   (overlaps pelvis)
    cb(0 + sy * 0.6, -0.55, -0.22, 0.54, 0.90, 0.42, TORSO);           // chest   (overlaps belly)
    cb(0 + sy * 0.8, -1.10, -0.36, 0.66, 0.55, 0.38, TORSO);           // shoulders (overlaps chest)
    cb(sw, -1.55, -0.46, 0.24, 0.60, 0.24, TORSO);                     // neck    (overlaps shoulders)
    const { headCy, headCz } = this._canopyAnchors();
    cb(sw, headCy, headCz, 0.48, 0.72, 0.44, HEAD);                    // skull   (overlaps neck; faces the player)
    cb(sw, headCy - 0.42, headCz - 0.02, 0.34, 0.34, 0.30, HEAD);      // jaw/chin (lowest; overlaps skull)
    cb(sw, headCy + 0.02, headCz - 0.24, 0.34, 0.34, 0.16, HEAD, 0.45);// dark gullet backing the glowing maw (front)
    // long arms hanging down the front, overlapping the shoulders -> alongside the head
    for (const s of [-1, 1]) {
      const ax = s * 0.42, aw = Math.sin(t * 0.8 + s * 2) * 0.04 * dr;
      cb(ax, -1.30, -0.42, 0.17, 0.62, 0.18, LIMB);                    // upper arm (overlaps shoulders)
      cb(ax + aw, -1.95, -0.50, 0.16, 0.80, 0.17, LIMB);               // forearm  (overlaps upper arm)
      cb(ax + aw, -2.55, -0.54, 0.16, 0.55, 0.16, LIMB);               // clawed hand
    }
    return { verts: new Float32Array(v), idx: new Uint32Array(i) };
  }
  _canopyEyes() {
    const v = [], i = [];
    const cos = this._cos, sin = this._sin, ox = this.pos.x, oy = this.pos.y, oz = this.pos.z;
    const glowTile = Blocks._tileNames['eye_glow'], eyeTile = Blocks._tileNames['eye'], mawTile = Blocks._tileNames['maw'];
    const { sw, headCy, headCz } = this._canopyAnchors();
    const bloom = this.mouth, rest = Math.max(0, 1 - bloom * 2);
    const fz = headCz - 0.24;                                          // the head's front (-z) face, toward the player
    const eglow = (lx, ly, lz, w, h, d, br, tl) => boxRotTile(v, i, ox, oy, oz, cos, sin, lx - w / 2, ly - h / 2, lz - d / 2, w, h, d, tl === undefined ? glowTile : tl, br, 2, 0, null);
    const eyeY = headCy + 0.16, eyeBr = 1.25 + rest * 0.4;             // eyes high on the face, maw below
    eglow(-0.13 + sw, eyeY, fz + 0.012, 0.22, 0.22, 0.04, 0.5);        // soft halo
    eglow(0.13 + sw, eyeY, fz + 0.012, 0.22, 0.22, 0.04, 0.5);
    eglow(-0.13 + sw, eyeY, fz, 0.16, 0.16, 0.05, eyeBr, eyeTile);
    eglow(0.13 + sw, eyeY, fz, 0.16, 0.16, 0.05, eyeBr, eyeTile);
    const mcx = sw, mcy = headCy - 0.12, mcz = fz - 0.02, mawReach = 0.11 + bloom * 0.42, NSEG = 8;
    for (let p = 0; p < 5; p++) {
      const ang = -1.5708 + p * 1.25664, rx = Math.cos(ang), ry = Math.sin(ang);
      for (let j = 0; j <= NSEG; j++) {
        const q = j / NSEG, radial = mawReach * q, w = 0.22 - 0.15 * q;
        eglow(mcx + rx * radial, mcy + ry * radial, mcz - 0.02 * q, w, w, 0.08, 1.1, mawTile);
      }
    }
    eglow(mcx, mcy, mcz, 0.12 + bloom * 0.12, 0.12 + bloom * 0.12, 0.06, 2.0 + bloom * 1.2);  // hot throat ember
    return { verts: new Float32Array(v), idx: new Uint32Array(i) };
  }

  // ---- CRAWL-RUN pose (hand-built): on all fours, body low + horizontal, the head
  // leading LOW at the front (local -Z = straight at the player), long front arms
  // reaching/planting ahead and hind legs shoving off behind in an opposing gallop
  // gait (this.gait), with a body bob. Drawn only while charging on the kill. ----
  _crawlMesh() {
    const v = [], i = [];
    const cos = this._cos, sin = this._sin, ox = this.pos.x, oy = this.pos.y, oz = this.pos.z, g = this.gait;
    const LIMB = [0.5, 0, 1, 0.5], TORSO = [0, 0, 0.5, 0.5], HEAD = [0, 0.5, 0.5, 1];
    const cbox = (cx, cy, cz, w, h, d, uv, b) => boxRot(v, i, ox, oy, oz, cos, sin, cx - w / 2, cy - h / 2, cz - d / 2, w, h, d, uv[0], uv[1], uv[2], uv[3], b === undefined ? 1 : b, 0, 0, null);
    const bob = Math.sin(g * 2) * 0.10, hb = Math.sin(g * 2 + 1) * 0.05;
    // horizontal body: hips at the back (+z), shoulders forward (-z), spine low + level
    cbox(0, 1.25 + bob, 0.85, 0.50, 0.50, 0.55, TORSO);   // hips
    cbox(0, 1.30 + bob, 0.40, 0.50, 0.56, 0.55, TORSO);   // lower torso
    cbox(0, 1.28 + bob, -0.08, 0.55, 0.60, 0.55, TORSO);  // chest
    cbox(0, 1.22 + bob, -0.50, 0.60, 0.50, 0.42, TORSO);  // shoulders
    cbox(0, 1.60 + bob, 0.30, 0.12, 0.14, 1.25, TORSO);   // jagged spine ridge down the back
    // neck + the head leading LOW at the front, facing the player (-z)
    cbox(0, 1.02 + bob + hb, -0.80, 0.22, 0.34, 0.42, TORSO);  // neck
    cbox(0, 0.84 + bob + hb, -1.08, 0.46, 0.52, 0.42, HEAD);   // skull
    cbox(0, 1.12 + bob + hb, -1.02, 0.30, 0.22, 0.30, HEAD);   // crown lump
    cbox(0, 0.80 + bob + hb, -1.30, 0.30, 0.30, 0.20, HEAD, 0.45);  // dark gullet backing the glowing maw
    // FRONT arms — long, reaching + planting ahead in a gallop
    for (const s of [-1, 1]) {
      const fr = Math.sin(g + (s < 0 ? 0 : Math.PI)), lift = Math.max(0, -fr) * 0.34, reachZ = -1.05 - 0.42 * Math.max(0, fr);
      const ax = s * 0.34;
      cbox(ax, 1.02 + bob, -0.66, 0.16, 0.55, 0.34, LIMB);          // upper arm angling fwd-down
      cbox(ax, 0.50 + lift, reachZ, 0.15, 0.55, 0.50, LIMB);        // forearm reaching ahead
      cbox(ax, 0.12 + lift, reachZ - 0.22, 0.20, 0.18, 0.34, LIMB); // planted clawed hand
    }
    // HIND legs — shoving off behind, opposite phase
    for (const s of [-1, 1]) {
      const bk = Math.sin(g + (s < 0 ? Math.PI : 0)), lift = Math.max(0, -bk) * 0.30, pushZ = 1.05 + 0.40 * Math.max(0, bk);
      const lx = s * 0.27;
      cbox(lx, 1.00 + bob, 1.05, 0.20, 0.50, 0.40, LIMB);          // thigh
      cbox(lx, 0.50 + lift, pushZ, 0.18, 0.55, 0.45, LIMB);        // shin

  _crawlEyes() {

  closeCraft() { this.craftOpen = false; this.craftEls.ov.classList.add('hidden'); if (this.state === 'playing') this.input.requestLock(); }

  // ---- the backpack: 27 storage slots + the 9 hotbar, opened with E ----------
  _buildInventoryUI() {
    const ov = document.createElement('div');
    ov.className = 'overlay hidden'; ov.id = 'invMenu';
    const panel = document.createElement('div'); panel.className = 'panel'; panel.style.textAlign = 'center';
    panel.innerHTML = '<h2 style="margin:0 0 4px">INVENTORY</h2><div style="font-size:12px;color:#bbb;margin-bottom:10px">Click to pick up / place a stack. Press E or Esc to close.</div>';
    const cv = document.createElement('canvas');
    this._invCell = 50; this._invGap = 6; const pad = 10;
    cv.width = 9 * this._invCell + 8 * this._invGap + pad * 2;
    cv.height = 4 * this._invCell + 3 * this._invGap + 18 + pad * 2;   // 3 backpack rows + gap + hotbar row
    cv.style.cssText = 'image-rendering:pixelated;background:rgba(0,0,0,0.35);border:2px solid #555;cursor:pointer;';
    panel.appendChild(cv);
    const back = document.createElement('button'); back.className = 'btn'; back.style.marginTop = '14px'; back.textContent = 'Close';

    panel.appendChild(back); ov.appendChild(panel); document.body.appendChild(ov);

    cv.addEventListener('mousedown', e => { e.preventDefault(); const r = cv.getBoundingClientRect(); this._invClick(e.clientX - r.left, e.clientY - r.top, e.button); });
    cv.addEventListener('contextmenu', e => e.preventDefault());
  }
  // visual grid (row,col) -> inventory slot index: rows 0-2 = backpack (9..35), row 3 = hotbar (0..8)
  _invSlotIndex(row, col) { return row < 3 ? (9 + row * 9 + col) : col; }
  _invSlotRect(i) {
    const c = this._invCell, g = this._invGap, pad = this.invEls.pad;
    let row, col;
    if (i < 9) { row = 3; col = i; } else { row = ((i - 9) / 9) | 0; col = (i - 9) % 9; }
    const y = pad + row * (c + g) + (row === 3 ? 12 : 0);     // extra gap above the hotbar row
    return { x: pad + col * (c + g), y, w: c, h: c };
  }
  openInventory() {
    this.invOpen = true; this.input.exitLock();
    this.invEls.ov.classList.remove('hidden'); this._redrawInv();
  }
  closeInventory() {
    if (this._invHeld) { this.inventory.addItem(this._invHeld.id, this._invHeld.count, this._invHeld.meta); this._invHeld = null; }
    this.invOpen = false; this.invEls.ov.classList.add('hidden');
    if (this.state === 'playing') this.input.requestLock();
  }
  _redrawInv() {
    if (!this.invOpen) return;
    const ctx = this.invEls.ctx, cv = this.invEls.cv, c = this._invCell;
    ctx.clearRect(0, 0, cv.width, cv.height);
    for (let i = 0; i < INV_SLOTS; i++) {
      const r = this._invSlotRect(i), s = this.inventory.slots[i];
      ctx.fillStyle = i < 9 ? 'rgba(60,60,70,0.7)' : 'rgba(40,40,48,0.7)';
      ctx.fillRect(r.x, r.y, r.w, r.h);
      ctx.strokeStyle = (i < 9 && i === this.inventory.selected) ? '#fff' : 'rgba(0,0,0,0.7)';
      ctx.lineWidth = (i < 9 && i === this.inventory.selected) ? 3 : 1.5;
      ctx.strokeRect(r.x + 0.5, r.y + 0.5, r.w, r.h);
      if (s.id !== 0 && s.count > 0) {
        this.ui.drawItemIcon(ctx, s.id, r.x + 8, r.y + 8, c - 16);
        if (s.count > 1) { ctx.textAlign = 'right'; ctx.textBaseline = 'alphabetic'; ctx.font = 'bold 14px "Courier New",monospace'; ctx.fillStyle = '#fff'; ctx.strokeStyle = '#000'; ctx.lineWidth = 3; ctx.strokeText(s.count, r.x + c - 5, r.y + c - 6); ctx.fillText(s.count, r.x + c - 5, r.y + c - 6); }
      }

      const h = this._invHeld, m = this._invMouse;
      this.ui.drawItemIcon(ctx, h.id, m.x - (c - 16) / 2, m.y - (c - 16) / 2, c - 16);
      if (h.count > 1) { ctx.textAlign = 'right'; ctx.font = 'bold 14px "Courier New",monospace'; ctx.fillStyle = '#fff'; ctx.strokeStyle = '#000'; ctx.lineWidth = 3; ctx.strokeText(h.count, m.x + (c - 16) / 2, m.y + (c - 16) / 2); ctx.fillText(h.count, m.x + (c - 16) / 2, m.y + (c - 16) / 2); }

  }
  _invClick(mx, my, button) {

    for (let i = 0; i < INV_SLOTS; i++) { const r = this._invSlotRect(i); if (mx >= r.x && mx < r.x + r.w && my >= r.y && my < r.y + r.h) { hit = i; break; } }

      if (slot.count > 0) { this._invHeld = { id: slot.id, count: slot.count, meta: slot.meta }; slot.id = 0; slot.count = 0; slot.meta = undefined; }
    } else if (slot.count === 0) {                // drop into an empty slot
      slot.id = held.id; slot.count = held.count; slot.meta = held.meta; this._invHeld = null;
    } else if (slot.id === held.id && !slot.meta && !held.meta && slot.count < stackMax(slot.id)) {  // merge stacks

  // ---- command console (press '/') --------------------------------------
  _buildConsole() {
    const wrap = document.createElement('div');
    wrap.id = 'console'; wrap.className = 'hidden';
    wrap.style.cssText = 'position:absolute;left:0;right:0;bottom:120px;z-index:12;display:flex;flex-direction:column;align-items:center;pointer-events:none;';
    const log = document.createElement('div');
    log.style.cssText = 'width:min(680px,92vw);max-height:180px;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end;gap:2px;margin-bottom:6px;font:13px "Courier New",monospace;color:#cfe;text-shadow:1px 1px 0 #000;';
    const input = document.createElement('input');
    input.type = 'text'; input.spellcheck = false; input.autocomplete = 'off';
    input.style.cssText = 'pointer-events:auto;width:min(680px,92vw);padding:9px 12px;font:15px "Courier New",monospace;color:#fff;background:rgba(0,0,0,.8);border:2px solid #6b6b6b;outline:none;';

    });

  _log(msg, color = '#cfe') {

    this.consoleEls.log.appendChild(line);
    while (this.consoleEls.log.children.length > 8) this.consoleEls.log.removeChild(this.consoleEls.log.firstChild);

  openConsole() {

  }

  // parse + run a slash command
  runCommand(raw) {
    const s = raw.replace(/^\//, '').trim();
    const a = s.split(/\s+/);
    const cmd = (a[0] || '').toLowerCase();
    const p = this.player, inv = this.inventory;
    const ok = (m) => this._log(m, '#9bff7a');
    const err = (m) => this._log(m, '#ff8a6a');
    // map a name to a block/item id
    const nameToId = (n) => {
      n = (n || '').toLowerCase();
      const items = { eye: ITEM.EYE, endcrystal: ITEM.END_CRYSTAL, end_crystal: ITEM.END_CRYSTAL, frame: ITEM.NETHER_FRAME, plushie: ITEM.PLUSHIE, meat: ITEM.MEAT, food: ITEM.MEAT, apple: ITEM.APPLE, stick: ITEM.STICK, sticks: ITEM.STICK,
        table: B.CRAFT_TABLE, workbench: B.CRAFT_TABLE, craftingtable: B.CRAFT_TABLE, door: B.DOOR, bed: B.BED, cot: B.BED };
      // tool aliases like "ironpick", "diamondblade", "woodaxe", "stonespade"
      for (const k in ITEM) { const a = k.toLowerCase().replace(/_/g, ''); if (a === n.replace(/[^a-z]/g, '') && ITEM[k] >= 206) return ITEM[k]; }
      if (items[n] !== undefined) return items[n];
      for (let id = 1; id <= 29; id++) if (Blocks.get(id).name.toLowerCase().replace(/[^a-z]/g, '') === n.replace(/[^a-z]/g, '')) return id;
      const map = { grass: B.GRASS, dirt: B.DIRT, stone: B.STONE, sand: B.SAND, wood: B.WOOD, log: B.WOOD, planks: B.PLANKS, glass: B.GLASS, leaves: B.LEAVES, cobble: B.COBBLE, cobblestone: B.COBBLE, brick: B.BRICKS, bricks: B.BRICKS, obsidian: B.OBSIDIAN, diamond: B.DIAMOND, gold: B.GOLD, iron: B.IRON, coal: B.COAL, redstone: B.REDSTONE, water: B.WATER, lava: B.LAVA, ice: B.ICE, snow: B.SNOW, cactus: B.CACTUS, gravel: B.GRAVEL, sandstone: B.SANDSTONE };
      return map[n] !== undefined ? map[n] : null;
    };
    switch (cmd) {
      case 'time': {
        const t = (a[1] || '').toLowerCase();
        const presets = { day: 0.3, noon: 0.5, dusk: 0.72, sunset: 0.72, night: 0.0, midnight: 0.0, dawn: 0.25, sunrise: 0.25, morning: 0.32 };
        if (presets[t] !== undefined) { this.time = presets[t]; ok('Time set to ' + t); }
        else if (t !== '' && !isNaN(parseFloat(t))) { this.time = ((parseFloat(t) % 1) + 1) % 1; ok('Time set to ' + this.time.toFixed(2)); }

      case 'give': {
