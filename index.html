      else          { p.y = Math.floor(p.y + height) - height - 1e-3; }
      v.y = 0;
    }
    // ---- X ----
    p.x += v.x * dt;
    if (this.boxHitsSolid(world, p, half, height)) {
      if (v.x > 0) p.x = Math.floor(p.x + half) - half - 1e-3;
      else         p.x = Math.floor(p.x - half) + 1 + half + 1e-3;
      v.x = 0;
    }
    // ---- Z ----
    p.z += v.z * dt;
    if (this.boxHitsSolid(world, p, half, height)) {
      if (v.z > 0) p.z = Math.floor(p.z + half) - half - 1e-3;
      else         p.z = Math.floor(p.z - half) + 1 + half + 1e-3;
      v.z = 0;
    }
  },
};

/* Voxel ray-march (3D-DDA): step the ray cell-by-cell until it hits a solid
   or non-air targetable block. Returns the hit cell, the adjacent (place)
   cell, and the hit block id - or null if nothing within `maxDist`. */
function raycastVoxel(world, origin, dir, maxDist) {
  let x = Math.floor(origin.x), y = Math.floor(origin.y), z = Math.floor(origin.z);
  const stepX = Math.sign(dir.x), stepY = Math.sign(dir.y), stepZ = Math.sign(dir.z);
  // distance along the ray to the next cell boundary on each axis
  const tDeltaX = dir.x !== 0 ? Math.abs(1 / dir.x) : Infinity;
  const tDeltaY = dir.y !== 0 ? Math.abs(1 / dir.y) : Infinity;
  const tDeltaZ = dir.z !== 0 ? Math.abs(1 / dir.z) : Infinity;
  const fx = stepX > 0 ? (x + 1 - origin.x) : (origin.x - x);
  const fy = stepY > 0 ? (y + 1 - origin.y) : (origin.y - y);
  const fz = stepZ > 0 ? (z + 1 - origin.z) : (origin.z - z);
  let tMaxX = dir.x !== 0 ? tDeltaX * fx : Infinity;
  let tMaxY = dir.y !== 0 ? tDeltaY * fy : Infinity;
  let tMaxZ = dir.z !== 0 ? tDeltaZ * fz : Infinity;
  let nx = 0, ny = 0, nz = 0; // face normal of the last crossed boundary
  let t = 0;
  while (t <= maxDist) {
    const id = world.getBlock(x, y, z);
    if (id !== B.AIR && !Blocks.isLiquid(id)) {
      return { x, y, z, nx, ny, nz, id, placeX: x + nx, placeY: y + ny, placeZ: z + nz };
    }
    // advance to whichever axis boundary is nearest
    if (tMaxX < tMaxY && tMaxX < tMaxZ) {
      x += stepX; t = tMaxX; tMaxX += tDeltaX; nx = -stepX; ny = 0; nz = 0;
    } else if (tMaxY < tMaxZ) {
      y += stepY; t = tMaxY; tMaxY += tDeltaY; nx = 0; ny = -stepY; nz = 0;
    } else {
      z += stepZ; t = tMaxZ; tMaxZ += tDeltaZ; nx = 0; ny = 0; nz = -stepZ;
    }
  }
  return null;
}

/* ===========================================================================
   SECTION 9 - PLAYER:  first-person camera + survival state
   Holds position/orientation, drives movement (walk/sprint/sneak/swim/jump),
   applies gravity + collision, and manages health, hunger, XP and levels.
   =========================================================================== */
class Player {
  constructor() {
    this.pos = new Vec3(0, 80, 0);   // feet position (centre on x/z)
    this.vel = new Vec3(0, 0, 0);
    this.yaw = 0;                     // left/right look (radians)
    this.pitch = 0;                   // up/down look, clamped to +-89deg
    this.half = PLAYER_W / 2;
    this.height = PLAYER_H;
    this.onGround = false;
    this.inWater = false;            // feet submerged
    this.headInWater = false;        // eyes submerged -> blue tint + slow
    this.spawn = new Vec3(0, 80, 0);

    this.health = 20;                // 10 hearts (2 units each)
    this.maxHealth = 20;
    this.hunger = 20;                // 10 drumsticks
    this.maxHunger = 20;
    this.saturation = 5;            // hidden buffer that drains before hunger
    this.air = 10; this.maxAir = 10; // breath underwater (bubbles); drowning below 0
    this.xp = 0;                     // total xp points
    this.level = 0;
    this.exhaustion = 0;             // builds up from activity, drains hunger
    this.dead = false;

    this._fallPeak = this.pos.y;     // highest y reached while airborne
    this._sprint = false;
    this._lastWTap = -1;             // for double-tap-W sprint
    // sprint stamina: a ~7s budget that drains while sprinting; when fully spent
    // it locks out for a cooldown, then refills. Recharges slowly when idle.
    this.sprintMax = 7; this.sprintStamina = 7; this.sprintCD = 0; this.sprintCDMax = 7;
    this.sprinting = false;
    this._regenTimer = 0;
    this._hungerTimer = 0;
    this._starveTimer = 0;
  }

  // camera eye position
  eye() { return new Vec3(this.pos.x, this.pos.y + PLAYER_EYE, this.pos.z); }
  // unit look direction from yaw/pitch
  forward() {
    const cp = Math.cos(this.pitch);
    return new Vec3(cp * Math.sin(this.yaw), Math.sin(this.pitch), -cp * Math.cos(this.yaw));
  }

  // apply a mouse delta (already scaled by sensitivity)
  look(dx, dy) {
    this.yaw += dx;
    this.pitch -= dy;
    const lim = Math.PI / 2 - 0.02;          // clamp pitch to ~+-89 degrees
    this.pitch = clamp(this.pitch, -lim, lim);
    // keep yaw in a sane range
    if (this.yaw > Math.PI) this.yaw -= 2 * Math.PI;
    if (this.yaw < -Math.PI) this.yaw += 2 * Math.PI;
  }

  /* Per-tick simulation. `in` is the InputManager; `dt` a fixed sub-step. */
  update(world, input, dt, audio) {
    // ---- environment sampling --------------------------------------
    const eye = this.eye();
    this.headInWater = world.getBlock(Math.floor(eye.x), Math.floor(eye.y), Math.floor(eye.z)) === B.WATER;
    this.inWater = world.getBlock(Math.floor(this.pos.x), Math.floor(this.pos.y + 0.3), Math.floor(this.pos.z)) === B.WATER;
    const inLava = world.getBlock(Math.floor(this.pos.x), Math.floor(this.pos.y + 0.3), Math.floor(this.pos.z)) === B.LAVA;

    // ---- decide movement state -------------------------------------
    const sneaking = input.isDown('ShiftLeft') || input.isDown('ShiftRight');
    // sprint: double-tap-W (or hold Ctrl) while moving forward, gated by a 7s
    // stamina budget + a hard cooldown once it's fully spent.
    const wantSprint = (input.sprintLatch || input.isDown('ControlLeft')) && !sneaking
                       && input.isDown('KeyW') && this.hunger > 0;
    if (this.sprintCD > 0) {                            // locked out, recovering
      this.sprintCD -= dt; this.sprinting = false;
      if (this.sprintCD <= 0) { this.sprintCD = 0; this.sprintStamina = this.sprintMax; }
    } else if (wantSprint && this.sprintStamina > 0) {  // actively sprinting -> drain
      this.sprinting = true;
      this.sprintStamina -= dt;
      if (this.sprintStamina <= 0) { this.sprintStamina = 0; this.sprintCD = this.sprintCDMax; this.sprinting = false; }
    } else {                                            // idle -> slow recharge
      this.sprinting = false;
      this.sprintStamina = Math.min(this.sprintMax, this.sprintStamina + dt * 0.6);
    }
    const sprinting = this.sprinting;
    this._sprint = sprinting;

    // base speed (blocks/sec), modified by state
    let speed = 4.3;
    if (sprinting) speed *= 1.45;
    if (sneaking) speed *= 0.35;
    if (this.inWater || this.headInWater) speed *= 0.55;

    // desired horizontal direction from WASD relative to yaw
    const fx = Math.sin(this.yaw), fz = -Math.cos(this.yaw); // forward (horizontal)
    const rx = Math.cos(this.yaw), rz = Math.sin(this.yaw);  // right (horizontal)
    let mx = 0, mz = 0;
    if (input.isDown('KeyW')) { mx += fx; mz += fz; }
    if (input.isDown('KeyS')) { mx -= fx; mz -= fz; }
    if (input.isDown('KeyD')) { mx += rx; mz += rz; }
    if (input.isDown('KeyA')) { mx -= rx; mz -= rz; }
    const len = Math.hypot(mx, mz);
    if (len > 0) { mx /= len; mz /= len; }

    // set horizontal velocity directly for responsive controls
    this.vel.x = mx * speed;
    this.vel.z = mz * speed;

    // ---- vertical motion: gravity / buoyancy / jump ----------------
    if (this.headInWater || this.inWater || inLava) {
      // swimming: light buoyancy + drag. Hold Space to swim UP/surface, Shift to
      // dive DOWN; otherwise you bob and sink slowly.
      this.vel.y -= GRAVITY * 0.18 * dt;        // gentle sink
      this.vel.y *= 0.84;                       // water drag
      if (input.isDown('Space')) this.vel.y = inLava ? 1.8 : 4.2;        // kick to the surface
      else if (sneaking) this.vel.y = -3.2;                              // dive
      if (this.vel.y < -6) this.vel.y = -6;
    } else {
      this.vel.y -= GRAVITY * dt;
      if (this.vel.y < -TERMINAL_V) this.vel.y = -TERMINAL_V;
      if (input.isDown('Space') && this.onGround) {
        this.vel.y = JUMP_VELOCITY;
        this.exhaustion += sprinting ? 0.2 : 0.05;
      }
    }

    // ---- sneak ledge guard: don't walk off the edge while crouching --
    const wasGround = this.onGround;
    const before = this.pos.copy();
    Physics.move(world, this, dt);
    if (sneaking && wasGround && this.onGround && !this.inWater && !this.headInWater) {
      if (!this._hasSupportBelow(world)) {
        // revert horizontal movement that would leave us hanging in the air
        this.pos.x = before.x; this.pos.z = before.z;
        this.vel.x = 0; this.vel.z = 0;
      }
    }

    // ---- fall damage ----------------------------------------------
    if (!this.onGround && !this.inWater) {
      if (this.pos.y > this._fallPeak) this._fallPeak = this.pos.y;
    }
    if (this.onGround) {
      const fall = this._fallPeak - this.pos.y;
      if (fall > 3.0 && !this.inWater) {
        const dmg = Math.floor(fall - 3.0);
        if (dmg > 0) { this.damage(dmg, 'fell from a great height', audio); }
      }
      this._fallPeak = this.pos.y;
    }
    // lava burns
    if (inLava) this.damage(0.0667, 'tried to swim in lava', audio); // ~2/sec at 60hz

    // ---- air / drowning ----
    if (this.headInWater) {
      this.air -= dt;                          // ~10 seconds of breath
      if (this.air <= 0) { this.air = 0; this._drownTimer = (this._drownTimer || 0) + dt; if (this._drownTimer >= 1) { this._drownTimer = 0; this.damage(2, 'drowned in the black water', audio); } }
    } else {
      this.air = Math.min(this.maxAir, this.air + dt * 6);   // refills quickly back at the surface
      this._drownTimer = 0;
    }

    // ---- exhaustion -> hunger -> health ----------------------------
    if (len > 0) this.exhaustion += (sprinting ? 0.06 : 0.012) * dt * 60;
    this._hungerTimer += dt;
    if (this.exhaustion >= 4) {
      this.exhaustion -= 4;
      if (this.saturation > 0) this.saturation = Math.max(0, this.saturation - 1);
      else this.hunger = Math.max(0, this.hunger - 1);
    }
    // regen when well fed, starve when empty
    if (this.hunger >= 18 && this.health < this.maxHealth) {
      this._regenTimer += dt;
      if (this._regenTimer > 3) { this._regenTimer = 0; this.health = Math.min(this.maxHealth, this.health + 1); this.exhaustion += 1; }
    } else if (this.hunger === 0) {
      this._starveTimer += dt;
      if (this._starveTimer > 2) { this._starveTimer = 0; this.damage(1, 'starved to death', audio); }
    }
    if (this.health <= 0 && !this.dead) this.die(audio);
  }

  // is there a solid block under any part of the footprint (for sneak guard)?
  _hasSupportBelow(world) {
    const y = Math.floor(this.pos.y - 0.05);
    for (const ox of [-this.half + 0.05, this.half - 0.05])
      for (const oz of [-this.half + 0.05, this.half - 0.05])
        if (Physics.solidAt(world, Math.floor(this.pos.x + ox), y, Math.floor(this.pos.z + oz))) return true;
    return false;
  }

  damage(amount, reason, audio) {
    if (this.dead) return;
    this.health = Math.max(0, this.health - amount);
    this.lastDamageReason = reason;
    if (amount >= 1 && audio) audio.play('hurt');
    if (typeof window.__onPlayerHurt === 'function') window.__onPlayerHurt();
  }
  heal(amount) { this.health = Math.min(this.maxHealth, this.health + amount); }
  feed(food, sat) { this.hunger = Math.min(this.maxHunger, this.hunger + food); this.saturation = Math.min(this.hunger, this.saturation + sat); }

  die(audio) {
    this.dead = true;
    if (audio) audio.play('die');
  }
  respawn() {
    this.dead = false;
    this.health = this.maxHealth;
    this.hunger = this.maxHunger;
    this.saturation = 5;
    this.air = this.maxAir;
    this.exhaustion = 0;
    this.pos = this.spawn.copy();
    this.vel.set(0, 0, 0);
    this._fallPeak = this.pos.y;
  }

  // ---- experience + levels --------------------------------------
  addXP(amount, audio) {
    this.xp += amount;
    const newLevel = Math.floor(this.xp / 100);
    if (newLevel > this.level) {
      this.level = newLevel;
      if (audio) audio.play('levelup');
      if (typeof window.__onLevelUp === 'function') window.__onLevelUp(this.level);
    }
  }
  // fraction (0..1) of the way through the current level, for the XP bar
  xpFraction() { return (this.xp % 100) / 100; }
}

/* ===========================================================================
   SECTION 10 - INPUT MANAGER
   Centralises keyboard + mouse + pointer-lock. The game polls held keys, edge
   "pressed-this-frame" keys, accumulated mouse-look deltas and mouse buttons.
   =========================================================================== */
class InputManager {
  constructor(canvas) {
    this.canvas = canvas;
    this.down = new Set();          // currently-held key codes
    this.justPressed = new Set();   // pressed since last endFrame()
    this.mdx = 0; this.mdy = 0;     // accumulated pointer-lock mouse movement
    this.locked = false;
    this.leftHeld = false;          // mining
    this.rightHeld = false;
    this.rightJust = false;         // place edge
    this.leftJust = false;          // attack edge
    this.middleJust = false;        // pick-block edge
    this.wheel = 0;                 // hotbar scroll accumulator
    this.sprintLatch = false;       // set by double-tap-W
    this._lastW = -1;
    this.enabled = true;            // ignored while menus are open
    this._bind();
  }
  _bind() {
    addEventListener('keydown', e => {
      // stop the browser hijacking gameplay keys
      if (['F5', 'F9', 'Tab', 'Space', 'KeyE'].includes(e.code) && this.locked) e.preventDefault();
      if (e.code === 'F5' || e.code === 'F9') e.preventDefault();
      if (e.repeat) return;
      this.down.add(e.code);
      this.justPressed.add(e.code);
      // double-tap W within 280ms toggles the sprint latch
      if (e.code === 'KeyW') {
        const now = performance.now();
        if (now - this._lastW < 280) this.sprintLatch = true;
        this._lastW = now;
      }
    });
    addEventListener('keyup', e => {
      this.down.delete(e.code);
      if (e.code === 'KeyW') this.sprintLatch = false;
    });
    // pointer-lock-aware mouse look
    addEventListener('mousemove', e => {
      if (this.locked) { this.mdx += e.movementX; this.mdy += e.movementY; }
    });
    addEventListener('mousedown', e => {
      if (!this.locked) return;
      if (e.button === 0) { this.leftHeld = true; this.leftJust = true; }
      else if (e.button === 2) { this.rightHeld = true; this.rightJust = true; }
      else if (e.button === 1) { this.middleJust = true; }
    });
    addEventListener('mouseup', e => {
      if (e.button === 0) this.leftHeld = false;
      else if (e.button === 2) this.rightHeld = false;
    });
    addEventListener('contextmenu', e => e.preventDefault());
    addEventListener('wheel', e => { if (this.locked) this.wheel += Math.sign(e.deltaY); }, { passive: true });
    document.addEventListener('pointerlockchange', () => {
      this.locked = (document.pointerLockElement === this.canvas);
    });
  }
  requestLock() { this.canvas.requestPointerLock?.(); }
  exitLock() { document.exitPointerLock?.(); }
  isDown(code) { return this.down.has(code); }
  wasPressed(code) { return this.justPressed.has(code); }
  consumeMouse() { const d = { dx: this.mdx, dy: this.mdy }; this.mdx = 0; this.mdy = 0; return d; }
  // clear per-frame edge state at the end of a game tick
  endFrame() {
    this.justPressed.clear();
    this.rightJust = false; this.leftJust = false; this.middleJust = false; this.wheel = 0;
  }
}

/* ===========================================================================
   SECTION 11 - AUDIO ENGINE
   Every sound is synthesised live with the Web Audio API - oscillators for
   tones, filtered noise for impacts. Includes a calm ambient pad and the
   looping victory fanfare for the win sequence.
   =========================================================================== */
class AudioEngine {
  constructor() {
    this.ctx = null; this.master = null; this.volume = 0.6;
    this.musicOn = true; this._ambient = null; this._fanfare = null;
    this._mood = 0;                  // 0 = night (brooding) .. 1 = day (cheery)
    this.clipEls = null; this._clipsLoaded = false;   // external mp3 SFX (HTMLAudioElement-based so they work under file://)
  }
  setMood(daylight) { this._mood = daylight; }
  // the AudioContext can only start after a user gesture
  ensure() {
    if (!this.ctx) {
      const AC = window.AudioContext || window.webkitAudioContext;
      this.ctx = new AC();
      this.master = this.ctx.createGain();
      this.master.gain.value = this.volume;
      this.master.connect(this.ctx.destination);
    }
    if (this.ctx.state === 'suspended') this.ctx.resume();
    this.loadClips();
  }
  setVolume(v) { this.volume = v; if (this.master) this.master.gain.value = v; }
  // load the external SFX mp3s (served from the project folder, too big to embed) as
  // HTMLAudioElements. This works under file:// (a plain <audio>/media load), unlike
  // fetch()+decodeAudioData which the browser BLOCKS for local files. Filenames have
  // spaces -> encodeURI. The synth SFX still go through Web Audio; only these clips use elements.
  loadClips() {
    if (this._clipsLoaded) return;
    this._clipsLoaded = true;
    const files = {
      scream_male: 'long male scream.mp3',
      scream_echo: 'distorted monster echo scream.mp3',
      scream_pain: 'cry of pain.mp3',
      scream_woman: 'woman screaming.mp3',
      heartbeat: 'heartbeat.mp3',
      breathing: 'heavy breathing.mp3',
      noise: 'ambient white noise.mp3',
    };
    this.clipEls = {};
    for (const key in files) {
      const el = new Audio(encodeURI(files[key]));
      el.preload = 'auto'; el.volume = 0;            // loops ramp up from silence (no startup blip)
      this.clipEls[key] = el;
    }
  }

  // a simple enveloped oscillator note
  _tone(freq, dur, type = 'sine', gain = 0.2, when = 0, slideTo = null) {
    if (!this.ctx) return;
    const t = this.ctx.currentTime + when;
    const o = this.ctx.createOscillator(), g = this.ctx.createGain();
    o.type = type; o.frequency.setValueAtTime(freq, t);
    if (slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(1, slideTo), t + dur);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(gain, t + 0.008);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g); g.connect(this.master);
    o.start(t); o.stop(t + dur + 0.02);
  }
  // a short burst of filtered white noise (digs/impacts/splashes)
  _noise(dur, gain = 0.2, when = 0, filterFreq = 1200, type = 'lowpass') {
    if (!this.ctx) return;
    const t = this.ctx.currentTime + when;
    const n = Math.floor(this.ctx.sampleRate * dur);
    const buf = this.ctx.createBuffer(1, n, this.ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / n);
    const src = this.ctx.createBufferSource(); src.buffer = buf;
    const f = this.ctx.createBiquadFilter(); f.type = type; f.frequency.value = filterFreq;
    const g = this.ctx.createGain(); g.gain.value = gain;
    src.connect(f); f.connect(g); g.connect(this.master);
    src.start(t);
  }

  play(name) {
    if (!this.ctx) return;
    switch (name) {
      case 'break':   this._noise(0.13, 0.25, 0, 900); this._tone(150, 0.1, 'square', 0.08); break;
      case 'place':   this._noise(0.05, 0.18, 0, 1600); this._tone(420, 0.05, 'square', 0.06); break;
      case 'mine':    this._noise(0.04, 0.12, 0, 2200); break;
      case 'step':    this._noise(0.05, 0.06, 0, 500); break;
      case 'hurt':    this._tone(300, 0.16, 'square', 0.18, 0, 150); break;
      case 'die':     this._tone(220, 0.7, 'triangle', 0.22, 0, 90); break;
      case 'jump':    this._tone(330, 0.08, 'sine', 0.06, 0, 460); break;
      case 'splash':  this._noise(0.25, 0.16, 0, 700); break;
      case 'xp':      this._tone(880, 0.07, 'sine', 0.1, 0, 1320); break;
      case 'hit':     this._noise(0.06, 0.18, 0, 1400); this._tone(180, 0.07, 'square', 0.1); break;
      case 'craft':   this._tone(523, 0.08, 'square', 0.12); this._tone(784, 0.1, 'square', 0.1, 0.08); break;
      case 'levelup': [523, 659, 784, 1046].forEach((f, i) => this._tone(f, 0.18, 'triangle', 0.14, i * 0.09)); break;
      case 'eat':     this._noise(0.12, 0.12, 0, 600); this._noise(0.12, 0.1, 0.14, 600); break;
    }
  }

  // ambient music that shifts with the time of day: a brooding low pad at night,
  // a brighter, bouncier little melody by day (mood is set each frame by the game)
  startAmbient() {
    if (!this.ctx || this._ambient) return;
    const night = [220, 261, 329, 293];                        // slow minor pad
    const day = [392, 494, 587, 659, 587, 494];                // cheerier major lilt
    let i = 0;
    const step = () => {
      if (!this._ambient) return;
      let interval = 3200;
      if (this.musicOn) {
        if (this._mood > 0.4) {                                 // daytime: light + lively
          const f = day[i % day.length];
          this._tone(f, 0.5, 'triangle', 0.05);
          this._tone(f * 1.5, 0.35, 'sine', 0.022, 0.16);       // a sparkle on top
          if (i % 2 === 0) this._tone(f / 2, 1.0, 'sine', 0.028);// a soft bass pulse
          interval = 700;
        } else {                                                // night: the original uneasy pad
          this._tone(night[i % night.length], 3.0, 'sine', 0.035, 0, night[(i + 1) % night.length]);
          interval = 3200;
        }
      }
      i++;
      this._ambient = setTimeout(step, interval);
    };
    this._ambient = setTimeout(step, 100);
  }
  stopAmbient() { if (this._ambient) { clearTimeout(this._ambient); this._ambient = null; } this.stopNoise(); }

  // ---- a looping clip element whose volume + playback-rate track a per-frame level.
  // Volume is eased toward the target each frame to avoid clicks. `gain` 0 => silent.
  _setLoop(key, gain, rate) {
    const el = this.clipEls && this.clipEls[key];
    if (!el) return;
    el.loop = true;
    if (rate != null) { try { el.playbackRate = rate; } catch (e) {} }
    const target = Math.max(0, Math.min(1, gain * this.volume));
    el.volume = el.volume + (target - el.volume) * 0.25;          // smooth ramp (driver runs every frame)
    if (gain > 0.004 && el.paused) el.play().catch(() => {});
  }
  _stopLoop(key) {
    const el = this.clipEls && this.clipEls[key];
    if (el) { try { el.pause(); el.currentTime = 0; el.volume = 0; } catch (e) {} }
  }

  // heavy breathing: louder/faster the higher the level (night; heaviest sprinting)
  setBreath(level) { this._breathLv = level; this._setLoop('breathing', level * 0.85, 0.9 + level * 0.4); }
  startBreath() {}
  stopBreath() { this._stopLoop('breathing'); this._breathLv = 0; }

  // heartbeat: pounds faster + louder as the watcher nears (level = its proximity)
  setHeartbeat(level) { this._heartLv = level; this._setLoop('heartbeat', level * 1.0, 0.82 + level * 0.55); }
  startHeart() {}
  stopHeart() { this._stopLoop('heartbeat'); this._heartLv = 0; }

  // a constant low white-noise wash, on all night under the music
  setAmbientNoise(level) { this._noiseLv = level; this._setLoop('noise', level * 0.35, 1); }
  stopNoise() { this._stopLoop('noise'); this._noiseLv = 0; }

  // ---- night "mimic" ambience: the creature throws obscured human screams/cries from
  // a distance. `level` (proximity) gates how often; 0 = silent (absent or on top of you).
  setHorror(level) { this._horrorLv = level; }
  _playScream() {
    if (!this.clipEls) return;
    const names = ['scream_male', 'scream_echo', 'scream_pain', 'scream_woman'];
    const el = this.clipEls[names[(Math.random() * names.length) | 0]];
    if (!el) return;
    const lv = clamp(this._horrorLv || 0, 0, 1);
    const node = el.cloneNode();                                  // a fresh element so overlapping screams don't cut each other
    node.volume = Math.max(0, Math.min(1, (0.12 + lv * lv * 0.92) * this.volume));  // faint far -> loud as you approach
    node.play().catch(() => {});
  }
  startHorror() {
    if (this._horror) return;
    const step = () => {
      if (!this._horror) return;
      const lv = this._horrorLv || 0;
      let interval = 14000;
      // one scream at a time, well spaced (~8-22s) so the clips don't pile up; a touch
      // more frequent when it's near, but never a cacophony
      if (lv > 0.05) { this._playScream(); interval = (9000 + Math.random() * 9000) * (1 - 0.5 * lv); }   // nearer -> more frequent too
      this._horror = setTimeout(step, Math.max(4500, interval));
    };
    this._horror = setTimeout(step, 6000 + Math.random() * 6000);   // don't scream the instant night falls
  }
  stopHorror() { if (this._horror) { clearTimeout(this._horror); this._horror = null; } this._horrorLv = 0; }

  // a triumphant looping fanfare for the victory screen
  startFanfare() {
    if (!this.ctx || this._fanfare) return;
    const mel = [
      [523, 0.2], [523, 0.2], [523, 0.2], [659, 0.5], [784, 0.4],
      [659, 0.2], [784, 0.6], [1046, 0.6], [880, 0.3], [784, 0.3], [659, 0.6],
    ];
    const playOnce = () => {
      if (!this._fanfare) return;
      let when = 0;
      for (const [f, d] of mel) { this._tone(f, d, 'square', 0.12, when); this._tone(f / 2, d, 'triangle', 0.06, when); when += d * 0.92; }
      this._fanfare = setTimeout(playOnce, when * 1000 + 400);
    };
    this._fanfare = setTimeout(playOnce, 50);
  }
  stopFanfare() { if (this._fanfare) { clearTimeout(this._fanfare); this._fanfare = null; } }

  // ---- horror audio: a proximity dread drone + whispers + scream -----
  // a continuous detuned low drone whose volume tracks how near the stalker is
  startDread() {
    if (!this.ctx || this._dread) return;
    const mk = (f) => { const o = this.ctx.createOscillator(); o.type = 'sawtooth'; o.frequency.value = f; return o; };
    const g = this.ctx.createGain(); g.gain.value = 0;
    const filt = this.ctx.createBiquadFilter(); filt.type = 'lowpass'; filt.frequency.value = 320;
    const o1 = mk(44), o2 = mk(44.6), o3 = mk(65.7);     // dissonant low cluster
    o1.connect(filt); o2.connect(filt); o3.connect(filt); filt.connect(g); g.connect(this.master);
    o1.start(); o2.start(); o3.start();
    this._dread = { g, o1, o2, o3, filt };
  }
  setDread(level) { if (this._dread) this._dread.g.gain.setTargetAtTime(clamp(level, 0, 1) * 0.5, this.ctx.currentTime, 0.4); }
  stopDread() {
    if (!this._dread) return;
    const d = this._dread; this._dread = null;
    try { d.g.gain.setTargetAtTime(0, this.ctx.currentTime, 0.3); setTimeout(() => { d.o1.stop(); d.o2.stop(); d.o3.stop(); }, 600); } catch (e) {}
  }
  // (silenced) the old synthesized whisper read as "shuffling sand"; the real mp3
  // screams/cries the player supplied now carry the creature's presence instead.
  whisper() {}
  // a loud dissonant jumpscare scream
  scream() {
    if (!this.ctx) return;
    this._noise(0.8, 0.5, 0, 3000, 'highpass');
    [330, 349, 466, 233].forEach((f, i) => this._tone(f, 0.9, 'sawtooth', 0.22, i * 0.02, f * 0.4));
    this._tone(1200, 0.5, 'square', 0.12, 0, 180);
  }
}

/* ===========================================================================
   SECTION 12 - ITEMS, INVENTORY, CRAFTING
   Blocks share their id with their item form (1..24). A few non-block items
   live above that range. The hotbar holds nine stacks; crafting consumes
   ingredients to make planks, the obsidian frame, eyes of ender and the
   End Crystal that wins the game.
   =========================================================================== */
const ITEM = {
  EYE: 200, END_CRYSTAL: 201, NETHER_FRAME: 202, PLUSHIE: 203, MEAT: 204, APPLE: 205, STICK: 206, NOTE: 207,
  // tools: PICK / AXE / SPADE / BLADE  ×  WOOD / STONE / IRON / DIAMOND
  WOOD_PICK: 210, WOOD_AXE: 211, WOOD_SPADE: 212, WOOD_BLADE: 213,
  STONE_PICK: 214, STONE_AXE: 215, STONE_SPADE: 216, STONE_BLADE: 217,
  IRON_PICK: 218, IRON_AXE: 219, IRON_SPADE: 220, IRON_BLADE: 221,
  DIAMOND_PICK: 222, DIAMOND_AXE: 223, DIAMOND_SPADE: 224, DIAMOND_BLADE: 225,
};
const ITEM_NAME = {
  [ITEM.EYE]: 'Watching Eye',
  [ITEM.END_CRYSTAL]: 'Waking Crystal',
  [ITEM.NETHER_FRAME]: 'Threshold Frame',
  [ITEM.PLUSHIE]: 'Warding Plushie',
  [ITEM.MEAT]: 'Roast Flesh',
  [ITEM.APPLE]: 'Bitter Apple',
  [ITEM.STICK]: 'Stick',
  [ITEM.NOTE]: 'Bloodied Note',
};
// tool registry: id -> { type:'pick'|'axe'|'shovel'|'sword', tier 1..4, mult (mine speed), dmg }
const TOOL_MULT = [0, 1.4, 2.2, 3.3, 4.6];          // index by tier (wood only a bit faster than fists)
const TOOLS = {};
(function () {
  const kinds = [['PICK', 'pick', 'Pick'], ['AXE', 'axe', 'Axe'], ['SPADE', 'shovel', 'Spade'], ['BLADE', 'sword', 'Blade']];
  const mats = [['WOOD', 1, 'Elderwood'], ['STONE', 2, 'Hushed'], ['IRON', 3, 'Iron'], ['DIAMOND', 4, 'Starlit']];
  for (const [mk, tier, mname] of mats) for (const [kk, type, kname] of kinds) {
    const id = ITEM[mk + '_' + kk];
    TOOLS[id] = { type, tier, mult: TOOL_MULT[tier], dmg: 4 + tier + (type === 'sword' ? 1 : 0) };
    ITEM_NAME[id] = mname + ' ' + kname;
  }
})();
// edible items: id -> { food (hunger points), sat (saturation) }
const FOOD = { [ITEM.MEAT]: { food: 8, sat: 6 }, [ITEM.APPLE]: { food: 4, sat: 2 } };
const isFood = id => FOOD[id] !== undefined;
const isBlockId = id => id >= 1 && id <= 29;
function itemName(id) { return isBlockId(id) ? Blocks.get(id).name : (ITEM_NAME[id] || '?'); }
function stackMax(id) { return TOOLS[id] ? 1 : (isBlockId(id) ? 64 : 16); }

const HOTBAR_SLOTS = 9, INV_SLOTS = 36;   // 9 hotbar (0-8) + 27 backpack (9-35)
class InventoryManager {
  constructor() {
    this.slots = [];
    for (let i = 0; i < INV_SLOTS; i++) this.slots.push({ id: 0, count: 0 });
    this.selected = 0;
    // a small starter kit for building, leaving slots free to collect drops
    const start = [[B.PLANKS, 32], [B.COBBLE, 32], [B.GLASS, 16], [B.WOOD, 16]];
    start.forEach((s, i) => { this.slots[i].id = s[0]; this.slots[i].count = s[1]; });
  }
  selectedItem() { return this.slots[this.selected]; }
  setSelected(i) { this.selected = ((i % HOTBAR_SLOTS) + HOTBAR_SLOTS) % HOTBAR_SLOTS; }
  scroll(dir) { this.setSelected(this.selected + dir); }
  count(id) { let n = 0; for (const s of this.slots) if (s.id === id) n += s.count; return n; }

  // add items, filling existing stacks first; returns the leftover that didn't fit.
  // `meta` (e.g. a note's message) makes the item non-stacking - one per slot.
  addItem(id, count, meta) {
    count = Math.max(0, count | 0); if (count === 0) return 0;   // never write negative stacks
    if (meta != null) {                                          // metadata items never merge
      for (const s of this.slots) { if (s.count === 0) { s.id = id; s.count = 1; s.meta = meta; if (--count <= 0) return 0; } }
      return count;
    }
    const max = stackMax(id);
    for (const s of this.slots) {
      if (s.id === id && !s.meta && s.count < max) { const a = Math.min(count, max - s.count); s.count += a; count -= a; if (count <= 0) return 0; }
    }
    for (const s of this.slots) {
      if (s.count === 0) { s.id = id; s.meta = undefined; const a = Math.min(count, max); s.count = a; count -= a; if (count <= 0) return 0; }
    }
    return count;
  }
  // remove up to `count` of an id from anywhere; returns how many were removed
  removeItem(id, count) {
    let removed = 0;
    for (const s of this.slots) {
      if (s.id === id && s.count > 0) {
        const a = Math.min(count - removed, s.count);
        s.count -= a; removed += a;
        if (s.count === 0) { s.id = 0; s.meta = undefined; }
        if (removed >= count) break;
      }
    }
    return removed;
  }
  consumeSelected(n = 1) {
    const s = this.selectedItem();
    if (s.count <= 0) return false;
    s.count -= n; if (s.count <= 0) { s.id = 0; s.count = 0; s.meta = undefined; }
    return true;
  }
  // can `count` of `id` fully fit (without destroying it)? (conservative)
  canFit(id, count) {
    const max = stackMax(id);
    let room = 0;
    for (const s of this.slots) {
      if (s.count === 0) room += max;
      else if (s.id === id && !s.meta) room += (max - s.count);
      if (room >= count) return true;
    }
    return room >= count;
  }
}

class CraftingSystem {
  constructor() {
    // each recipe: ingredients (id->count), result, optional minLevel gate.
    // `basic` recipes can be made from the inventory (press C); everything else
    // needs a Workbench (right-click a placed crafting table).
    this.recipes = [
      { name: 'Hewn Planks (x4)', out: { id: B.PLANKS, count: 4 }, in: [{ id: B.WOOD, count: 1 }], basic: true },
      { name: 'Sticks (x4)',      out: { id: ITEM.STICK, count: 4 }, in: [{ id: B.PLANKS, count: 2 }], basic: true },
      { name: 'Workbench',        out: { id: B.CRAFT_TABLE, count: 1 }, in: [{ id: B.PLANKS, count: 4 }], basic: true },
      { name: 'Cairnstone',       out: { id: B.STONE, count: 1 },  in: [{ id: B.COBBLE, count: 1 }] },
      { name: 'Kiln-Fired Brick (x2)', out: { id: B.BRICKS, count: 2 }, in: [{ id: B.SAND, count: 2 }] },
      { name: 'Hollow Door',      out: { id: B.DOOR, count: 1 },   in: [{ id: B.PLANKS, count: 6 }] },
      { name: 'Cot (Bed)',        out: { id: B.BED, count: 1 },    in: [{ id: B.PLANKS, count: 4 }, { id: B.LEAVES, count: 2 }] },
      { name: 'Watching Eye',     out: { id: ITEM.EYE, count: 1 }, in: [{ id: B.DIAMOND, count: 1 }, { id: B.REDSTONE, count: 1 }] },
      { name: 'Threshold Frame',  out: { id: ITEM.NETHER_FRAME, count: 1 }, in: [{ id: B.OBSIDIAN, count: 4 }], minLevel: 10 },
      { name: 'Waking Crystal',   out: { id: ITEM.END_CRYSTAL, count: 1 }, in: [{ id: B.DIAMOND, count: 1 }, { id: B.GOLD, count: 1 }, { id: ITEM.EYE, count: 1 }] },
    ];
    // tiered tools (Workbench only): a material block + sticks
    const mats = [['WOOD', B.PLANKS], ['STONE', B.COBBLE], ['IRON', B.IRON], ['DIAMOND', B.DIAMOND]];
    const kinds = [['PICK', 3], ['AXE', 3], ['SPADE', 1], ['BLADE', 2]];
    for (const [mk, mat] of mats) for (const [kk, mcount] of kinds) {
      const id = ITEM[mk + '_' + kk];
      this.recipes.push({ name: itemName(id), out: { id, count: 1 }, in: [{ id: mat, count: mcount }, { id: ITEM.STICK, count: kk === 'BLADE' ? 1 : 2 }] });
    }
  }
  canCraft(r, inv, player, atTable) {
    if (!r.basic && !atTable) return false;            // advanced recipes need a workbench
    if (r.minLevel && player.level < r.minLevel) return false;
    return r.in.every(ing => inv.count(ing.id) >= ing.count);
  }
  craft(r, inv, player, atTable) {
    if (!this.canCraft(r, inv, player, atTable)) return false;
    // remove ingredients first (which frees slots), then try to place the output;
    // if it doesn't fit, roll back so ingredients are never destroyed
    const snap = inv.slots.map(s => ({ id: s.id, count: s.count }));
    r.in.forEach(ing => inv.removeItem(ing.id, ing.count));
    if (inv.addItem(r.out.id, r.out.count) !== 0) { inv.slots = snap; return false; }
    return true;
  }
}

/* ===========================================================================
   SECTION 13 - MOBS + XP ORBS
   Lightweight cube creatures that wander, fall with gravity and collide with
   the world via the shared Physics. Lurkers chase the player at night and
   bite on contact; killing a mob spawns green XP orbs that drift to the
   player. Both mobs and orbs are drawn as dynamic cubes by the world shader.
   =========================================================================== */
class Mob {
  constructor(type, x, y, z) {
    this.type = type;                       // 'critter' (passive) | 'lurker' (hostile)
    this.pos = new Vec3(x, y, z);
    this.vel = new Vec3(0, 0, 0);
    this.half = 0.4; this.height = 0.9;
    this.onGround = false;
    this.health = type === 'lurker' ? 24 : 16;     // tankier - bare fists shouldn't drop one in two hits
    this.dir = Math.random() * Math.PI * 2;
    this.wander = 0;
    this.attackCd = 0;
    this.alive = true;
    this.flash = 0;                          // hit flash timer
    this.fx = 0; this.fz = 1;                // facing direction (for the model)
    this.walk = Math.random() * 6;           // leg-swing phase
  }
}
class XpOrb {
  constructor(x, y, z, value) {
    this.pos = new Vec3(x, y, z); this.vel = new Vec3((Math.random() - 0.5) * 2, 3, (Math.random() - 0.5) * 2);
    this.value = value; this.age = 0; this.alive = true; this.half = 0.12; this.height = 0.24; this.onGround = false;
  }
}

class MobManager {
  constructor(world) {
    this.world = world;
    this.mobs = [];
    this.orbs = [];
    this.drops = [];                         // dropped block items the player walks over
    this.spawnTimer = 0;
    this.cap = 14;                           // max mobs near the player
  }

  // try to place a mob on a valid surface in a ring around the player
  trySpawn(player, night) {
    if (this.mobs.length >= this.cap) return;
    const ang = Math.random() * Math.PI * 2;
    const dist = 16 + Math.random() * 20;
    const x = Math.floor(player.pos.x + Math.cos(ang) * dist);
    const z = Math.floor(player.pos.z + Math.sin(ang) * dist);
    // only spawn where the world is actually generated (so the mob has ground)
    const ch = this.world.getChunk(Math.floor(x / CHUNK_SX), Math.floor(z / CHUNK_SZ));
    if (!ch || !ch.generated) return;
    // find ground height by scanning down from the surface estimate
    const h = this.world.heightAt(x, z);
    if (h <= SEA_LEVEL) return;               // no spawning in the sea
    const top = this.world.getBlock(x, h, z);
    if (top === B.WATER || top === B.LAVA) return;
    // only passive critters now (the Stalker is the only thing that hunts you)
    this.mobs.push(new Mob('critter', x + 0.5, h + 1, z + 0.5));
  }

  update(player, dt, night, audio, inventory) {
    this.spawnTimer += dt;
    if (this.spawnTimer > 2.5) { this.spawnTimer = 0; this.trySpawn(player, night); }

    for (const m of this.mobs) {
      if (!m.alive) continue;
      if (m.flash > 0) m.flash -= dt;
      // despawn anything that wandered too far away
      const dx = m.pos.x - player.pos.x, dz = m.pos.z - player.pos.z;
      const d2 = dx * dx + dz * dz;
      if (d2 > 80 * 80) { m.alive = false; continue; }

      // ---- passive wandering ----
      m.wander -= dt;
      if (m.wander <= 0) { m.dir = Math.random() * Math.PI * 2; m.wander = 1 + Math.random() * 3; }
      const tx = Math.cos(m.dir), tz = Math.sin(m.dir);
      const sp = 1.8;
      m.vel.x = tx * sp; m.vel.z = tz * sp;
      // face the way it's walking + advance the leg-swing phase
      const ml = Math.hypot(m.vel.x, m.vel.z);
      if (ml > 0.05) { m.fx = m.vel.x / ml; m.fz = m.vel.z / ml; }
      m.walk += dt * (4 + ml);
      m.vel.y -= GRAVITY * dt; if (m.vel.y < -TERMINAL_V) m.vel.y = -TERMINAL_V;
      // step up 1-block ledges: if a block is directly ahead at foot height but
      // the two cells above it are clear, lift the mob onto the step (animals
      // were getting stuck on single-block rises before)
      if (m.onGround) {
        const ax = Math.floor(m.pos.x + tx * 0.5), az = Math.floor(m.pos.z + tz * 0.5), fy = Math.floor(m.pos.y + 0.1);
        // a ledge ahead at foot height, AND the mob's whole box fits one block up
        if (Physics.solidAt(this.world, ax, fy, az) &&
            !Physics.boxHitsSolid(this.world, { x: m.pos.x, y: fy + 1.0, z: m.pos.z }, m.half, m.height)) {
          m.pos.y = fy + 1.0;                 // climb onto the ledge
          if (m.vel.y < 0) m.vel.y = 0;
        }
      }
      Physics.move(this.world, m, dt);
    }
    this.mobs = this.mobs.filter(m => m.alive);

    // ---- XP orbs: gravity, then magnet toward the player + pickup -----
    for (const o of this.orbs) {
      o.age += dt;
      const dx = player.pos.x - o.pos.x, dy = (player.pos.y + 0.8) - o.pos.y, dz = player.pos.z - o.pos.z;
      const d = Math.hypot(dx, dy, dz);
      if (d < 1.0) { o.alive = false; player.addXP(o.value, audio); audio && audio.play('xp'); continue; }
      if (d < 4.5 && o.age > 0.4) {                       // magnet pull
        o.vel.x = dx / d * 6; o.vel.z = dz / d * 6; o.vel.y = dy / d * 6;
        o.pos = o.pos.addScaled(o.vel, dt);
      } else {
        o.vel.y -= GRAVITY * dt;
        Physics.move(this.world, o, dt);
      }
      if (o.age > 60) o.alive = false;                    // expire eventually
    }
    this.orbs = this.orbs.filter(o => o.alive);

    // ---- dropped block items: fall, then get picked up on contact -----
    for (const it of this.drops) {
      it.age += dt;
      it.vel.y -= GRAVITY * dt;
      Physics.move(this.world, it, dt);
      // no magnet: drops sit where they land and you collect them by walking over them
      const dx = player.pos.x - it.pos.x, dy = (player.pos.y + 0.8) - it.pos.y, dz = player.pos.z - it.pos.z;
      const d = Math.hypot(dx, dy, dz);
      if (d < 1.5 && it.age > 0.4 && inventory) {
        const left = inventory.addItem(it.id, it.count, it.meta);
        if (left <= 0) { it.alive = false; audio && audio.play('place'); }
        else it.count = left;                              // inventory full: leave the rest
      }
      if (it.age > 60) it.alive = false;                   // despawn after a minute
    }
    this.drops = this.drops.filter(it => it.alive);
  }

  // damage the mob nearest to where the player is looking (called on attack)
  attack(player, audio, inv) {
    const eye = player.eye(), dir = player.forward();
    let best = null, bestT = 3.1;          // melee reach is much shorter than block reach (REACH)
    for (const m of this.mobs) {
      // ray-vs-sphere-ish: project mob centre onto the look ray
      const cx = m.pos.x, cy = m.pos.y + m.height / 2, cz = m.pos.z;
      const ox = cx - eye.x, oy = cy - eye.y, oz = cz - eye.z;
      const t = ox * dir.x + oy * dir.y + oz * dir.z;       // distance along ray
      if (t < 0 || t > bestT) continue;
      const px = eye.x + dir.x * t, py = eye.y + dir.y * t, pz = eye.z + dir.z * t;
      const dist = Math.hypot(px - cx, py - cy, pz - cz);
      if (dist < 0.7) { best = m; bestT = t; }
    }
    if (best) {
      // a blade hits harder than bare fists (or a non-weapon tool)
      const held = inv && TOOLS[inv.selectedItem().id];
      const dmg = (held && held.type === 'sword') ? held.dmg : 4;
      best.health -= dmg; best.flash = 0.18;
      audio && audio.play('hit');
      // knockback
      best.vel.x += dir.x * 4; best.vel.z += dir.z * 4; best.vel.y += 3;
      if (best.health <= 0) { best.alive = false; this._onKill(best, inv); }
      return true;
    }
    return false;
  }
  _onKill(m, inv) {
    for (let i = 0; i < 2; i++) this.orbs.push(new XpOrb(m.pos.x, m.pos.y + 0.4, m.pos.z, 5));
    // critters (animals) drop meat -> the main food source
    if (inv) inv.addItem(ITEM.MEAT, 1 + (Math.random() < 0.5 ? 1 : 0));
  }

  /* Build one dynamic mesh of all mobs + orbs + drops for the renderer.
     Mobs are proper multi-part models (a 4-legged pig, a shambling humanoid). */
  buildMesh() {
    const v = [], i = [];
    const T = { pigSkin: 'pig_skin', pigSnout: 'pig_snout', pigFace: 'pig_face' };
    for (const m of this.mobs) {
      const bright = m.flash > 0 ? 1.7 : 1.0;
      const cos = -m.fz, sin = m.fx;                  // orient toward facing (local -Z front)
      const ox = m.pos.x, oy = m.pos.y, oz = m.pos.z;
      const swing = Math.sin(m.walk) * 0.18;          // leg swing
      const part = (lx, ly, lz, sx, sy, sz, name) =>
        boxRotTile(v, i, ox, oy, oz, cos, sin, lx, ly, lz, sx, sy, sz, Blocks._tileNames[name], bright);
      // pig: low wide body + head + snout + 4 legs (front/back legs counter-swing)
      part(-0.28, 0.34, -0.34, 0.56, 0.42, 0.7, T.pigSkin);          // body
      part(-0.22, 0.42, -0.62, 0.44, 0.4, 0.26, T.pigFace);         // head
      part(-0.12, 0.46, -0.74, 0.24, 0.18, 0.12, T.pigSnout);       // snout
      part(-0.26, 0, -0.30 + swing, 0.16, 0.34, 0.16, T.pigSkin);   // front-left leg
      part(0.10, 0, -0.30 - swing, 0.16, 0.34, 0.16, T.pigSkin);    // front-right leg
      part(-0.26, 0, 0.18 - swing, 0.16, 0.34, 0.16, T.pigSkin);    // back-left leg
      part(0.10, 0, 0.18 + swing, 0.16, 0.34, 0.16, T.pigSkin);     // back-right leg
    }
    // XP orbs: little spinning glowing-green gems (not face cubes)
    const gem = Blocks._tileNames['xp_gem'];
    for (const o of this.orbs) {
      const bob = Math.sin(o.age * 6) * 0.06, a = o.age * 3;
      boxRotTile(v, i, o.pos.x, o.pos.y + 0.14 + bob, o.pos.z, Math.cos(a), Math.sin(a), -0.11, -0.11, -0.11, 0.22, 0.22, 0.22, gem, 1.6, 2);
    }
    // dropped block items: small bobbing cubes of the block's own texture
    for (const it of this.drops) {
      const bob = Math.sin(it.age * 4) * 0.08;
      const tile = Blocks.faceTile(it.id, 2);
      appendCube(v, i, it.pos.x - 0.18, it.pos.y + bob, it.pos.z - 0.18, 0.36, 0.36, 0.36, tile, 1.0, Blocks.get(it.id).anim || 0);
    }
    return { verts: new Float32Array(v), idx: new Uint32Array(i) };
  }
}

// like boxRot, but maps a block-atlas TILE (by index) to all faces (with the
// half-pixel inset) instead of an explicit UV rect - for mob body parts
function boxRotTile(v, idx, ox, oy, oz, cos, sin, lx, ly, lz, sx, sy, sz, tile, bright, anim, flipY, lean) {
  const T = Blocks.TILE, COLS = Blocks.COLS, eps = 0.5, aw = Blocks.atlas.width, ah = Blocks.atlas.height;
  const col = tile % COLS, row = (tile / COLS) | 0, px0 = col * T, py0 = row * T;
  const u0 = (px0 + eps) / aw, u1 = (px0 + T - eps) / aw, v0 = (py0 + eps) / ah, v1 = (py0 + T - eps) / ah;
  boxRot(v, idx, ox, oy, oz, cos, sin, lx, ly, lz, sx, sy, sz, u0, v0, u1, v1, bright === undefined ? 1 : bright, anim || 0, flipY, lean);
}

// append a single textured cube to a (verts, idx) mesh buffer
function appendCube(v, idx, x, y, z, sx, sy, sz, tile, bright, anim) {
  const T = Blocks.TILE, COLS = Blocks.COLS, eps = 0.5;
  const atlasW = Blocks.atlas.width, atlasH = Blocks.atlas.height;
  const col = tile % COLS, row = (tile / COLS) | 0;
  const px0 = col * T, py0 = row * T;
  for (let f = 0; f < 6; f++) {
    const fd = FACE_DATA[f];
    const base = v.length / 7;
    for (let k = 0; k < 4; k++) {
      const vp = fd.verts[k], uvc = fd.uv[k];
      const u = (px0 + eps + uvc[0] * (T - 2 * eps)) / atlasW;
      const vv = (py0 + eps + uvc[1] * (T - 2 * eps)) / atlasH;
      v.push(x + vp[0] * sx, y + vp[1] * sy, z + vp[2] * sz, u, vv, fd.shade * bright, anim);
    }
    idx.push(base, base + 1, base + 2, base, base + 2, base + 3);
  }
}

// append a "cross" billboard (two perpendicular quads) for a flat sprite prop,
// mapping a UV rect of the bound texture; alpha-tested so the sprite cuts out
function appendCross(v, idx, cx, by, cz, w, h, u0, v0, u1, v1, bright) {
  const hw = w / 2;
  const quad = (p0, p1, p2, p3) => {
    const base = v.length / 7;
    v.push(p0[0], p0[1], p0[2], u0, v1, bright, 0);
    v.push(p1[0], p1[1], p1[2], u1, v1, bright, 0);
    v.push(p2[0], p2[1], p2[2], u1, v0, bright, 0);
    v.push(p3[0], p3[1], p3[2], u0, v0, bright, 0);
    idx.push(base, base + 1, base + 2, base, base + 2, base + 3);
  };
  quad([cx - hw, by, cz], [cx + hw, by, cz], [cx + hw, by + h, cz], [cx - hw, by + h, cz]); // along X
  quad([cx, by, cz - hw], [cx, by, cz + hw], [cx, by + h, cz + hw], [cx, by + h, cz - hw]); // along Z
}

// append one flat, upward-facing quad lying on the ground (a decal: blood,
// footprints), rotated by `rot` radians around Y and mapped to an atlas tile
function appendDecal(v, idx, cx, y, cz, w, h, rot, tile, bright) {
  const T = Blocks.TILE, COLS = Blocks.COLS, eps = 0.5, aW = Blocks.atlas.width, aH = Blocks.atlas.height;
  const col = tile % COLS, row = (tile / COLS) | 0, px0 = col * T, py0 = row * T;
  const u0 = (px0 + eps) / aW, u1 = (px0 + T - eps) / aW, v0 = (py0 + eps) / aH, v1 = (py0 + T - eps) / aH;
  const c = Math.cos(rot), s = Math.sin(rot), hw = w / 2, hh = h / 2;
  const cn = (sx, sz) => [cx + sx * hw * c - sz * hh * s, y, cz + sx * hw * s + sz * hh * c];
  const p0 = cn(-1, -1), p1 = cn(1, -1), p2 = cn(1, 1), p3 = cn(-1, 1);
  const base = v.length / 7;
  v.push(p0[0], p0[1], p0[2], u0, v1, bright, 0);
  v.push(p1[0], p1[1], p1[2], u1, v1, bright, 0);
  v.push(p2[0], p2[1], p2[2], u1, v0, bright, 0);
  v.push(p3[0], p3[1], p3[2], u0, v0, bright, 0);
  idx.push(base, base + 1, base + 2, base, base + 2, base + 3);
}

// append an axis-aligned cuboid (origin = min corner, size sx/sy/sz) with a
// per-face tile list [top,bottom,N,S,W,E] and a flat base brightness. `skip`
// (optional, 6 booleans) culls hidden faces (e.g. the seam between bed halves).
function appendCuboid(v, idx, ox, oy, oz, sx, sy, sz, tiles, light, skip) {
  const T = Blocks.TILE, COLS = Blocks.COLS, eps = 0.5, aW = Blocks.atlas.width, aH = Blocks.atlas.height;
  for (let f = 0; f < 6; f++) {
    if (skip && skip[f]) continue;
    const fd = FACE_DATA[f], tile = tiles[f];
    const col = tile % COLS, row = (tile / COLS) | 0, px0 = col * T, py0 = row * T;
    const base = v.length / 7, lf = fd.shade * light;
    for (let k = 0; k < 4; k++) {
      const vp = fd.verts[k], uvc = fd.uv[k];
      const u = (px0 + eps + uvc[0] * (T - 2 * eps)) / aW;
      const vv = (py0 + eps + uvc[1] * (T - 2 * eps)) / aH;
      v.push(ox + vp[0] * sx, oy + vp[1] * sy, oz + vp[2] * sz, u, vv, lf, 0);
    }
    idx.push(base, base + 1, base + 2, base, base + 2, base + 3);
  }
}

// a real 2-block bed: a low mattress slab (red quilt top, timber-frame sides) +
// a raised pale pillow at the HEAD end. The bed is two adjacent B.BED cells; this
// emits ONE cell, finding its partner to orient the pillow and hide the seam.
function appendBed(v, idx, world, wx, wy, wz, light) {
  const TN = Blocks._tileNames;
  const bl = TN['bed_blanket'], fr = TN['bed_frame'], pw = TN['bed_pillow'];
  const matTiles = [bl, fr, fr, fr, fr, fr];          // top, bottom, N, S, W, E
  const pilTiles = [pw, pw, pw, pw, pw, pw];
  // locate the partner cell (the other half of the 2-long bed)
  let pdx = 0, pdz = 0;
  for (const d of [[1, 0], [-1, 0], [0, 1], [0, -1]]) {
    if (world.getBlock(wx + d[0], wy, wz + d[1]) === B.BED) { pdx = d[0]; pdz = d[1]; break; }
  }
  // mattress slab: inset 0.04 on the OUTER sides, but EXTENDED to the full cell edge
  // on the partner side so the two halves physically butt (no see-through seam gap),
  // then skip the now-shared seam face + the ground-facing bottom.
  const skip = [0, 1, 0, 0, 0, 0];
  let mx = wx + 0.04, mz = wz + 0.04, msx = 0.92, msz = 0.92;
  if (pdx === 1) { skip[5] = 1; msx = 0.96; }                      // extend +X to the cell edge
  else if (pdx === -1) { skip[4] = 1; mx = wx; msx = 0.96; }       // extend -X
  else if (pdz === 1) { skip[3] = 1; msz = 0.96; }                 // extend +Z
  else if (pdz === -1) { skip[2] = 1; mz = wz; msz = 0.96; }       // extend -Z
  appendCuboid(v, idx, mx, wy + 0.06, mz, msx, 0.40, msz, matTiles, light, skip);
  // pillow on the HEAD cell only (the higher-coordinate end -> partner toward -axis)
  if ((pdx + pdz) < 0) {
    const ox2 = -pdx, oz2 = -pdz;                     // outer direction (away from partner)
    const cx = 0.5 + ox2 * 0.30, cz = 0.5 + oz2 * 0.30;
    const hxw = (pdx !== 0) ? 0.16 : 0.32, hzw = (pdx !== 0) ? 0.32 : 0.16;
    appendCuboid(v, idx, wx + cx - hxw, wy + 0.40, wz + cz - hzw, hxw * 2, 0.20, hzw * 2, pilTiles, light * 1.05);
  }
}

/* ===========================================================================
   SECTION 14 - DAY/NIGHT SKY COLOURS  (shared by the sky + the fog)
   Maps the normalised day time (0=midnight, 0.25=sunrise, 0.5=noon,
   0.75=sunset) to gradient colours, a sun tint, an ambient daylight level
   and a star opacity.
   =========================================================================== */
function skyColors(t) {
  const elev = Math.sin((t - 0.25) * Math.PI * 2);   // sun height: -1..1
  const d = clamp((elev + 0.15) / 0.6, 0, 1);        // daylight strength
  const dayZen = [70, 140, 225], dayMid = [110, 175, 232], dayHor = [150, 205, 235];
  const nZen = [6, 8, 28], nMid = [14, 17, 42], nHor = [26, 30, 60];
  let zenith = mixRGB(nZen, dayZen, d), mid = mixRGB(nMid, dayMid, d), horizon = mixRGB(nHor, dayHor, d);
  const tw = clamp(1 - Math.abs(elev) / 0.22, 0, 1); // twilight band near the horizon
  horizon = mixRGB(horizon, [245, 120, 55], tw * 0.85);
  mid = mixRGB(mid, [220, 120, 90], tw * 0.5);
  const sunRGB = mixRGB([255, 235, 150], [255, 150, 70], tw);
  return { zenith, mid, horizon, sunColor: rgbStr(sunRGB), sunRGB, daylight: d, starAlpha: clamp(-elev * 1.6, 0, 1) };
}
// 3D sun direction for the given day time (noon overhead, rises/sets on an arc)
function sunDirection(t) {
  const a = (t - 0.25) * Math.PI * 2;
  const x = Math.cos(a) * 0.45, y = Math.sin(a), z = -0.4;
  const l = Math.hypot(x, y, z) || 1;
  return [x / l, y / l, z / l];
}

// project a world point through a view-projection matrix to screen px (or null)
function projectPoint(vp, x, y, z, W, H) {
  const cx = vp[0] * x + vp[4] * y + vp[8] * z + vp[12];
  const cy = vp[1] * x + vp[5] * y + vp[9] * z + vp[13];
  const cw = vp[3] * x + vp[7] * y + vp[11] * z + vp[15];
  if (cw <= 0.0001) return null;                       // behind the camera
  return { x: (cx / cw * 0.5 + 0.5) * W, y: (1 - (cy / cw * 0.5 + 0.5)) * H };
}

/* ===========================================================================
   SECTION 15 - UI MANAGER:  HUD, minimap, title animation, win sequence
   =========================================================================== */
class UIManager {
  constructor(game) {
    this.game = game;
    this.hud = document.getElementById('hud');
    this.ctx = this.hud.getContext('2d');
    this.W = 0; this.H = 0; this.dpr = 1;
    this.toastEl = document.getElementById('toast');
    this._toastTimer = 0;
    // offscreen minimap, refreshed a few times a second
    this.mini = document.createElement('canvas'); this.mini.width = 128; this.mini.height = 128;
    this.miniCtx = this.mini.getContext('2d');
    this._miniTimer = 99;
    this._menuRAF = null;
    this._winRAF = null;
  }
  resize() {
    this.dpr = Math.min(window.devicePixelRatio || 1, 2);
    this.W = window.innerWidth; this.H = window.innerHeight;
    this.hud.width = this.W * this.dpr; this.hud.height = this.H * this.dpr;
    this.hud.style.width = this.W + 'px'; this.hud.style.height = this.H + 'px';
    this.ctx.setTransform(this.dpr, 0, 0, this.dpr, 0, 0);
  }
  toast(msg, dur = 1.6) {
    this.toastEl.textContent = msg;
    this.toastEl.style.opacity = '1';
    this._toastTimer = dur;
  }

  // ---- draw a single item icon (block tile from the atlas, or a custom item)
  drawItemIcon(ctx, id, x, y, s) {
    if (id === 0) return;
    if (isBlockId(id)) {
      const tile = Blocks.faceTile(id, 2);            // representative (side) face
      const T = Blocks.TILE, col = tile % Blocks.COLS, row = (tile / Blocks.COLS) | 0;
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(Blocks.atlas, col * T, row * T, T, T, x, y, s, s);
    } else if (id === ITEM.MEAT) {                  // a cooked meat drumstick
      ctx.fillStyle = '#7a4a22'; ctx.beginPath(); ctx.ellipse(x + s*0.6, y + s*0.42, s*0.3, s*0.26, 0, 0, 7); ctx.fill();
      ctx.fillStyle = '#9c6230'; ctx.beginPath(); ctx.ellipse(x + s*0.56, y + s*0.4, s*0.18, s*0.16, 0, 0, 7); ctx.fill();
      ctx.fillStyle = '#f0e8d2'; ctx.save(); ctx.translate(x + s*0.5, y + s*0.55); ctx.rotate(-0.6); ctx.fillRect(-s*0.06, 0, s*0.12, s*0.4); ctx.restore();
      ctx.beginPath(); ctx.arc(x + s*0.22, y + s*0.8, s*0.1, 0, 7); ctx.fill();
    } else if (id === ITEM.APPLE) {                 // a red apple
      ctx.fillStyle = '#d33030'; ctx.beginPath(); ctx.arc(x + s*0.5, y + s*0.55, s*0.34, 0, 7); ctx.fill();
      ctx.fillStyle = '#ff7a6a'; ctx.beginPath(); ctx.arc(x + s*0.4, y + s*0.45, s*0.1, 0, 7); ctx.fill();
      ctx.strokeStyle = '#4a2a10'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(x + s*0.5, y + s*0.24); ctx.lineTo(x + s*0.56, y + s*0.12); ctx.stroke();
    } else if (id === ITEM.EYE) {
      ctx.fillStyle = '#2fd6b0'; ctx.beginPath(); ctx.arc(x + s/2, y + s/2, s*0.42, 0, 7); ctx.fill();
      ctx.fillStyle = '#0a3b33'; ctx.beginPath(); ctx.ellipse(x + s/2, y + s/2, s*0.12, s*0.26, 0, 0, 7); ctx.fill();
    } else if (id === ITEM.END_CRYSTAL) {
      ctx.fillStyle = '#d24cff'; ctx.beginPath();
      ctx.moveTo(x+s/2,y+2); ctx.lineTo(x+s-2,y+s/2); ctx.lineTo(x+s/2,y+s-2); ctx.lineTo(x+2,y+s/2); ctx.closePath(); ctx.fill();
      ctx.strokeStyle = '#fbe1ff'; ctx.stroke();
    } else if (id === ITEM.NETHER_FRAME) {
      const tile = Blocks.faceTile(B.OBSIDIAN, 0), T = Blocks.TILE;
      ctx.drawImage(Blocks.atlas, (tile % Blocks.COLS) * T, ((tile / Blocks.COLS)|0) * T, T, T, x, y, s, s);
      ctx.strokeStyle = '#b06cff'; ctx.lineWidth = 2; ctx.strokeRect(x+1, y+1, s-2, s-2);
    } else if (id === ITEM.PLUSHIE) {                   // the cursed doll, from the pack
      if (window.PACK_IMG && PACK_IMG.plushie) { ctx.imageSmoothingEnabled = false; ctx.drawImage(PACK_IMG.plushie, x, y, s, s); }
      else { ctx.fillStyle = '#3a0a0a'; ctx.fillRect(x + s*0.3, y + s*0.2, s*0.4, s*0.6); }
    } else if (id === ITEM.NOTE) {                      // a folded bloodied note
      ctx.fillStyle = '#d9c89a'; ctx.fillRect(x + s*0.2, y + s*0.16, s*0.6, s*0.68);
      ctx.strokeStyle = '#5a3a1a'; ctx.lineWidth = 1.5; ctx.strokeRect(x + s*0.2, y + s*0.16, s*0.6, s*0.68);
      ctx.strokeStyle = 'rgba(120,12,12,0.85)'; ctx.lineWidth = 1.5;
      for (let r = 0; r < 3; r++) { ctx.beginPath(); ctx.moveTo(x + s*0.3, y + s*0.3 + r*s*0.14); ctx.lineTo(x + s*0.7, y + s*0.31 + r*s*0.14); ctx.stroke(); }
      ctx.fillStyle = 'rgba(150,0,0,0.6)'; ctx.fillRect(x + s*0.6, y + s*0.62, s*0.12, s*0.16);
    } else if (id === ITEM.STICK) {                     // a plain stick
      ctx.strokeStyle = '#9c6a36'; ctx.lineCap = 'round'; ctx.lineWidth = Math.max(2, s*0.12);
      ctx.beginPath(); ctx.moveTo(x + s*0.34, y + s*0.78); ctx.lineTo(x + s*0.66, y + s*0.24); ctx.stroke();
    } else if (TOOLS[id]) {                             // a crafted tool (handle + material head)
      const tl = TOOLS[id], mat = ['', '#9c6a36', '#8a8a90', '#d8d8e0', '#5fe6d2'][tl.tier];
      ctx.lineCap = 'round';
      if (tl.type === 'sword') {
        ctx.strokeStyle = mat; ctx.lineWidth = Math.max(3, s*0.14);
        ctx.beginPath(); ctx.moveTo(x + s*0.32, y + s*0.82); ctx.lineTo(x + s*0.72, y + s*0.16); ctx.stroke();
        ctx.strokeStyle = '#5a3a18'; ctx.lineWidth = Math.max(2, s*0.1);            // crossguard
        ctx.beginPath(); ctx.moveTo(x + s*0.34, y + s*0.64); ctx.lineTo(x + s*0.56, y + s*0.74); ctx.stroke();
      } else {
        const hx = x + s*0.66, hy = y + s*0.32;
        ctx.strokeStyle = '#7a4a1e'; ctx.lineWidth = Math.max(2, s*0.11);           // handle
        ctx.beginPath(); ctx.moveTo(x + s*0.3, y + s*0.82); ctx.lineTo(hx, hy); ctx.stroke();
        ctx.strokeStyle = mat; ctx.fillStyle = mat; ctx.lineWidth = Math.max(2, s*0.11);
        if (tl.type === 'pick') { ctx.beginPath(); ctx.moveTo(hx - s*0.26, hy + s*0.02); ctx.quadraticCurveTo(hx, hy - s*0.22, hx + s*0.26, hy + s*0.02); ctx.stroke(); }
        else if (tl.type === 'axe') { ctx.beginPath(); ctx.moveTo(hx - s*0.02, hy - s*0.2); ctx.quadraticCurveTo(hx + s*0.24, hy - s*0.04, hx, hy + s*0.16); ctx.closePath(); ctx.fill(); }
        else { ctx.beginPath(); ctx.ellipse(hx, hy - s*0.04, s*0.14, s*0.18, 0.4, 0, 7); ctx.fill(); }  // shovel scoop
      }
    }
  }

  // ---- heart + drumstick glyphs ----------------------------------------
  _heartPath(ctx, x, y, s) {
    ctx.beginPath();
    ctx.moveTo(x + s*0.5, y + s*0.86);
    ctx.bezierCurveTo(x - s*0.05, y + s*0.5, x + s*0.08, y + s*0.04, x + s*0.5, y + s*0.34);
    ctx.bezierCurveTo(x + s*0.92, y + s*0.04, x + s*1.05, y + s*0.5, x + s*0.5, y + s*0.86);
    ctx.closePath();
  }
  _drawHeart(ctx, x, y, s, state) {
    this._heartPath(ctx, x, y, s);
    ctx.fillStyle = '#3a0a0a'; ctx.fill();           // dark container
    if (state === 'empty') return;
    ctx.save();
    if (state === 'half') { ctx.beginPath(); ctx.rect(x, y, s*0.5, s); ctx.clip(); }
    this._heartPath(ctx, x, y, s);
    ctx.fillStyle = '#ff3b3b'; ctx.fill();
    ctx.fillStyle = '#ff8a8a'; ctx.fillRect(x + s*0.28, y + s*0.24, s*0.12, s*0.12); // glint
    ctx.restore();
  }
  _drawDrum(ctx, x, y, s, state) {
    // container
    const draw = (color) => {
      ctx.fillStyle = color;
      ctx.beginPath(); ctx.ellipse(x + s*0.62, y + s*0.45, s*0.32, s*0.28, 0, 0, 7); ctx.fill();
      ctx.save(); ctx.translate(x + s*0.5, y + s*0.55); ctx.rotate(-0.6);
      ctx.fillRect(-s*0.08, 0, s*0.16, s*0.45); ctx.restore();
      ctx.fillStyle = '#f3ead0';
      ctx.beginPath(); ctx.arc(x + s*0.2, y + s*0.78, s*0.1, 0, 7); ctx.fill(); // bone knob
    };
    draw('#3a2a14');
    if (state === 'empty') return;
    ctx.save();
    if (state === 'half') { ctx.beginPath(); ctx.rect(x, y, s*0.5, s); ctx.clip(); }
    draw('#b5742e');
    ctx.restore();
  }

  // ======================== full HUD ====================================
  drawHUD(game) {
    const ctx = this.ctx, W = this.W, H = this.H, p = game.player;
    ctx.clearRect(0, 0, W, H);
    ctx.textBaseline = 'top';

    // the jumpscare downed sequence replaces the whole HUD with its own overlay
    if (game.state === 'downed' && game.qte) { this._drawDowned(ctx, game.qte); return; }

    // --- block selection outline (drawn in the world) -----------------
    if (game.target) this._drawSelection(ctx, game);

    // --- underwater / damage handled via the #tint element ------------

    // --- top-left coordinates ----------------------------------------
    ctx.font = '13px "Courier New", monospace';
    ctx.textAlign = 'left';
    if (game.settings.showCoords) {
      this._text(ctx, `X ${p.pos.x.toFixed(1)}  Y ${p.pos.y.toFixed(1)}  Z ${p.pos.z.toFixed(1)}`, 10, 8);
    }
    if (game.settings.showCompass) this._drawCompass(ctx, p.yaw);

    // --- top-center day counter --------------------------------------
    ctx.textAlign = 'center';
    ctx.font = 'bold 16px "Courier New", monospace';
    this._text(ctx, `Day ${game.day}`, W / 2, 8);

    // --- top-right fps + biome, with the minimap below ---------------
    ctx.textAlign = 'right';
    ctx.font = '13px "Courier New", monospace';
    let ty = 8;
    if (game.settings.showFps) { this._text(ctx, `${game.fps} FPS`, W - 10, ty); ty += 18; }
    this._text(ctx, BIOME_NAME[game.currentBiome], W - 10, ty); ty += 22;
    // minimap box
    const mmS = 128, mmX = W - mmS - 10, mmY = ty;
    ctx.drawImage(this.mini, mmX, mmY, mmS, mmS);
    ctx.strokeStyle = 'rgba(0,0,0,0.8)'; ctx.lineWidth = 2; ctx.strokeRect(mmX, mmY, mmS, mmS);
    this._drawMiniPlayer(ctx, mmX, mmY, mmS, p);

    // --- bottom HUD: hotbar, hearts, hunger, xp ----------------------
    const slot = 46, gap = 4, n = 9;
    const barW = n * slot + (n - 1) * gap;
    const x0 = (W - barW) / 2;
    const hotY = H - slot - 12;

    // xp bar (just above the hotbar)
    const xpY = hotY - 14;
    ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(x0, xpY, barW, 7);
    ctx.fillStyle = '#7ee06a'; ctx.fillRect(x0, xpY, barW * p.xpFraction(), 7);
    ctx.strokeStyle = 'rgba(0,0,0,0.6)'; ctx.lineWidth = 1; ctx.strokeRect(x0 + 0.5, xpY + 0.5, barW, 7);
    if (p.level > 0) { ctx.textAlign = 'center'; ctx.font = 'bold 14px "Courier New", monospace';
      ctx.fillStyle = '#9bff7a'; ctx.strokeStyle = '#143a0a'; ctx.lineWidth = 3;
      ctx.strokeText(p.level, W / 2, xpY - 18); ctx.fillText(p.level, W / 2, xpY - 18); }

    // hearts (above-left) and hunger (above-right)
    const iconY = xpY - 24, is = 18;
    for (let i = 0; i < 10; i++) {
      const v = p.health - i * 2;
      const st = v >= 2 ? 'full' : (v >= 1 ? 'half' : 'empty');
      this._drawHeart(ctx, x0 + i * (is - 1), iconY, is, st);
    }
    for (let i = 0; i < 10; i++) {
      const v = p.hunger - i * 2;
      const st = v >= 2 ? 'full' : (v >= 1 ? 'half' : 'empty');
      this._drawDrum(ctx, x0 + barW - (10 - i) * (is - 1) - is*0.2, iconY, is, st);
    }
    // air bubbles (right side, above the hunger row) - only while underwater/recovering
    if (p.air < p.maxAir - 0.01) {
      const bubY = iconY - 20, bs = 16;
      for (let i = 0; i < 10; i++) {
        if (p.air <= i) continue;                       // popped
        const bxp = x0 + barW - (10 - i) * (is - 1) - is * 0.2 + bs * 0.5;
        ctx.beginPath(); ctx.arc(bxp, bubY + bs * 0.5, bs * 0.34, 0, 7);
        ctx.fillStyle = 'rgba(150,210,255,0.95)'; ctx.fill();
        ctx.strokeStyle = 'rgba(20,40,70,0.9)'; ctx.lineWidth = 1.5; ctx.stroke();
        ctx.fillStyle = 'rgba(255,255,255,0.9)'; ctx.beginPath(); ctx.arc(bxp - bs * 0.1, bubY + bs * 0.38, bs * 0.08, 0, 7); ctx.fill();
      }
    }

    // hotbar slots
    for (let i = 0; i < n; i++) {
      const sx = x0 + i * (slot + gap);
      ctx.fillStyle = 'rgba(20,20,20,0.55)'; ctx.fillRect(sx, hotY, slot, slot);
      ctx.strokeStyle = i === game.inventory.selected ? '#ffffff' : 'rgba(0,0,0,0.7)';
      ctx.lineWidth = i === game.inventory.selected ? 3 : 2;
      ctx.strokeRect(sx + 0.5, hotY + 0.5, slot, slot);
      const it = game.inventory.slots[i];
      if (it.id !== 0 && it.count > 0) {
        this.drawItemIcon(ctx, it.id, sx + 7, hotY + 7, slot - 14);
        ctx.textAlign = 'right'; ctx.font = 'bold 14px "Courier New", monospace';
        ctx.fillStyle = '#fff'; ctx.strokeStyle = '#000'; ctx.lineWidth = 3;
        ctx.strokeText(it.count, sx + slot - 4, hotY + slot - 18);
        ctx.fillText(it.count, sx + slot - 4, hotY + slot - 18);
      }
    }
    // selected item name floating above the hotbar
    const sel = game.inventory.selectedItem();
    if (sel.id !== 0) {
      ctx.textAlign = 'center'; ctx.font = '14px "Courier New", monospace';
      this._text(ctx, itemName(sel.id), W / 2, hotY - 44);
    }

    // --- sprint stamina + flashlight battery (bottom-left) -----------
    {
      const bx = 14, bw = 144, bh = 9;
      const bar = (y, frac, col, label) => {
        ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(bx, y, bw, bh);
        ctx.fillStyle = col; ctx.fillRect(bx, y, bw * clamp(frac, 0, 1), bh);
        ctx.strokeStyle = 'rgba(0,0,0,0.7)'; ctx.lineWidth = 1; ctx.strokeRect(bx + 0.5, y + 0.5, bw, bh);
        ctx.textAlign = 'left'; ctx.font = '11px "Courier New", monospace';
        this._text(ctx, label, bx, y - 14);
      };
      if (p.sprintCD > 0) bar(H - 94, 1 - p.sprintCD / p.sprintCDMax, '#8a4a4a', 'SPRINT — RECOVERING');
      else bar(H - 94, p.sprintStamina / p.sprintMax, '#5fd1ff', 'SPRINT  (double-tap W)');
      // the flashlight bar only shows when it's actually usable (dark) or recharging;
      // in open daylight it disappears entirely
      if (game.torchCD > 0) bar(H - 66, game.torchBattery / game.torchMax, '#8a6a3a', 'FLASHLIGHT — DEAD (recharging)');
      else if (game.torchOn) bar(H - 66, game.torchBattery / game.torchMax, '#fff3a0', 'FLASHLIGHT — ON');
      else if (game._isDark()) bar(H - 66, game.torchBattery / game.torchMax, '#c9b15a', 'FLASHLIGHT  (hold F)');
    }

    // --- crosshair (centre) ------------------------------------------
    ctx.strokeStyle = 'rgba(255,255,255,0.85)'; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(W / 2 - 9, H / 2); ctx.lineTo(W / 2 + 9, H / 2);
    ctx.moveTo(W / 2, H / 2 - 9); ctx.lineTo(W / 2, H / 2 + 9);
    ctx.stroke();
    // mining progress ring around the crosshair
    if (game.mining && game.mining.progress > 0) {
      ctx.strokeStyle = '#ffe27a'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(W / 2, H / 2, 16, -Math.PI/2, -Math.PI/2 + Math.PI*2*game.mining.frac); ctx.stroke();
    }

    // --- a bloody note you're looking at -----------------------------
    if (game._noteOverlay) this._drawNote(ctx, { msg: game._noteOverlay });
    else if (game.activeNote) this._drawNote(ctx, game.activeNote);

    // --- sleep fade (night -> dawn) ----------------------------------
    if (game._sleepFade) {
      const t = game._sleepFade.t, a = t < 0.7 ? t / 0.7 : Math.max(0, 1 - (t - 0.7) / 0.8);
      ctx.fillStyle = `rgba(0,0,0,${clamp(a, 0, 1).toFixed(3)})`; ctx.fillRect(0, 0, W, H);
    }

    // --- the jumpscare overlay --------------------------------------
    if (game._scare > 0) this._drawScare(ctx, game._scare);
  }

  // a parchment panel with the note's message scrawled in blood
  _drawNote(ctx, note) {
    const W = this.W, H = this.H;
    const lines = note.msg.split('\n');
    const fs = Math.min(17, Math.max(12, Math.floor(W / 36)));         // shrink to fit narrow screens
    const pw = Math.min(W * 0.92, 60 + fs * 0.62 * Math.max(...lines.map(l => l.length)));
    const ph = 70 + lines.length * (fs + 9), px = (W - pw) / 2, py = H * 0.15;
    ctx.save();
    ctx.fillStyle = 'rgba(214,198,156,0.97)'; ctx.fillRect(px, py, pw, ph);            // parchment
    ctx.strokeStyle = '#5a3a1a'; ctx.lineWidth = 3; ctx.strokeRect(px, py, pw, ph);
    ctx.fillStyle = 'rgba(120,10,10,0.18)'; ctx.fillRect(px, py, pw, 6);               // blood smear
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    ctx.fillStyle = '#7a0c0c'; ctx.font = 'bold ' + fs + 'px "Courier New", monospace';
    lines.forEach((ln, i) => ctx.fillText(ln, W / 2, py + 22 + i * (fs + 9)));
    ctx.fillStyle = '#5a3a1a'; ctx.font = '12px "Courier New", monospace';
    ctx.fillText('- found nailed to the bark', W / 2, py + ph - 20);
    ctx.restore();
  }

  // a violent eldritch face that fills the screen on capture
  _drawScare(ctx, scare) {
    const W = this.W, H = this.H, a = clamp(scare / 1.5, 0, 1);
    const jx = (Math.random() - 0.5) * 20 * a, jy = (Math.random() - 0.5) * 20 * a;
    ctx.save();
    ctx.fillStyle = 'rgba(3,0,3,' + (0.92 * a) + ')'; ctx.fillRect(0, 0, W, H);

    // A petaled maw lunging open: five fleshy, tooth-lined flaps blooming around
    // a glowing throat - a predatory flower, not a fork. `a` drives the bloom.
    const cx = W / 2 + jx, cy = H * 0.5 + jy;
    const R = Math.min(W, H) * (0.30 + 0.42 * a);     // the whole maw rushes open toward you
    const NP = 5, bloom = a;
    const polar = (ang, r) => [cx + Math.cos(ang) * r, cy + Math.sin(ang) * r];

    for (let p = 0; p < NP; p++) {
      const base = -1.5708 + p * (6.2832 / NP);       // one flap points straight up
      const hw = (6.2832 / NP / 2) * (0.6 + 0.32 * bloom);  // angular half-width of the flap
      const ri = R * 0.17, rm = R * (0.42 + 0.3 * bloom), ro = R * (0.55 + 0.55 * bloom);
      const pIL = polar(base - hw * 0.35, ri), pIR = polar(base + hw * 0.35, ri);
      const pML = polar(base - hw, rm), pMR = polar(base + hw, rm);
      const tip = polar(base, ro);
      // fleshy body of the flap
      ctx.beginPath();
      ctx.moveTo(pIL[0], pIL[1]);
      ctx.quadraticCurveTo(pML[0], pML[1], tip[0], tip[1]);
      ctx.quadraticCurveTo(pMR[0], pMR[1], pIR[0], pIR[1]);
      ctx.closePath();
      const fg = ctx.createRadialGradient(cx, cy, ri * 0.5, cx, cy, ro);
      fg.addColorStop(0, '#1c0608'); fg.addColorStop(0.35, '#5e1d22'); fg.addColorStop(0.7, '#7d2228'); fg.addColorStop(1, '#2a0c0e');
      ctx.fillStyle = fg; ctx.fill();
      ctx.strokeStyle = 'rgba(18,0,2,0.7)'; ctx.lineWidth = 3; ctx.stroke();
      // wet highlight ridge down the flap
      ctx.strokeStyle = 'rgba(195,80,80,' + (0.35 * a) + ')'; ctx.lineWidth = 2;
      ctx.beginPath(); const ridgeB = polar(base, ri); ctx.moveTo(ridgeB[0], ridgeB[1]); ctx.lineTo(tip[0], tip[1]); ctx.stroke();
      // teeth lining BOTH curved edges of the flap as neat inward-pointing rows
      ctx.fillStyle = '#ece3cf';
      const nt = 9;
      const qbez = (p0, p1, p2, t) => [(1 - t) * (1 - t) * p0[0] + 2 * (1 - t) * t * p1[0] + t * t * p2[0], (1 - t) * (1 - t) * p0[1] + 2 * (1 - t) * t * p1[1] + t * t * p2[1]];
      for (const edge of [[pIL, pML], [pIR, pMR]]) {
        for (let k = 0; k < nt; k++) {
          const t = (k + 0.5) / nt;
          const pt = qbez(edge[0], edge[1], tip, t);          // a point on the flap's edge
          const cl = polar(base, ri + (ro - ri) * t);         // matching point on the centre line
          let dx = cl[0] - pt[0], dy = cl[1] - pt[1]; const dl = Math.hypot(dx, dy) || 1; dx /= dl; dy /= dl;
          const tlen = R * 0.06 * (1 - t * 0.45), tw = R * 0.02 * (1 - t * 0.4);  // taper toward the tip
          const tx = pt[0] + dx * tlen, ty = pt[1] + dy * tlen;
          const px = -dy, py = dx;                            // perpendicular = the tooth's base
          ctx.beginPath();
          ctx.moveTo(pt[0] + px * tw, pt[1] + py * tw);
          ctx.lineTo(tx, ty);
          ctx.lineTo(pt[0] - px * tw, pt[1] - py * tw);
          ctx.closePath(); ctx.fill();
        }
      }
    }

    // ---- the central throat: a glowing red gullet ringed with inward fangs ----
    const thr = R * 0.2;
    const tg = ctx.createRadialGradient(cx, cy, 1, cx, cy, thr * 2.4);
    tg.addColorStop(0, '#000'); tg.addColorStop(0.45, '#1a0000'); tg.addColorStop(0.8, 'rgba(150,12,8,' + (0.7 * a) + ')'); tg.addColorStop(1, 'rgba(40,0,0,0)');
    ctx.fillStyle = tg; ctx.beginPath(); ctx.arc(cx, cy, thr * 2.4, 0, 7); ctx.fill();
    ctx.fillStyle = '#050000'; ctx.beginPath(); ctx.arc(cx, cy, thr, 0, 7); ctx.fill();
    ctx.fillStyle = '#efe7d2';
    const rn = 22;
    for (let k = 0; k < rn; k++) {
      const ang = k / rn * 6.2832, len = thr * (0.45 + 0.4 * Math.abs(Math.sin(k * 2.3)));
      const op = polar(ang, thr * 1.02), ip = polar(ang, thr * 1.02 - len);
      const perp = ang + 1.5708, tw = thr * 0.1;
      ctx.beginPath();
      ctx.moveTo(op[0] + Math.cos(perp) * tw, op[1] + Math.sin(perp) * tw);
      ctx.lineTo(ip[0], ip[1]);
      ctx.lineTo(op[0] - Math.cos(perp) * tw, op[1] - Math.sin(perp) * tw);
      ctx.closePath(); ctx.fill();
    }

    // grunge: the real angry pack skin, faint, over the maw for fleshy texture
    if (window.PACK_IMG && PACK_IMG.arachnoid_angry) {
      ctx.save(); ctx.globalAlpha = 0.22 * a; ctx.globalCompositeOperation = 'overlay'; ctx.imageSmoothingEnabled = false;
      ctx.drawImage(PACK_IMG.arachnoid_angry, cx - R * 1.1, cy - R * 1.1, R * 2.2, R * 2.2);
      ctx.restore();
    }

    // dark veins radiating outward from the maw into the black
    ctx.strokeStyle = 'rgba(70,0,0,' + (0.5 * a) + ')'; ctx.lineWidth = 2;
    for (let k = 0; k < 12; k++) {
      const ang = k / 12 * 6.2832 + 0.2;
      const v1 = polar(ang, R * 0.9), v2 = polar(ang, R * 1.7);
      ctx.beginPath(); ctx.moveTo(v1[0], v1[1]);
      ctx.quadraticCurveTo(v1[0] + Math.cos(ang + 0.4) * R * 0.2, v1[1] + Math.sin(ang + 0.4) * R * 0.2, v2[0], v2[1]);
      ctx.stroke();
    }

    // red vignette
    const g2 = ctx.createRadialGradient(W / 2, H / 2, H * 0.18, W / 2, H / 2, H * 0.8);
    g2.addColorStop(0, 'rgba(120,0,0,0)'); g2.addColorStop(1, 'rgba(110,0,0,' + (0.75 * a) + ')');
    ctx.fillStyle = g2; ctx.fillRect(0, 0, W, H);
    ctx.restore();
  }
  // the jumpscare "downed" overlay: fluttering eyelids, red haze, and the
  // circular MASH-SPACE meter you fill to wake up alive
  _drawDowned(ctx, q) {
    const W = this.W, H = this.H;
    ctx.save();
    // eyelids: black bands pressing in from top + bottom, fluttering, with the
    // odd near-full blink as you fade in and out of consciousness
    const flutter = Math.sin(q.blink * 5.0) * 0.5 + 0.5;
    const blinkClose = Math.pow(Math.max(0, Math.sin(q.blink * 1.3)), 8);
    const lid = H * (0.15 + 0.12 * flutter + 0.55 * blinkClose);
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, lid);
    ctx.fillRect(0, H - lid, W, lid);
    let g = ctx.createLinearGradient(0, lid, 0, lid + 44); g.addColorStop(0, 'rgba(0,0,0,0.92)'); g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g; ctx.fillRect(0, lid, W, 44);
    g = ctx.createLinearGradient(0, H - lid, 0, H - lid - 44); g.addColorStop(0, 'rgba(0,0,0,0.92)'); g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g; ctx.fillRect(0, H - lid - 44, W, 44);
    // a sick red wash + vignette
    const v = ctx.createRadialGradient(W / 2, H / 2, H * 0.08, W / 2, H / 2, H * 0.72);
    v.addColorStop(0, 'rgba(90,0,0,0)'); v.addColorStop(1, 'rgba(95,0,0,0.62)');
    ctx.fillStyle = v; ctx.fillRect(0, 0, W, H);

    // the circular MASH meter near the bottom
    const cx = W / 2, cy = H - 116, rad = 48;
    ctx.lineWidth = 11; ctx.lineCap = 'round';
    ctx.strokeStyle = 'rgba(50,0,0,0.85)'; ctx.beginPath(); ctx.arc(cx, cy, rad, 0, Math.PI * 2); ctx.stroke();
    const pulse = 0.6 + 0.4 * (Math.sin(q.t * 12) * 0.5 + 0.5);
    ctx.strokeStyle = 'rgba(255,' + (40 + 30 * pulse | 0) + ',' + (40 + 30 * pulse | 0) + ',1)';
    ctx.beginPath(); ctx.arc(cx, cy, rad, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * clamp(q.fill, 0, 1)); ctx.stroke();
    ctx.lineCap = 'butt';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#fff'; ctx.font = 'bold 20px "Courier New", monospace';
    ctx.fillText(Math.round(q.fill * 100) + '%', cx, cy);
    ctx.textBaseline = 'top'; ctx.font = 'bold 19px "Courier New", monospace';
    ctx.fillStyle = q.t % 0.4 < 0.2 ? '#ffffff' : '#ff9a9a';     // flashing prompt
    this._text(ctx, 'MASH  [ SPACE ]  TO  WAKE', cx, cy + rad + 14);
    ctx.restore();
  }
  _text(ctx, s, x, y) {
    ctx.fillStyle = '#000'; ctx.fillText(s, x + 1, y + 1);   // drop shadow
    ctx.fillStyle = '#fff'; ctx.fillText(s, x, y);
  }
  _compass(yaw) {
    // yaw=0 faces -Z (North); yaw increases toward +X (East)
    const dirs = ['N', 'NE', 'E', 'SE', 'S', 'SW', 'W', 'NW'];
    const i = Math.round(((yaw / Math.PI) * 4 + 8)) % 8;
    return dirs[(i + 8) % 8];
  }
  // a functional compass strip at the top: cardinal marks scroll past a centre
  // pointer as you turn (replaces the old "Facing N" text)
  _drawCompass(ctx, yaw) {
    const W = this.W, cx = W / 2, cy = 34, hw = 132;
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.42)'; ctx.fillRect(cx - hw, cy, hw * 2, 20);
    ctx.strokeStyle = 'rgba(255,255,255,0.22)'; ctx.lineWidth = 1; ctx.strokeRect(cx - hw + 0.5, cy + 0.5, hw * 2, 20);
    const dirs = [['N', 0], ['NE', Math.PI / 4], ['E', Math.PI / 2], ['SE', 3 * Math.PI / 4], ['S', Math.PI], ['SW', -3 * Math.PI / 4], ['W', -Math.PI / 2], ['NW', -Math.PI / 4]];
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    for (const [label, b] of dirs) {
      let off = b - yaw; while (off > Math.PI) off -= 2 * Math.PI; while (off < -Math.PI) off += 2 * Math.PI;
      if (Math.abs(off) > Math.PI * 0.55) continue;            // only those near the heading
      const x = cx + (off / (Math.PI / 2)) * hw, card = label.length === 1;
      ctx.strokeStyle = 'rgba(255,255,255,0.35)'; ctx.beginPath(); ctx.moveTo(x, cy + 1); ctx.lineTo(x, cy + 5); ctx.stroke();
      ctx.font = (card ? 'bold 14px' : '11px') + ' "Courier New", monospace';
      ctx.fillStyle = '#000'; ctx.fillText(label, x + 1, cy + 6);
      ctx.fillStyle = label === 'N' ? '#ff7a6a' : (card ? '#ffffff' : '#cccccc');
      ctx.fillText(label, x, cy + 5);
    }
    ctx.fillStyle = '#ffe27a'; ctx.beginPath(); ctx.moveTo(cx, cy + 1); ctx.lineTo(cx - 5, cy - 5); ctx.lineTo(cx + 5, cy - 5); ctx.closePath(); ctx.fill();
    ctx.restore();
  }
