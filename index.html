        if (id == null) { err('Unknown item: ' + (a[1] || '')); break; }
        inv.addItem(id, n); ok('Gave ' + n + ' ' + itemName(id));
        break;
      }
      case 'tp': case 'teleport': {
        const x = parseFloat(a[1]), y = parseFloat(a[2]), z = parseFloat(a[3]);
        if ([x, y, z].some(isNaN)) { err('Usage: /tp <x> <y> <z>'); break; }
        p.pos.set(x, y, z); p.vel.set(0, 0, 0); p._fallPeak = y; ok('Teleported to ' + x + ' ' + y + ' ' + z);
        break;
      }
      case 'heal': p.health = p.maxHealth; ok('Healed'); break;
      case 'feed': p.hunger = p.maxHunger; p.saturation = 5; ok('Hunger filled'); break;
      case 'food': inv.addItem(ITEM.MEAT, 5); ok('Gave 5 Cooked Meat'); break;
      case 'banish': case 'killstalker': if (this.stalker) { this.stalker.despawn(); this.stalker.approach = 0; this.stalker.commit = false; this.audio.stopDread(); this._scare = 0; this._stalkerSpawnT = 60; ok('The watcher recedes...'); } break;
      case 'stalker': case 'spawnstalker':
        if (this.stalker) {
          if (skyColors(this.time).daylight >= 0.22) this.time = 0.0;   // force night so it isn't culled next frame
          this.stalker.spawn(p); this.audio.startDread(); ok('Something stirs in the dark.');
        }
        break;
      case 'heal_all': case 'god': p.health = p.maxHealth; p.hunger = p.maxHunger; ok('Restored'); break;
      case 'help':
        this._log('/time /give /tp /heal /feed /food /banish /stalker', '#cfe');
        this._log('e.g. /time night  -  /give diamond 5  -  /feed', '#9c9');
        break;
      default: err('Unknown command: ' + cmd + '  (try /help)');
    }
  }

  // ====================== STATE TRANSITIONS ==============================
  _hideAllOverlays() {
    ['mainMenu', 'pauseMenu', 'settingsMenu', 'deathScreen', 'winScreen', 'loading'].forEach(id =>
      document.getElementById(id).classList.add('hidden'));
    this.craftEls.ov.classList.add('hidden');
  }
  _showLoading(v) { document.getElementById('loading').classList.toggle('hidden', !v); }
  _setLoad(frac) { document.getElementById('loadBarInner').style.width = Math.round(frac * 100) + '%'; }

  newWorld(seed) {
    this.world = new World(seed >>> 0);
    this.player = new Player();
    this.inventory = new InventoryManager();
    this.mobs = new MobManager(this.world);
    this.stalker = new Stalker(this.world); this._scare = 0; this._stalkerSpawnT = 0; this._caughtCount = 0;
    this.activeNote = null; this._gotPlushie = false;
    this._resetTorch();
    this.time = 0.3; this.day = 1; this.particles = [];
    document.getElementById('mainMenu').classList.add('hidden');
    this.ui.stopMenuAnimation();
    this._showLoading(true); this._setLoad(0);
    // pick a land spawn, then stream the area in over a few frames
    const s = this._findSpawn();
    this.player.pos.set(s.x, s.y, s.z); this.player.spawn = this.player.pos.copy();
    this._fallReset();
    this._prepareArea().then(() => this._enterPlaying());
  }

  continueWorld() {
    const data = this.save.load();
    if (!data) { this.newWorld((Math.random() * 2147483647) | 0); return; }
    this.world = new World(data.seed >>> 0);
    for (const k in data.edits) this.world.pendingEdits.set(k, data.edits[k]);
    // restore which world-dolls were already collected BEFORE any chunk generates,
    // so they don't respawn (and can't be farmed across reloads)
    if (data.collectedPlushies) for (const k of data.collectedPlushies) this.world.collectedPlushieKeys.add(k);
    if (data.collectedNotes) for (const k of data.collectedNotes) this.world.collectedNoteKeys.add(k);
    this.player = new Player();
    const pd = data.player;
    this.player.pos.set(pd.pos[0], pd.pos[1], pd.pos[2]);
    this.player.yaw = pd.yaw; this.player.pitch = pd.pitch;
    this.player.health = pd.health; this.player.hunger = pd.hunger; this.player.saturation = pd.saturation || 5;
    this.player.xp = pd.xp; this.player.level = pd.level;
    this.player.spawn = new Vec3(pd.spawn[0], pd.spawn[1], pd.spawn[2]);
    this.inventory = new InventoryManager();
    if (data.inventory) {
      this.inventory.slots = data.inventory.map(s => ({ id: s.id, count: s.count, meta: s.meta }));
      while (this.inventory.slots.length < INV_SLOTS) this.inventory.slots.push({ id: 0, count: 0 });   // older saves had 9 slots
      this.inventory.selected = data.selected || 0;
    }
    this.mobs = new MobManager(this.world);
    this.stalker = new Stalker(this.world); this._scare = 0; this._stalkerSpawnT = 0; this._caughtCount = 0;
    this.activeNote = null; this._gotPlushie = !!data.gotPlushie;   // don't re-grant the first-note doll
    this._resetTorch();
    this.time = data.time; this.day = data.day; this.particles = [];
    document.getElementById('mainMenu').classList.add('hidden');
    this.ui.stopMenuAnimation();
    this._showLoading(true); this._setLoad(0);
    this._fallReset();
    this._prepareArea().then(() => this._enterPlaying());
  }
  _fallReset() { this.player._fallPeak = this.player.pos.y; }

  // nudge the player upward until their box is clear of solid blocks
  _unstick() {
    const p = this.player; let tries = 0;
    while (Physics.boxHitsSolid(this.world, p, p.half, p.height) && tries < 48) { p.pos.y += 1; tries++; }
    p._fallPeak = p.pos.y;
  }
  _enterPlaying() {
    this._unstick();
    this.motes = null;                            // re-seed the fog motes around the new spawn
    this._leafDecay = [];                         // drop any pending leaf-decay from a prior world
    this._hideAllOverlays();
    this.state = 'playing';
    this.audio.ensure(); this.audio.stopDread(); this.audio.startAmbient();
    this.audio.startBreath(); this.audio.startHeart(); this.audio.startHorror();
    this._wasLocked = false;
    this.input.requestLock();
    this.resize();
  }

  _pause() {
    this.state = 'paused';
    document.getElementById('pauseMenu').classList.remove('hidden');
  }
  resume() {
    document.getElementById('pauseMenu').classList.add('hidden');
    document.getElementById('settingsMenu').classList.add('hidden');
    this.state = 'playing';
    this._wasLocked = false;
    this.input.requestLock();
  }
  _die() {
    this.state = 'dead';
    this.input.exitLock();
    this._scare = 0;
    this.audio.stopDread(); this.audio.setBreath(0); this.audio.setHeartbeat(0); this.audio.setHorror(0);
    if (this.jumpscareVid) this.jumpscareVid.style.display = 'none';
    if (this.stalker) this.stalker.despawn();
    document.getElementById('tint').style.opacity = '0';
    document.getElementById('deathMsg').textContent = this.player.lastDamageReason || 'the world goes on without you';
    document.getElementById('deathScreen').classList.remove('hidden');
  }
  respawn() {
    document.getElementById('deathScreen').classList.add('hidden');
    this.player.respawn();
    this._fallReset();
    this._stalkerSpawnT = 10 + Math.random() * 10;   // brief reprieve after death
    if (this.stalker) { this.stalker.approach = 0; this.stalker.commit = false; }   // start the next night fresh
    this._caughtCount = 0;                            // QTE difficulty resets on death
    this.state = 'playing';
    this._wasLocked = false;
    this.input.requestLock();
  }
  quitToTitle() {
    // unload all chunk GPU buffers
    if (this.world) for (const ch of this.world.chunks.values()) this.renderer.freeChunkMesh(ch);
    this.world = null; this.player = null; this.mobs = null; this.stalker = null;
    this.audio.stopAmbient(); this.audio.stopDread(); this.audio.stopBreath(); this.audio.stopHeart(); this.audio.stopHorror();
    this._scare = 0; this.activeNote = null; this._resetTorch();
    this.state = 'menu';
    this.input.exitLock();
    this._hideAllOverlays();
    document.getElementById('mainMenu').classList.remove('hidden');
    document.getElementById('tint').style.opacity = '0';
    this._updateMenuButtons();
    this.ui.startMenuAnimation();
  }
  _win() {
    this.state = 'won';
    this.input.exitLock();
    this.audio.stopAmbient(); this.audio.stopDread(); this.audio.stopBreath(); this.audio.stopHeart(); this.audio.stopHorror();
    if (this.stalker) this.stalker.despawn();
    this.ui.playWin(this.audio);
  }

  // ====================== SPAWN + STREAMING =============================
  _findSpawn() {
    const w = this.world;
    // would a tree originate at this column? (mirrors World.decorate)
    const treeHere = (x, z) => {
      const b = w.biomeAt(x, z), h = w.heightAt(x, z);
      if (h <= SEA_LEVEL || h > 96) return false;
      const r = w.hash2(x, z, 1);
      return (b === BIOME.FOREST && r < 0.09) || (b === BIOME.PLAINS && r < 0.018);
    };
    const tryPt = (x, z) => {
      const h = w.heightAt(x, z), b = w.biomeAt(x, z);
      if (h <= SEA_LEVEL + 1 || b === BIOME.OCEAN) return null;
      // avoid spawning inside a tree (origin or its canopy spread)
      for (let dz = -2; dz <= 2; dz++) for (let dx = -2; dx <= 2; dx++)
        if (treeHere(x + dx, z + dz)) return null;
      return { x: x + 0.5, y: h + 1.4, z: z + 0.5 };
    };
    let p = tryPt(0, 0); if (p) return p;
    for (let r = 4; r < 600; r += 4) {
      for (let a = 0; a < 12; a++) {
        const ang = a / 12 * 6.2832;
        p = tryPt(Math.round(Math.cos(ang) * r), Math.round(Math.sin(ang) * r));
        if (p) return p;
      }
    }
    return { x: 0.5, y: 100, z: 0.5 };
  }
  _ensureChunk(cx, cz) {
    const key = this.world.key(cx, cz);
    let ch = this.world.chunks.get(key);
    if (ch) return ch;
    ch = new Chunk(cx, cz);
    this.world.chunks.set(key, ch);
    this.world.generateChunk(ch);
    // neighbours must re-mesh: their border faces may now be hidden
    for (const [nx, nz] of [[cx - 1, cz], [cx + 1, cz], [cx, cz - 1], [cx, cz + 1]]) {
      const n = this.world.chunks.get(this.world.key(nx, nz));
      if (n && n.generated) n.dirty = true;
    }
    return ch;
  }
  _meshChunk(ch) {
    if (!ch.generated) return;
    const m = ch.buildMesh(this.world);
    this.renderer.uploadChunkMesh(ch, m);
  }
  // generate + mesh the area around the player, spread across frames
  _prepareArea() {
    const ccx = Math.floor(this.player.pos.x / CHUNK_SX), ccz = Math.floor(this.player.pos.z / CHUNK_SZ);
    const R = this.settings.renderDistance;
    const list = [];
    for (let dz = -R; dz <= R; dz++) for (let dx = -R; dx <= R; dx++) list.push([ccx + dx, ccz + dz]);
    list.sort((a, b) => (Math.abs(a[0] - ccx) + Math.abs(a[1] - ccz)) - (Math.abs(b[0] - ccx) + Math.abs(b[1] - ccz)));
    return new Promise(resolve => {
      // do at least MIN chunks per batch (so a throttled background tab, where
      // setTimeout is clamped, still finishes the load promptly) but yield once
      // a time budget is hit (so a focused tab keeps the loading bar animating)
      const MIN = 6;
      let i = 0;
      const gen = () => {
        const t = performance.now(); let did = 0;
        while (i < list.length && (did < MIN || performance.now() - t < 16)) { this._ensureChunk(list[i][0], list[i][1]); i++; did++; }
        this._setLoad(i / list.length * 0.55);
        if (i < list.length) { setTimeout(gen, 0); return; }
        const arr = [...this.world.chunks.values()]; let j = 0;
        const mesh = () => {
          const t2 = performance.now(); let did2 = 0;
          while (j < arr.length && (did2 < MIN || performance.now() - t2 < 16)) { this._meshChunk(arr[j]); j++; did2++; }
          this._setLoad(0.55 + j / arr.length * 0.45);
          if (j < arr.length) { setTimeout(mesh, 0); return; }
          resolve();
        };
        mesh();
      };
      gen();
    });
  }
  // per-frame streaming while playing (bounded work)
  _stream() {
    const ccx = Math.floor(this.player.pos.x / CHUNK_SX), ccz = Math.floor(this.player.pos.z / CHUNK_SZ);
    const R = this.settings.renderDistance;
    // generate the nearest missing chunks (budget-limited)
    let gen = 2;
    outer:
    for (let r = 0; r <= R; r++) {
      for (let dz = -r; dz <= r; dz++) for (let dx = -r; dx <= r; dx++) {
        if (Math.max(Math.abs(dx), Math.abs(dz)) !== r) continue;
        if (!this.world.chunks.has(this.world.key(ccx + dx, ccz + dz))) {
          this._ensureChunk(ccx + dx, ccz + dz);
          if (--gen <= 0) break outer;
        }
      }
    }
    // re-mesh the nearest dirty chunks
    let budget = 4; const cands = [];
    for (const ch of this.world.chunks.values())
      if (ch.dirty && ch.generated) {
        const d = Math.abs(ch.cx - ccx) + Math.abs(ch.cz - ccz);          // Manhattan: nearest-first sort
        const dC = Math.max(Math.abs(ch.cx - ccx), Math.abs(ch.cz - ccz)); // Chebyshev: matches gen + render extent
        if (dC <= R) cands.push([d, ch]);
      }
    cands.sort((a, b) => a[0] - b[0]);
    for (let i = 0; i < cands.length && budget > 0; i++) { this._meshChunk(cands[i][1]); budget--; }
    // unload distant chunks (preserving their edits for saving)
    for (const [k, ch] of [...this.world.chunks]) {
      if (Math.max(Math.abs(ch.cx - ccx), Math.abs(ch.cz - ccz)) > R + 2) {
        if (ch.edits) this.world.pendingEdits.set(k, Object.assign(this.world.pendingEdits.get(k) || {}, ch.edits));
        this.renderer.freeChunkMesh(ch);
        this.world.chunks.delete(k);
      }
    }
    this._pruneDecals();
  }
  // keep the decal arrays bounded over a long session: drop entries far outside
  // the loaded area AND their dedupe keys, so each regenerates identically (from
  // the deterministic seed) when you return. collectedPlushieKeys is persistent
  // and untouched, so collected dolls still never respawn.
  _pruneDecals() {
    const w = this.world, px = this.player.pos.x, pz = this.player.pos.z;
    const far = (this.settings.renderDistance + 4) * CHUNK_SX;
    const prune = (arr, keys, gx, gz) => {
      if (arr.length < 700) return arr;                 // only do work once an array gets big
      return arr.filter(e => {
        if (Math.abs(gx(e) - px) <= far && Math.abs(gz(e) - pz) <= far) return true;
        if (e.key) keys.delete(e.key);
        return false;
      });
    };
    w.blood    = prune(w.blood,    w.bloodKeys,   e => e.x,  e => e.z);
    w.notes    = prune(w.notes,    w.noteKeys,    e => e.tx, e => e.tz);
    w.plushies = prune(w.plushies, w.plushieKeys, e => e.x,  e => e.z);
    w.hanged   = prune(w.hanged,   w.hangedKeys,  e => e.x,  e => e.z);
  }

  // ====================== INPUT / ACTIONS ===============================
  _handleInput(dt) {
    const inp = this.input, inv = this.inventory;
    // mouse look
    const m = inp.consumeMouse();
    const sens = this.settings.sensitivity * 0.0022;
    if (m.dx || m.dy) this.player.look(m.dx * sens, m.dy * sens);

    // hotbar selection: number keys + scroll wheel
    for (let i = 1; i <= 9; i++) if (inp.wasPressed('Digit' + i)) { inv.setSelected(i - 1); this._noteOverlay = null; }
    if (inp.wheel || inp.leftJust) this._noteOverlay = null;       // close a held-note read on scroll/attack
    if (inp.wheel) inv.scroll(inp.wheel);

    // flashlight is hold-to-use (handled in _updateTorch via the held [F] key)
    // crafting menu
    if (inp.wasPressed('KeyC')) { this.openCraft(false); return; }
    if (inp.wasPressed('KeyE')) { this.openInventory(); return; }
    if (inp.wasPressed('Slash')) { this.openConsole(); return; }   // open the command terminal
    // save / load
    if (inp.wasPressed('F5')) this.doSave();
    if (inp.wasPressed('F9')) this.doLoad();

    // middle-click "pick block"
    if (inp.middleJust && this.target && isBlockId(this.target.id)) {
      const s = inv.selectedItem(); s.id = this.target.id; if (s.count < 1) s.count = 64;
    }

    // left click: attack a mob if one is in front, else it begins mining
    if (inp.leftJust) {
      if (this.mobs.attack(this.player, this.audio, this.inventory)) { this.mining = null; }
    }
    // mining (hold left on a block)
    if (inp.leftHeld && this.target && !this._mobInCrosshair()) this._mine(dt);
    else { this.mining = null; }

    // right click: place a block / use an item
    if (inp.rightJust) this._useItem();

  }
  // is the thing under the crosshair a mob (so we attack instead of mine)?
  _mobInCrosshair() {
    const eye = this.player.eye(), dir = this.player.forward();
    for (const mb of this.mobs.mobs) {
      const ox = mb.pos.x - eye.x, oy = (mb.pos.y + mb.height / 2) - eye.y, oz = mb.pos.z - eye.z;
      const t = ox * dir.x + oy * dir.y + oz * dir.z;
      if (t < 0 || t > REACH) continue;
      const d = Math.hypot(eye.x + dir.x * t - mb.pos.x, eye.y + dir.y * t - (mb.pos.y + mb.height / 2), eye.z + dir.z * t - mb.pos.z);
      if (d < 0.7) return true;
    }
    return false;
  }
  // a mob OR the eldritch stalker under the crosshair (so the cursor doesn't
  // "see through" it and outline the block behind)
  _creatureInCrosshair() {
    if (this._mobInCrosshair()) return true;
    const s = this.stalker;
    if (s && s.active) {
      const eye = this.player.eye(), dir = this.player.forward();
      const cx = s.pos.x, cy = s.pos.y + 2.6, cz = s.pos.z;          // body centre (it's ~5 tall)
      const ox = cx - eye.x, oy = cy - eye.y, oz = cz - eye.z;
      const t = ox * dir.x + oy * dir.y + oz * dir.z;
      if (t > 0 && t < REACH) {
        const d = Math.hypot(eye.x + dir.x * t - cx, eye.y + dir.y * t - cy, eye.z + dir.z * t - cz);
        if (d < 1.6) return true;
      }
    }
    return false;
  }
  _mine(dt) {
    const t = this.target, def = Blocks.get(t.id);
    if (!def.breakable) { this.mining = null; return; }
    if (!this.mining || this.mining.x !== t.x || this.mining.y !== t.y || this.mining.z !== t.z)
      this.mining = { x: t.x, y: t.y, z: t.z, progress: 0, frac: 0 };
    this.mining.progress += dt;
    // mining speed: the matching tool multiplies it; bare hands (or the wrong
    // tool) leave you at 1x, so hard blocks are slow and grueling
    const tool = TOOLS[this.inventory.selectedItem().id];
    const matched = tool && def.tool && tool.type === def.tool;
    const mult = matched ? tool.mult : 1;
    const time = Math.max(0.12, def.hardness * 1.2 / mult);
    this.mining.frac = clamp(this.mining.progress / time, 0, 1);
    this._mineTick -= dt;
    if (this._mineTick <= 0) { this.audio.play('mine'); this._mineTick = 0.18; }
    if (this.mining.frac >= 1) { this._breakBlock(t); this.mining = null; }
  }
  _breakBlock(t) {
    const id = t.id, def = Blocks.get(id);
    // does the held tool meet the block's required tier to actually harvest it?
    const tool = TOOLS[this.inventory.selectedItem().id];
    const matched = tool && def.tool && tool.type === def.tool;
    const canDrop = !def.tier || (matched && tool.tier >= def.tier);
    this.world.setBlock(t.x, t.y, t.z, B.AIR);
    this.audio.play('break');
    this._spawnParticles(t.x + 0.5, t.y + 0.5, t.z + 0.5, id);
    // a door is two stacked blocks - breaking one removes its partner
    if (id === B.DOOR || id === B.DOOR_OPEN) this._removeDoorPair(t.x, t.y, t.z);
    // a bed is two side-by-side blocks - breaking one removes its partner
    if (id === B.BED) this._removeBedPair(t.x, t.y, t.z);
    // felling the trunk orphans the canopy: nearby leaves begin to wither
    if (id === B.WOOD) { this._decayLeaves(t.x, t.y, t.z); this._dropHanged(t.x, t.y, t.z); }
    // what the block drops
    let drop = id;
    if (id === B.GRASS) drop = B.DIRT;
    else if (id === B.STONE) drop = B.COBBLE;
    else if (id === B.LEAVES) drop = (Math.random() < 0.28 ? B.LEAVES : (Math.random() < 0.22 ? ITEM.STICK : 0));
    else if (id === B.DOOR || id === B.DOOR_OPEN) drop = B.DOOR;     // always drops one (closed) door item
    if (!canDrop) drop = 0;                                          // wrong/no tool -> nothing salvageable
    if (drop !== 0) this.mobs.drops.push(new DroppedItem(t.x + 0.5, t.y + 0.4, t.z + 0.5, drop, 1));
    // ores give a little XP, but only when actually harvested
    if (canDrop && [B.COAL, B.IRON, B.GOLD, B.DIAMOND, B.REDSTONE].includes(id)) {
      const xp = id === B.DIAMOND ? 8 : id === B.GOLD ? 5 : 3;
      this.mobs.orbs.push(new XpOrb(t.x + 0.5, t.y + 0.6, t.z + 0.5, xp));
    }
  }
  // remove the other half of a 2-tall door (without a second drop)
  _removeDoorPair(x, y, z) {
    for (const dy of [1, -1]) {
      const b = this.world.getBlock(x, y + dy, z);
      if (b === B.DOOR || b === B.DOOR_OPEN) { this.world.setBlock(x, y + dy, z, B.AIR); break; }
    }
  }
  // remove the other half of a 2-long bed (horizontal partner; no second drop)
  _removeBedPair(x, y, z) {
    for (const [dx, dz] of [[1, 0], [-1, 0], [0, 1], [0, -1]]) {
      if (this.world.getBlock(x + dx, y, z + dz) === B.BED) { this.world.setBlock(x + dx, y, z + dz, B.AIR); break; }
    }
  }
  // when a trunk is cut, any leaves with no log within 4 blocks start to wither
  _decayLeaves(x, y, z) {
    this._leafDecay = this._leafDecay || [];
    const R = 4;
    for (let dy = -R; dy <= R; dy++) for (let dz = -R; dz <= R; dz++) for (let dx = -R; dx <= R; dx++) {
      const lx = x + dx, ly = y + dy, lz = z + dz;
      if (this.world.getBlock(lx, ly, lz) !== B.LEAVES) continue;
      // is there still a log supporting this leaf within R blocks?
      let supported = false;
      for (let sy = -R; sy <= R && !supported; sy++) for (let sz = -R; sz <= R && !supported; sz++) for (let sx = -R; sx <= R; sx++) {
        if (Math.abs(sx) + Math.abs(sy) + Math.abs(sz) > R) continue;
        if (this.world.getBlock(lx + sx, ly + sy, lz + sz) === B.WOOD) { supported = true; break; }
      }
      if (!supported) this._leafDecay.push({ x: lx, y: ly, z: lz, t: 0.3 + Math.random() * 2.2 });
    }
  }
  // tick the withering-leaf queue; each crumbles after its delay (drops the odd leaf/stick)
  _updateLeafDecay(dt) {
    if (!this._leafDecay || !this._leafDecay.length) return;
    for (const L of this._leafDecay) {
      L.t -= dt;
      if (L.t <= 0 && !L.done) {
        L.done = true;
        if (this.world.getBlock(L.x, L.y, L.z) === B.LEAVES) {
          this.world.setBlock(L.x, L.y, L.z, B.AIR);
          this._spawnParticles(L.x + 0.5, L.y + 0.5, L.z + 0.5, B.LEAVES);
          if (Math.random() < 0.18) this.mobs.drops.push(new DroppedItem(L.x + 0.5, L.y + 0.4, L.z + 0.5, Math.random() < 0.5 ? B.LEAVES : ITEM.STICK, 1));
        }
      }
    }
    this._leafDecay = this._leafDecay.filter(L => !L.done);
  }
  _useItem() {
    const sel = this.inventory.selectedItem();
    // ---- interact with the functional block you're aiming at ----
    if (this.target) {
      const tid = this.target.id;
      if (tid === B.CRAFT_TABLE) { this.openCraft(true); return; }            // open the workbench
      if (tid === B.DOOR || tid === B.DOOR_OPEN) { this._toggleDoor(this.target.x, this.target.y, this.target.z); return; }
      if (tid === B.BED) { this._sleep(); return; }
    }
    if (sel.id === 0 || sel.count <= 0) return;
    if (sel.id === ITEM.NOTE) {                 // read the pocketed note (toggle the overlay)
      this._noteOverlay = this._noteOverlay ? null : (sel.meta || 'The ink has run; it is unreadable now.');
      return;
    }
    // win item: place + activate the End Crystal
    if (sel.id === ITEM.END_CRYSTAL) {
      if (this.target) { this.inventory.consumeSelected(1); this.ui.toast('The End Crystal awakens...', 2); this._win(); }
      return;
    }
    if (isFood(sel.id)) {            // eat it (only if actually hungry)
      if (this.player.hunger >= this.player.maxHunger) { this.ui.toast('You are full', 1); return; }
      const f = FOOD[sel.id];
      this.player.feed(f.food, f.sat);
      this.inventory.consumeSelected(1);
      this.audio.play('eat');
      return;
    }
    if (sel.id === ITEM.EYE) { this.ui.toast('An Eye of Ender - used in crafting', 1.6); return; }
    if (sel.id === ITEM.NETHER_FRAME) {
      if (this.target) { this._placeBlock(this.target.placeX, this.target.placeY, this.target.placeZ, B.OBSIDIAN); }
      return;
    }
    if (sel.id === ITEM.PLUSHIE) {   // a WARD: clutch the doll to drive the watcher off
      this.inventory.consumeSelected(1);
      if (this.stalker) { this.stalker.despawn(); this.stalker.approach = 0; this.stalker.commit = false; this.audio.stopDread(); }  // the ward fully resets its approach
      this._scare = 0;
      this._stalkerSpawnT = Math.max(this._stalkerSpawnT || 0, 45 + Math.random() * 35);   // long reprieve
      this.player.heal(2);             // a small comfort
      this._applyDread(0);
      this.audio.play('levelup');      // a warm, protective chime
      this.ui.toast('You clutch the Warding Plushie. The watcher recoils into the dark.', 2.8);
      return;
    }
    if (sel.id === B.DOOR && this.target) {              // a door is placed 2 blocks tall
      this._placeDoor(this.target.placeX, this.target.placeY, this.target.placeZ);
      return;
    }
    if (sel.id === B.BED && this.target) {               // a bed is placed 2 blocks long
      this._placeBed(this.target.placeX, this.target.placeY, this.target.placeZ);
      return;
    }
    if (isBlockId(sel.id) && this.target) {
      this._placeBlock(this.target.placeX, this.target.placeY, this.target.placeZ, sel.id);
    }
  }
  _placeBlock(x, y, z, id) {
    const cur = this.world.getBlock(x, y, z);
    if (cur !== B.AIR && !Blocks.isLiquid(cur)) return;
    if (this._placeCollidesPlayer(x, y, z)) return;
    this.world.setBlock(x, y, z, id);
    this.inventory.consumeSelected(1);
    this.audio.play('place');
  }
  _cellFree(x, y, z) { const c = this.world.getBlock(x, y, z); return c === B.AIR || Blocks.isLiquid(c); }
  // place a 2-tall closed door (this cell + the one above), if both are clear
  _placeDoor(x, y, z) {
    if (!this._cellFree(x, y, z) || !this._cellFree(x, y + 1, z)) return;
    if (this._placeCollidesPlayer(x, y, z) || this._placeCollidesPlayer(x, y + 1, z)) return;
    // don't allow doors stacked in the same column - the partner-search in
    // _toggleDoor/_removeDoorPair assumes a door has at most one door neighbour
    const below = this.world.getBlock(x, y - 1, z), above = this.world.getBlock(x, y + 2, z);
    if (below === B.DOOR || below === B.DOOR_OPEN || above === B.DOOR || above === B.DOOR_OPEN) return;
    this.world.setBlock(x, y, z, B.DOOR);
    this.world.setBlock(x, y + 1, z, B.DOOR);
    this.inventory.consumeSelected(1);
    this.audio.play('place');
  }
  // swap a door (both halves) between closed (solid) and open (passable)
  _toggleDoor(x, y, z) {
    const cells = [{ x, y, z }];
    for (const dy of [1, -1]) { const b = this.world.getBlock(x, y + dy, z); if (b === B.DOOR || b === B.DOOR_OPEN) { cells.push({ x, y: y + dy, z }); break; } }
    const next = (this.world.getBlock(x, y, z) === B.DOOR) ? B.DOOR_OPEN : B.DOOR;
    for (const c of cells) this.world.setBlock(c.x, c.y, c.z, next);
    this.audio.play('place');
  }
  // place a bed: this cell + the next one EXTENDING IN THE DIRECTION YOU FACE (2 long,
  // flat). Falls back to the other directions only if the facing one is blocked, so it
  // still places when you're against a wall - but it always prefers where you're looking.
  _placeBed(x, y, z) {
    if (!this._cellFree(x, y, z)) return;
    const yaw = this.player.yaw;
    const fdx = Math.abs(Math.sin(yaw)) > Math.abs(Math.cos(yaw)) ? Math.sign(Math.sin(yaw)) : 0;
    const fdz = fdx === 0 ? Math.sign(-Math.cos(yaw)) : 0;
    // preference: the way you face, then behind you, then the two sides
    const dirs = [[fdx, fdz], [-fdx, -fdz], [fdz, fdx], [-fdz, -fdx]];
    // the mesher pairs a bed by neighbour-scan (one bed neighbour per half), so neither
    // new cell may sit beside a DIFFERENT pre-existing bed.
    const touchesOtherBed = (cx, cz, hx, hz) => {
      for (const [nx, nz] of [[1, 0], [-1, 0], [0, 1], [0, -1]]) {
        const ax = cx + nx, az = cz + nz;
        if ((ax === hx && az === hz) || (ax === x && az === z)) continue;   // its own partner is fine
        if (this.world.getBlock(ax, y, az) === B.BED) return true;
      }
      return false;
    };
    for (const [dx, dz] of dirs) {
      const hx = x + dx, hz = z + dz;
      if (!this._cellFree(hx, y, hz)) continue;
      if (touchesOtherBed(x, z, hx, hz) || touchesOtherBed(hx, hz, x, z)) continue;
      this.world.setBlock(x, y, z, B.BED);
      this.world.setBlock(hx, y, hz, B.BED);
      this.inventory.consumeSelected(1);
      this.audio.play('place');
      return;
    }
    this.ui.toast('No room to set the cot here.', 1.6);
  }
  // sleep in a bed: only at night - a quick fade to black, then you wake at dawn
  // (spawn set, mended, the watcher off your trail)
  _sleep() {
    if (skyColors(this.time).daylight >= 0.25) { this.ui.toast('You can only sleep when it is dark.', 1.8); return; }
    if (this._sleepFade) return;                         // already sleeping
    this._sleepFade = { t: 0, applied: false };
    this.audio.play('levelup');
  }
  // drive the night->day sleep transition: fade out, skip to morning, fade in
  _updateSleep(dt) {
    const f = this._sleepFade; if (!f) return;
    f.t += dt;
    if (!f.applied && f.t >= 0.7) {
      f.applied = true;
      this.time = 0.33;                                  // wake at morning
      this.player.spawn = this.player.pos.copy();
      this.player.heal(6);
      if (this.stalker) { this.stalker.despawn(); this.stalker.approach = 0; this.stalker.commit = false; this.audio.stopDread(); }
      this._applyDread(0); this._stalkerSpawnT = 30 + Math.random() * 20;
      this.ui.toast('You wake at dawn. Spawn point set here.', 2.6);
    }
    if (f.t >= 1.5) this._sleepFade = null;
  }
  _placeCollidesPlayer(x, y, z) {
    const p = this.player;
    return (x + 1 > p.pos.x - p.half && x < p.pos.x + p.half &&
            y + 1 > p.pos.y && y < p.pos.y + p.height &&
            z + 1 > p.pos.z - p.half && z < p.pos.z + p.half);
  }
  doSave() { if (this.save.save(this)) { this.ui.toast('World saved', 1.4); this._updateMenuButtons(); } else this.ui.toast('Save failed', 1.4); }
  doLoad() {
    if (!this.save.hasSave()) { this.ui.toast('No save found', 1.4); return; }
    this.ui.toast('Loading save...', 1.2);
    for (const ch of this.world.chunks.values()) this.renderer.freeChunkMesh(ch);
    this.continueWorld();
  }

  // ---- particles (block break debris) -----------------------------------
  _spawnParticles(x, y, z, id) {
    const tile = Blocks.faceTile(id, 2);
    for (let i = 0; i < 10; i++) {
      this.particles.push({
        x, y, z,
        vx: (Math.random() - 0.5) * 3, vy: Math.random() * 4 + 1, vz: (Math.random() - 0.5) * 3,
        life: 0.6 + Math.random() * 0.4, s: 0.12 + Math.random() * 0.1, tile, onGround: false,
        half: 0.06, height: 0.12, vel: null, pos: null,
      });
    }
  }
  _updateParticles(dt) {
    for (const p of this.particles) {
      p.vy -= GRAVITY * dt;
      p.x += p.vx * dt; p.y += p.vy * dt; p.z += p.vz * dt;
      // crude floor collision
      if (Physics.solidAt(this.world, Math.floor(p.x), Math.floor(p.y), Math.floor(p.z))) { p.vy = 0; p.y = Math.floor(p.y) + 1; p.vx *= 0.6; p.vz *= 0.6; }
      p.life -= dt;
    }
    this.particles = this.particles.filter(p => p.life > 0);
  }

  // ====================== UPDATE ========================================
  update(dt) {
    this._frameDt = dt;                                 // for view-bob in render()
    // the command console steals all input while open (DOM field handles typing)
    if (this.consoleOpen) { this.input.endFrame(); this._applyDread(0); this.audio.setBreath(0); this.audio.setHeartbeat(0); return; }   // don't freeze the blur/sound over the console

    // a lost pointer-lock (e.g. ESC) pauses the game
    if (this._wasLocked && !this.input.locked && !this.craftOpen && !this.invOpen) {
      this._wasLocked = this.input.locked;
      this._pause(); this.input.endFrame(); return;
    }
    this._wasLocked = this.input.locked;

    // inventory screen is open: only allow closing it
    if (this.invOpen) {
      if (this.input.wasPressed('KeyE') || this.input.wasPressed('Escape')) this.closeInventory();
      this.audio.setBreath(0); this.audio.setHeartbeat(0);
      this.input.endFrame(); return;
    }
    // crafting menu is open: only allow closing it
    if (this.craftOpen) {
      if (this.input.wasPressed('KeyC') || this.input.wasPressed('Escape')) this.closeCraft();
      this.audio.setBreath(0); this.audio.setHeartbeat(0);
      this.input.endFrame(); return;
    }

    this._handleInput(dt);
    if (this.craftOpen || this.consoleOpen || this.invOpen) { this.audio.setBreath(0); this.audio.setHeartbeat(0); this.input.endFrame(); return; } // may have just opened

    // fixed-step physics so collision never tunnels
    this._acc += dt; let steps = 0;
    while (this._acc >= TICK && steps < 6) { this.player.update(this.world, this.input, TICK, this.audio); this._acc -= TICK; steps++; }

    // footstep + splash cues
    const moving = (Math.abs(this.player.vel.x) + Math.abs(this.player.vel.z)) > 0.5;
    if (moving && this.player.onGround && !this.player.inWater) {
      this._stepTimer -= dt; if (this._stepTimer <= 0) { this.audio.play('step'); this._stepTimer = this.player._sprint ? 0.28 : 0.42; }
    }
    if (this.player.inWater && !this._wasInWater) this.audio.play('splash');
    this._wasInWater = this.player.inWater;

    // time of day
    this.time += dt / DAY_LENGTH;
    while (this.time >= 1) { this.time -= 1; this.day++; }
    const daylight = skyColors(this.time).daylight;
    const night = daylight < 0.25;

    // mobs + particles + streaming
    this.mobs.update(this.player, dt, night, this.audio, this.inventory);
    this._updateParticles(dt);
    this._updateMotes(dt);
    this._updateLeafDecay(dt);
    this._updateHanged(dt);
    this._updateSleep(dt);
    this._stream();
    this._updateStalker(dt, daylight);
    this._updateTorch(dt);
    this.audio.setMood(daylight);                       // brighten the music by day
    this.audio.setAmbientNoise(night ? 1 : 0);          // low white-noise wash all night, under the music
    // heavy breathing at night (heaviest sprinting); pounding heartbeat when the watcher nears
    this.audio.setBreath(night ? (this.player._sprint ? 1 : 0.35) : 0);
    let heartLv = 0, horrorLv = 0;
    const sk = this.stalker;
    if (sk && sk.active) {
      const d = Math.hypot(this.player.pos.x - sk.pos.x, this.player.pos.z - sk.pos.z);
      // audible whenever the watcher is present within ~32 blocks (a clear floor so you
      // hear your heart the moment it's around), pounding harder as it closes in
      if (d < 32) heartLv = (0.5 + 0.5 * clamp(1 - d / 24, 0, 1)) * (sk.hunting ? 1 : 0.92);
      // the mimicked screams come from where it lurks and SWELL LOUDER as you close the
      // distance toward it (audible from ~44 blocks, near-deafening right on top) - night only
      if (night) horrorLv = clamp(1 - d / 44, 0, 1);
    }
    this.audio.setHeartbeat(heartLv);
    this.audio.setHorror(horrorLv);

    // raycast the block under the crosshair
    this.target = raycastVoxel(this.world, this.player.eye(), this.player.forward(), REACH);
    // ignore a degenerate hit when the eye is embedded in a block (no real face)
    if (this.target && this.target.nx === 0 && this.target.ny === 0 && this.target.nz === 0) this.target = null;
    // bug fix: don't outline the block behind a creature you're aiming at
    if (this.target && this._creatureInCrosshair()) this.target = null;
    this._updateActiveNote();
    this._collectPlushies();
    this._collectNotes();

    // misc per-frame state
    this.currentBiome = this.world.biomeAt(Math.floor(this.player.pos.x), Math.floor(this.player.pos.z));
    if (this._hurtFlash > 0) this._hurtFlash -= dt;
    if (this._scare > 0) this._scare -= dt;
    this._updateTint();
    this.ui.updateMinimap(this, dt);
    this.ui.tick(dt);

    if (this.player.dead) this._die();
    this.input.endFrame();
  }

  // the torch fields live on the singleton Game, so a fresh run must reset them
  // explicitly (unlike sprint, which rides on a new Player each world)
  _resetTorch() { this.torchOn = false; this.torchBattery = this.torchMax; this.torchCD = 0; }
  // is it dark enough where the player stands to use the flashlight? (night, OR
  // covered from the sky underground / under dense canopy during the day)
  _isDark() {
    if (!this.world || !this.player) return false;
    if (skyColors(this.time).daylight < 0.32) return true;     // night
    // daytime: only "dark" when genuinely enclosed (a cave / inside a build) -
    // count OPAQUE blocks above (leaves/glass don't count), needing several, so
    // merely standing under a tree's canopy does NOT enable the flashlight
    const p = this.player, ex = Math.floor(p.pos.x), ez = Math.floor(p.pos.z);
    const top = Math.floor(p.pos.y + PLAYER_EYE) + 1;
    // sample the WHOLE 3x3 column footprint and take the LEAST-covered column:
    // a single tree trunk one block over can't make the spot read as enclosed
    let best = 99;
    for (let dx = -1; dx <= 1; dx++) {
      for (let dz = -1; dz <= 1; dz++) {
        let opaqueAbove = 0;
        for (let y = top; y < CHUNK_SY && y < top + 28; y++) {
          if (Blocks.isOpaque(this.world.getBlock(ex + dx, y, ez + dz))) opaqueAbove++;
        }
        if (opaqueAbove < best) best = opaqueAbove;
      }
    }
    return best >= 3;
  }
  // flashlight: HOLD [F] to keep it lit, but only where it's dark, it has charge,
  // and it isn't burnt out. It drains while lit; stays put while off; and ONLY
  // recharges (gradually, locked) after a full burnout's cooldown.
  _updateTorch(dt) {
    const wantOn = this.input.isDown('KeyF') && this.torchCD <= 0 && this.torchBattery > 0 && this._isDark();
    this.torchOn = wantOn;
    if (this.torchOn) {
      this.torchBattery -= dt;                                 // drains only while lit
      if (this.torchBattery <= 0) { this.torchBattery = 0; this.torchOn = false; this.torchCD = this.torchCDMax; this.ui.toast('The flashlight burns out.', 1.6); }
    } else if (this.torchCD > 0) {                             // burnt out -> slowly refills over the lockout
      this.torchCD -= dt;
      this.torchBattery = this.torchMax * clamp(1 - this.torchCD / this.torchCDMax, 0, 1);
      if (this.torchCD <= 0) { this.torchCD = 0; this.torchBattery = this.torchMax; }
    }
    // else: off with charge remaining -> battery stays exactly where it is
  }
  // spawn the eldritch Stalker at night, retire it by day, and run its AI
  _updateStalker(dt, daylight) {
    const s = this.stalker;
    if (daylight < 0.22) {                            // night
      if (!s.active) {
        this.audio.setDread(0);                        // drone eases off while it's gone
        this._stalkerSpawnT -= dt;
        if (this._stalkerSpawnT <= 0) { s.spawn(this.player); this.audio.startDread(); }  // no text - presence is felt visually
      } else {
        s.update(this.player, dt, this.audio, this);
      }
    } else {                                          // day: it withdraws
      // decay the ratchet ONCE, on the single frame it withdraws at dawn (inside the
      // active-edge guard) - NOT every daytime frame, which would wipe it instantly.
      if (s.active) {
        s.despawn(); this.audio.stopDread(); this._stalkerSpawnT = 6 + Math.random() * 10;
        s.approach = Math.max(0, s.approach - 0.25); s.commit = false;   // partial mercy, one notch
      }
    }
    // its presence warps your vision: a subtle blur that grows as it nears
    // (replaces the old "you feel watched" toast spam)
    let near = 0;
    if (s.active) { const dx = this.player.pos.x - s.pos.x, dz = this.player.pos.z - s.pos.z; near = clamp(Math.max(1 - Math.hypot(dx, dz) / 22, s.approach * 0.6), 0, 1); }   // blur ramps as the ratchet closes
    this._applyDread(near);
  }
  // distort the world canvas by `n` (0..1): a faint, woozy blur + slight desaturate
  _applyDread(n) {
    n = Math.round(n * 20) / 20;                      // quantise so we only touch the DOM on real change
    if (n === this._dreadFx) return;
    this._dreadFx = n;
    this.glCanvas.style.filter = n < 0.03 ? '' : `blur(${(n * 2.0).toFixed(2)}px) saturate(${(1 - n * 0.35).toFixed(2)}) contrast(${(1 + n * 0.1).toFixed(2)})`;
  }
  // the FLASHLIGHT drives it off NOW, but it returns CLOSER -> the dread is the trend.
  banishStalker(stalker) {
    stalker.approach = Math.min(1, stalker.approach + APPROACH_STEP);
    stalker.commit = stalker.approach >= 1;          // at the floor, the next appearance is the catch run
    stalker.despawn();
    this._stalkerSpawnT = 4 + Math.random() * 5;     // a little shorter -> it feels relentless
    this.audio.whisper();
  }
  // it withdraws of its OWN accord after lingering, drifting a touch closer for its
  // next appearance (so it still creeps in even if you never light it up).
  autoVanish(stalker) {
    stalker.approach = Math.min(1, stalker.approach + 0.06);
    stalker.commit = stalker.approach >= 1;
    stalker.despawn();
    this._stalkerSpawnT = 5 + Math.random() * 7;
  }
  // the catch: it drags you down. Cut to a downed view (lying on your back, the
  // creature towering over you, screen blinking + blurred). MASH SPACE to fill
  // the meter and tear free before the timer runs out, or it claims you.
  // build the fullscreen <video> used for the jumpscare clip (served from the
  // project folder; too large to base64-embed). Plays with its own audio.
  _buildJumpscareVideo() {
    const v = document.createElement('video');
    v.id = 'jumpscareVid'; v.src = 'jumpscare.mp4'; v.preload = 'auto'; v.playsInline = true;
    v.style.cssText = 'position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:60;background:#000;display:none;';
    document.body.appendChild(v);
    v.addEventListener('ended', () => this._endJumpscareVideo());
    v.addEventListener('error', () => this._endJumpscareVideo());     // 404 / decode failure -> skip to QTE
    v.addEventListener('stalled', () => this._endJumpscareVideo());    // never finishes loading -> skip to QTE
    this.jumpscareVid = v;
  }
  // the catch: first the jumpscare CLIP (with its audio) fills the screen, then
  // it cuts to the downed tower-over QTE.
  triggerScare(stalker) {
    if (this.state === 'downed' || this.state === 'jumpscare') return;
    this._pendingStalker = stalker;
    this._enterJumpscareVideo();
  }
  _enterJumpscareVideo() {
    this.state = 'jumpscare';
    this.input.exitLock();
    this.audio.stopDread(); this.audio.setBreath(0); this.audio.setHeartbeat(0); this.audio.setHorror(0);
    this.glCanvas.style.filter = '';
    this._jumpscareT = 0;
    const v = this.jumpscareVid;
    try { v.currentTime = 0; } catch (e) {}
    v.muted = false; v.volume = 1.0; v.style.display = 'block';
    const pr = v.play();
    if (pr && pr.catch) pr.catch(() => this._endJumpscareVideo());   // if play is blocked, skip straight to the QTE
    // wall-clock safety: guarantees the QTE starts even if the clip stalls and
    // the tab is backgrounded (where the rAF frame-timer would never advance)
    clearTimeout(this._jumpscareTimeout);
    this._jumpscareTimeout = setTimeout(() => this._endJumpscareVideo(), 2600);
  }
  _endJumpscareVideo() {
    if (this.state !== 'jumpscare') return;
    clearTimeout(this._jumpscareTimeout);
    const v = this.jumpscareVid; try { v.pause(); } catch (e) {}
    v.style.display = 'none';
    this._enterDowned(this._pendingStalker || this.stalker);
  }
  _enterDowned(stalker) {
    this.state = 'downed';
    this.audio.setDread(1);
    // each catch is slightly harder: every mash fills a little LESS, so it takes more
    // hammering to tear free (floored so it stays humanly possible).
    this._caughtCount = (this._caughtCount || 0) + 1;
    const inc = Math.max(0.05, 0.075 - 0.006 * (this._caughtCount - 1));
    this.qte = { fill: 0, time: 6.0, blink: 0, t: 0, inc };
    const s = this.stalker = stalker;
    s.active = true; s.hang = 0; s.hunting = true; s.mouth = 1.2; s.split = 1; s.aggro = 1; s.twitch = 1;  // maw gaping wide
    this._poseLoomer();
    this.glCanvas.style.filter = 'blur(1.6px) saturate(0.55) brightness(0.7)';
  }
  // plant the creature looming directly over the downed player, facing them
  _poseLoomer() {
    const s = this.stalker, p = this.player; if (!s) return;
    s.loom = 1;                                   // bend it over the downed player
    const yaw = p.yaw;
    s.pos.x = p.pos.x + Math.sin(yaw) * 3.0;      // stand back so the bent-over head frames up-front
    s.pos.z = p.pos.z - Math.cos(yaw) * 3.0;
    s.pos.y = this.world.heightAt(Math.floor(s.pos.x), Math.floor(s.pos.z)) + 1;
    const dx = p.pos.x - s.pos.x, dz = p.pos.z - s.pos.z, dl = Math.hypot(dx, dz) || 1;
    s._cos = -dz / dl; s._sin = dx / dl;
  }
  // run the downed quick-time-event each frame (the loop routes here)
  _updateDowned(dt) {
    const q = this.qte; if (!q) { this.state = 'playing'; return; }
    q.t += dt; q.blink += dt; q.time -= dt;
    // let the player still glance around (yaw only) while pinned
    const m = this.input.consumeMouse();
    if (m.dx) this.player.yaw += m.dx * this.settings.sensitivity * 0.0022;
    // MASH space to fill the meter; it drains constantly, so you must hammer it.
    // Check the WIN right after a press (before the passive drain), otherwise the
    // drain would always knock a just-filled meter back below 1 and you'd never wake.
    if (this.input.wasPressed('Space')) { q.fill = Math.min(1, q.fill + (q.inc || 0.075)); this.audio.play('hit'); }
    if (q.fill >= 1) { this.input.endFrame(); this._surviveScare(); return; }
    q.fill = Math.max(0, q.fill - dt * 0.24);
    // keep the creature looming + twitching over you, maw agape
    const s = this.stalker;
    if (s) { s.t += dt; s.mouth = 1.2; s.split = 1; s.aggro = 1; s.twitch = 1; s.headJ = Math.sin(q.t * 22) * 0.06; this._poseLoomer(); }
    this.audio.setHeartbeat(1); this.audio.setBreath(0.85);   // panic: pounding heart + frantic breath
    // pulse the blur/brightness with the eyelid flutter (brighter as you wake)
    const fl = 1.5 + Math.sin(q.blink * 6) * 0.9;
    this.glCanvas.style.filter = `blur(${fl.toFixed(2)}px) saturate(0.55) brightness(${(0.66 + q.fill * 0.3).toFixed(2)})`;
    this._clock += dt;                                  // keep world animations alive
    if (q.time <= 0) { this.input.endFrame(); this._killByScare(); return; }
    this.input.endFrame();
  }
  _surviveScare() {
    this.qte = null;
    this.glCanvas.style.filter = ''; this._dreadFx = -1;
    if (this.stalker) this.stalker.despawn();
    this.audio.stopDread();
    this.player.damage(7, 'was claimed by The Obsessed', this.audio);   // a heavy mauling
    this._hurtFlash = 0.6;
    this._stalkerSpawnT = 30 + Math.random() * 25;
    // damage() never sets .dead (only Player.update does); detect a fatal
    // mauling by health so the death screen fires now, not a frame later
    if (this.player.health <= 0) { this.player.die(this.audio); this._die(); return; }
    this.ui.toast('You tore free and scrambled away...', 2.4);
    this.state = 'playing';
    this._wasLocked = false;
    this.input.requestLock();
  }
  _killByScare() {
    this.qte = null;
    this.glCanvas.style.filter = ''; this._dreadFx = -1;
    if (this.stalker) this.stalker.despawn();
    this.audio.stopDread();
    this.player.health = 0;
    this.player.lastDamageReason = 'was dragged into the dark by The Obsessed';
    this._die();
  }
  // the closest note the player is looking at within reach (for reading)
  _updateActiveNote() {
    this.activeNote = null;
    if (!this.world.notes.length) return;
    const eye = this.player.eye(), fwd = this.player.forward();
    let best = 0.86;                                   // ~30 deg read cone
    for (const n of this.world.notes) {
      const dx = n.x - eye.x, dy = n.y - eye.y, dz = n.z - eye.z;
      const d = Math.hypot(dx, dy, dz);
      if (d > 5.0) continue;
      const dot = (dx * fwd.x + dy * fwd.y + dz * fwd.z) / (d || 1);
      if (dot > best) { best = dot; this.activeNote = n; }
    }
    if (this.activeNote && !this.activeNote.read) {
      this.activeNote.read = true;
      // the first note you read leaves a small doll behind
      if (!this._gotPlushie) { this._gotPlushie = true; this.inventory.addItem(ITEM.PLUSHIE, 1); }
    }
  }
  // walk over a cursed-plushie doll to pick it up (it's a ward; right-click to use)
  _collectPlushies() {
    if (!this.world.plushies.length) return;
    const p = this.player;
    for (let i = this.world.plushies.length - 1; i >= 0; i--) {
      const pl = this.world.plushies[i];
      if (Math.abs(pl.x - p.pos.x) < 1.1 && Math.abs(pl.z - p.pos.z) < 1.1 && Math.abs(pl.y - p.pos.y) < 2.4) {
        if (this.inventory.addItem(ITEM.PLUSHIE, 1) !== 0) continue;   // no room: leave it where it is
        this.world.plushies.splice(i, 1);
        if (pl.key) this.world.collectedPlushieKeys.add(pl.key);   // never respawn this one (persisted)
        this.audio.play('xp');
        this.ui.toast('Picked up a Warding Plushie — hold it and right-click to ward off the watcher.', 3);
      }
    }
  }
  // walk up to a note on a tree to pocket it; read it later from the hotbar
  _collectNotes() {
    if (!this.world.notes.length) return;
    const p = this.player;
    for (let i = this.world.notes.length - 1; i >= 0; i--) {
      const n = this.world.notes[i];
      if (Math.abs(n.x - p.pos.x) < 1.4 && Math.abs(n.z - p.pos.z) < 1.4 && Math.abs(n.y - (p.pos.y + 1)) < 2.6) {
        if (this.inventory.addItem(ITEM.NOTE, 1, n.msg) !== 0) continue;   // no room: leave it on the tree
        this.world.notes.splice(i, 1);
        if (n.key) this.world.collectedNoteKeys.add(n.key);
        if (this.activeNote === n) this.activeNote = null;
        this.audio.play('xp');
        this.ui.toast('You take the note. Select it and right-click to read it.', 2.6);
      }
    }
  }
  _updateTint() {
    const tint = document.getElementById('tint');
    const feet = this.world.getBlock(Math.floor(this.player.pos.x), Math.floor(this.player.pos.y + 0.3), Math.floor(this.player.pos.z));
    if (this.player.headInWater) { tint.style.background = '#1747a8'; tint.style.opacity = '0.42'; }
    else if (feet === B.LAVA) { tint.style.background = '#d24a10'; tint.style.opacity = '0.55'; }
    else if (this._hurtFlash > 0) { tint.style.background = '#b01818'; tint.style.opacity = String(Math.min(0.5, this._hurtFlash)); }
    else tint.style.opacity = '0';
  }

  // ====================== RENDER ========================================
  render() {
    const r = this.renderer, p = this.player;
    const dt = this._frameDt || 0.016;
    const R = this.settings.renderDistance;
    // the torch is only ever re-evaluated while playing; force the cone (and HUD
    // "ON") off in any other state so a held-F beam can't light the jumpscare,
    // pause screen, or death screen. _updateTorch recomputes it on the next play frame.
    if (this.state !== 'playing') this.torchOn = false;

    // --- camera: eye + look dir, with head-bob (or the downed jumpscare cam) ---
    let eye, fwd, fovScale = 1;
    if (this.state === 'downed') {
      // lying on your back, staring up at the thing bent over you
      eye = new Vec3(p.pos.x, p.pos.y + 0.32, p.pos.z);
      const yaw = p.yaw, pitch = 0.92;
      fwd = new Vec3(Math.cos(pitch) * Math.sin(yaw), Math.sin(pitch), -Math.cos(pitch) * Math.cos(yaw));
    } else {
      const base = p.eye(); fwd = p.forward();
      // head-bob: a phase that advances with footsteps; sways the eye up/down + sideways
      const horiz = Math.hypot(p.vel.x, p.vel.z);
      const moving = horiz > 0.6 && p.onGround && !p.inWater;
      this._bobStrength = lerp(this._bobStrength, moving ? 1 : 0, Math.min(1, dt * 8));
      if (moving) this._bobT += dt * (p._sprint ? 13 : 8.5);
      const amp = (p._sprint ? 0.10 : 0.06) * this._bobStrength;
      const bobY = -Math.abs(Math.sin(this._bobT)) * amp;             // each footfall "drops"
      const bobX = Math.sin(this._bobT * 0.5) * amp * 0.9;            // lateral sway at half-step
      const rt = fwd.cross(new Vec3(0, 1, 0)).normalize();
      eye = new Vec3(base.x + rt.x * bobX, base.y + bobY, base.z + rt.z * bobX);
      // FOV kick is tied to the sprint STATE (not the grounded bob), so it holds
      // steady through a jump instead of snapping back when you leave the ground
      this._sprintFov = lerp(this._sprintFov || 0, p._sprint ? 1 : 0, Math.min(1, dt * 6));
      fovScale = 1 + 0.08 * this._sprintFov;
    }
    const fov = this.settings.fov * Math.PI / 180 * fovScale;
    const proj = Mat4.perspective(fov, r.aspect, 0.08, Math.max(220, R * 16 + 90));
    const view = Mat4.lookAt(eye, eye.add(fwd), new Vec3(0, 1, 0));
    this.vp = Mat4.multiply(proj, view);

    const sc = skyColors(this.time);

    // fog "overtakes the world" at night: the view distance collapses toward
    // the player as daylight fades, and tightens further during a scare
    const dayFogEnd = R * 16 - 4;
    const nightFogEnd = Math.min(dayFogEnd, 15);
    let fogEnd = lerp(nightFogEnd, dayFogEnd, sc.daylight);
    if (this._scare > 0 || this.state === 'downed') fogEnd *= 0.55;
    const fogStart = fogEnd * (sc.daylight > 0.4 ? 0.5 : 0.18);
    const torch = this.torchOn ? 1 : 0;        // fog is now cleared only inside the cone (in-shader), not globally
    r.begin(proj, view, sc.horizon, fogStart, fogEnd, sc.daylight, this._clock, torch, eye, fwd);

    // the 3D camera-aware sky (fills the background; terrain overdraws it)
    const wup = new Vec3(0, 1, 0);
    const right = fwd.cross(wup).normalize();
    const camUp = right.cross(fwd).normalize();
    // the air itself grows murky at night (and tighter during a scare), so the
    // sky isn't a clear starfield when fog has swallowed the ground
    let skyFog = clamp((1 - sc.daylight) * 0.82, 0, 0.82);
    if (this._scare > 0 || this.state === 'downed') skyFog = Math.min(0.9, skyFog + 0.12);
    r.drawSky({ fwd, right, up: camUp, tanHalf: Math.tan(fov / 2), aspect: r.aspect }, sc, sunDirection(this.time), this._clock, skyFog);

    // gather visible chunks, sorted by distance
    const ccx = Math.floor(p.pos.x / CHUNK_SX), ccz = Math.floor(p.pos.z / CHUNK_SZ);
    const near = [];
    for (const ch of this.world.chunks.values()) {
      if (Math.max(Math.abs(ch.cx - ccx), Math.abs(ch.cz - ccz)) > R) continue;
      const dx = ch.cx * CHUNK_SX + 8 - p.pos.x, dz = ch.cz * CHUNK_SZ + 8 - p.pos.z;
      near.push({ ch, d: dx * dx + dz * dz });
    }
    near.sort((a, b) => a.d - b.d);
    const opaque = near.map(o => o.ch);
    r.drawOpaque(opaque);

    // dynamic geometry (mobs + orbs, then particles) in the opaque state
    const dyn = this.mobs.buildMesh();
    r.drawDynamic(dyn.verts, dyn.idx);
    if (this.particles.length) {
      const v = [], idx = [];
      for (const pt of this.particles) appendCube(v, idx, pt.x - pt.s / 2, pt.y, pt.z - pt.s / 2, pt.s, pt.s, pt.s, pt.tile, 1.0, 0);
      r.drawDynamic(new Float32Array(v), new Uint32Array(idx));
    }
    // bloody notes pinned to nearby trees (block atlas, 'note' tile)
    this._drawNotes(r, ccx, ccz, R);
    // bloody splatters + footprints, but ONLY at night - they "wash away" by day
    if (sc.daylight < 0.3) this._drawBlood(r, R);
    // floating fog motes drifting in the murky air (more present as it darkens)
    if (sc.daylight < 0.5) this._drawMotes(r);
    // cursed-plushie dolls (flat sprite props, alpha-cutout) sitting in the world
    this._drawPlushies(r, R);
    // rare hanged figures dangling in the trees
    this._drawHanged(r, R);

    // the eldritch Stalker, skinned with the embedded pack (depth-tested so
    // real tree trunks occlude its body, leaving only its peeking face)
    if (this.stalker && this.stalker.active) {
      const sx = this.stalker.pos.x - p.pos.x, sz = this.stalker.pos.z - p.pos.z;
      if (sx * sx + sz * sz < (R * 16) * (R * 16)) {
        const m = this.stalker.buildMesh();
        r.drawDynamicTex(m.verts, m.idx, this.stalker.skinName());
        const e = this.stalker.buildEyes();             // glowing eyes + maw (block atlas)
        r.drawDynamicGlow(e.verts, e.idx);              // alpha-cutout: only the glow shows, no box rectangle
      }
    }

    // transparent geometry (water/glass/ice) back-to-front
    const transp = near.slice().sort((a, b) => b.d - a.d).map(o => o.ch);
    r.drawTransparent(transp);

    // the HUD on top
    this.ui.drawHUD(this);
  }

  // draw bloody notes (small parchment quads) for trees in the render range
  _drawNotes(r, ccx, ccz, R) {
    if (!this.world.notes.length) return;
    const tile = Blocks._tileNames['note'];
    const v = [], idx = [], lim = (R * CHUNK_SX);
    for (const n of this.world.notes) {
      if (Math.abs(n.tx - this.player.pos.x) > lim || Math.abs(n.tz - this.player.pos.z) > lim) continue;
      // a flat note on the south face of the trunk
      appendCube(v, idx, n.tx + 0.2, n.y - 0.35, n.tz + 1.0, 0.6, 0.7, 0.06, tile, 1.0, 0);
    }
    if (idx.length) r.drawDynamic(new Float32Array(v), new Uint32Array(idx));
  }

  // draw the cursed-plushie dolls as little alpha-cutout sprite props
  _drawPlushies(r, R) {
    if (!this.world.plushies.length) return;
    const v = [], idx = [], lim = R * CHUNK_SX;
    for (const pl of this.world.plushies) {
      if (Math.abs(pl.x - this.player.pos.x) > lim || Math.abs(pl.z - this.player.pos.z) > lim) continue;
      appendCross(v, idx, pl.x, pl.y, pl.z, 0.7, 0.7, 0, 0, 1, 1, 1.0);
    }
    if (idx.length) r.drawDynamicTexCutout(new Float32Array(v), new Uint32Array(idx), 'plushie');
  }

  // draw the night-only blood decals (splatters + footprint trails) flat on the ground
  _drawBlood(r, R) {
    if (!this.world.blood.length) return;
    const splat = Blocks._tileNames['blood'], print = Blocks._tileNames['bloodprint'];
    const v = [], idx = [], lim = R * CHUNK_SX, px = this.player.pos.x, pz = this.player.pos.z;
    for (const b of this.world.blood) {
      if (Math.abs(b.x - px) > lim || Math.abs(b.z - pz) > lim) continue;
      const isPrint = b.kind === 'print';
      appendDecal(v, idx, b.x, b.y, b.z, b.s, b.s * (isPrint ? 1.5 : 1), b.rot, isPrint ? print : splat, 1.0);
    }
    // translucent + double-sided: soft stains, and the flat ground quad would
    // otherwise be back-face culled when viewed from above
    if (idx.length) r.drawDynamicDecal(new Float32Array(v), new Uint32Array(idx));
  }

  // draw the rare hanged figures: hanging by a noose / mid-fall after the trunk is cut /
  // crumpled in a pool of blood on the ground
  _drawHanged(r, R) {
    if (!this.world.hanged.length) return;
    const lim = R * CHUNK_SX, px = this.player.pos.x, pz = this.player.pos.z, t = this._clock;
    const HEAD = [0, 0.5, 0.5, 1], TORSO = [0, 0, 0.5, 0.5], LIMB = [0.5, 0, 1, 0.5];
    for (const hb of this.world.hanged) {
      if (Math.abs(hb.x - px) > lim || Math.abs(hb.z - pz) > lim) continue;
      const ox = hb.x, oz = hb.z, gy = this.world.heightAt(Math.floor(ox), Math.floor(oz));

      if (hb.landed) {                                              // a crumpled corpse in a bloody splatter
        const splat = Blocks._tileNames['blood'], dv = [], didx = [];
        appendDecal(dv, didx, ox, gy + 1.02, oz, 2.5, 2.5, hb.seed * 6.28, splat, 1.0);            // pool
        appendDecal(dv, didx, ox + 0.7, gy + 1.02, oz - 0.5, 1.4, 1.4, hb.seed * 3.1, splat, 0.95);  // spray
        appendDecal(dv, didx, ox - 0.6, gy + 1.02, oz + 0.4, 1.1, 1.1, hb.seed * 1.7, splat, 0.9);
        if (didx.length) r.drawDynamicDecal(new Float32Array(dv), new Uint32Array(didx));
        const cs = Math.cos(hb.fallRot || 0), sn = Math.sin(hb.fallRot || 0), v = [], idx = [];
        const box = (lx, ly, lz, sx, sy, sz, uv) => boxRot(v, idx, ox, gy + 1.0, oz, cs, sn, lx, ly, lz, sx, sy, sz, uv[0], uv[1], uv[2], uv[3], 0.62, 0, 0);
        box(-0.35, 0.0, -0.22, 0.70, 0.22, 0.52, TORSO);           // flattened torso
        box(-0.16, 0.02, 0.36, 0.34, 0.22, 0.40, HEAD);            // head lolled out to the side
        box(-0.74, 0.0, -0.12, 0.42, 0.16, 0.16, LIMB);            // arms splayed
        box(0.34, 0.0, 0.06, 0.42, 0.16, 0.16, LIMB);
        box(-0.22, 0.0, -0.64, 0.16, 0.16, 0.46, LIMB);            // legs splayed
        box(0.08, 0.0, -0.62, 0.16, 0.16, 0.46, LIMB);
        r.drawDynamicTex(new Float32Array(v), new Uint32Array(idx), 'humanoid');
        continue;
      }

      const falling = !!hb.falling;
      const ang = falling ? (hb.fallRot || 0) : Math.sin(t * 0.5 + hb.seed * 6.28) * 0.13;   // tumble in the fall, else slow rope-twist
      const cos = Math.cos(ang), sin = Math.sin(ang);
      const oy = falling ? hb.fallY : Math.max(gy + 1.1, hb.branchY - 4.35);                 // feet rest at/above the surface; figure ~2.0 tall
      const headTop = oy + 2.0;
      const v = [], idx = [];
      const box = (lx, ly, lz, sx, sy, sz, uv) => boxRot(v, idx, ox, oy, oz, cos, sin, lx, ly, lz, sx, sy, sz, uv[0], uv[1], uv[2], uv[3], 0.75, 0, 0);
      box(-0.13, 0.0, -0.1, 0.11, 0.9, 0.13, LIMB);                // dangling legs (together)
      box(0.02, 0.0, -0.1, 0.11, 0.9, 0.13, LIMB);
      box(-0.18, 0.85, -0.12, 0.36, 0.72, 0.22, TORSO);            // slumped torso
      box(falling ? -0.52 : -0.33, 0.95, -0.1, 0.15, 0.7, 0.13, LIMB);  // arms flail out as it drops
      box(falling ? 0.37 : 0.18, 0.95, -0.1, 0.15, 0.7, 0.13, LIMB);
      box(-0.16, 1.58, -0.15, 0.32, 0.34, 0.3, HEAD);              // lolling head
      r.drawDynamicTex(new Float32Array(v), new Uint32Array(idx), 'humanoid');
      if (falling) continue;                                       // rope is cut -> no rope/branch while it drops

      // a stubby branch out from the trunk + the noose: a long rope from a knot at the
      // neck up to the branch end, so it reads clearly as "hanged by the neck from a branch".
      const wood = Blocks._tileNames['wood_side'];
      const off = (hb.off !== undefined ? hb.off : 0), trunkZ = oz - off;     // trunk sits `off` blocks away in z
      const rv = [], ridx = [];
      const zLo = Math.min(trunkZ, oz);
      appendCube(rv, ridx, ox - 0.09, hb.branchY + 0.05, zLo - 0.08, 0.18, 0.18, Math.abs(oz - trunkZ) + 0.16, wood, 0.5, 0);  // branch
      appendCube(rv, ridx, ox - 0.03, headTop - 0.05, oz - 0.03, 0.06, (hb.branchY + 0.18) - (headTop - 0.05), 0.06, wood, 0.55, 0); // rope
      appendCube(rv, ridx, ox - 0.08, headTop - 0.12, oz - 0.08, 0.16, 0.16, 0.16, wood, 0.5, 0);                                 // noose knot at the neck
      r.drawDynamic(new Float32Array(rv), new Uint32Array(ridx));
    }
  }
  // when the trunk a hanged figure dangles from is felled, cut it loose to ragdoll down
  _dropHanged(x, y, z) {
    if (!this.world.hanged) return;
    for (const hb of this.world.hanged) {
      if (hb.falling || hb.landed) continue;
      const tx = Math.floor(hb.x), tz = Math.floor(hb.z - (hb.off || 0));   // the trunk column it hangs beside
      if (x === tx && z === tz && y >= (hb.ground || 0) && y <= hb.branchY + 1) {
        hb.falling = true; hb.fallVel = 0; hb.fallSpin = (Math.random() * 2 - 1) * 3.2;
        hb.fallY = Math.max((hb.ground || y) + 1.1, hb.branchY - 4.35);
      }
    }
  }
  // advance a cut-loose body: gravity + tumble, then SPLAT into a bloody heap on the ground
  _updateHanged(dt) {
    const hs = this.world.hanged; if (!hs || !hs.length) return;
    for (const hb of hs) {
      if (!hb.falling || hb.landed) continue;
      hb.fallVel = (hb.fallVel || 0) + 24 * dt;                    // gravity
      hb.fallY -= hb.fallVel * dt;
      hb.fallRot = (hb.fallRot || 0) + (hb.fallSpin || 2.5) * dt;
      const gy = this.world.heightAt(Math.floor(hb.x), Math.floor(hb.z));
      if (hb.fallY <= gy + 1.0) {                                  // impact (the surface) -> blood + a wet thud
        hb.fallY = gy + 1.0; hb.landed = true;
        this._spawnParticles(hb.x, gy + 0.6, hb.z, B.REDSTONE);    // a gore puff
        this.audio.play('break');
      }
    }
  }

  // ---- floating fog motes: a drifting cloud of dust specks that follows the
  // player (re-seeded as they drift out of range), so the "air" itself has
  // texture, not just a flat opaqueness. Catches the flashlight beam.
  _newMote(R) {
    const p = this.player.pos, ey = p.y + PLAYER_EYE;
    return {
      x: p.x + (Math.random() * 2 - 1) * R, y: ey + (Math.random() * 2 - 1) * R * 0.7, z: p.z + (Math.random() * 2 - 1) * R,
      dx: (Math.random() * 2 - 1) * 0.22, dy: (Math.random() * 2 - 1) * 0.1, dz: (Math.random() * 2 - 1) * 0.22, ph: Math.random() * 6.28,
    };
  }
  _updateMotes(dt) {
    const R = 13, p = this.player.pos, ey = p.y + PLAYER_EYE;
    if (!this.motes) { this.motes = []; for (let i = 0; i < 150; i++) this.motes.push(this._newMote(R)); }
    for (const m of this.motes) {
      m.x += m.dx * dt; m.z += m.dz * dt; m.y += m.dy * dt + Math.sin(this._clock * 0.6 + m.ph) * 0.0016;
      if (Math.abs(m.x - p.x) > R || Math.abs(m.z - p.z) > R || Math.abs(m.y - ey) > R * 0.72) Object.assign(m, this._newMote(R));
    }
  }
  _drawMotes(r) {
    if (!this.motes) return;
    const tile = Blocks._tileNames['mote'], T = Blocks.TILE, COLS = Blocks.COLS, aW = Blocks.atlas.width, aH = Blocks.atlas.height, eps = 0.5;
    const col = tile % COLS, row = (tile / COLS) | 0;
    const u0 = (col * T + eps) / aW, u1 = (col * T + T - eps) / aW, v0 = (row * T + eps) / aH, v1 = (row * T + T - eps) / aH;
    const v = [], idx = [];
    for (const m of this.motes) appendCross(v, idx, m.x, m.y - 0.045, m.z, 0.09, 0.09, u0, v0, u1, v1, 1.6);
    if (idx.length) r.drawDynamicDecal(new Float32Array(v), new Uint32Array(idx));
  }

  // ====================== MAIN LOOP =====================================
  loop() {
    const now = performance.now();
    let dt = (now - this._last) / 1000; this._last = now;
    if (dt > 0.1) dt = 0.1;                 // avoid huge steps after a stall
    this._clock += dt;

    // fps counter
    this._fpsAcc += dt; this._fpsCount++;
    if (this._fpsAcc >= 0.5) { this.fps = Math.round(this._fpsCount / this._fpsAcc); this._fpsAcc = 0; this._fpsCount = 0; }

    if (this.state === 'playing') this.update(dt);
    else if (this.state === 'downed') this._updateDowned(dt);   // the jumpscare quick-time-event
    else if (this.state === 'jumpscare') {                      // the clip is playing fullscreen
      this._jumpscareT = (this._jumpscareT || 0) + dt;
      if (this._jumpscareT > 2.4) this._endJumpscareVideo();    // safety: advance if 'ended' never fires
      this.input.endFrame(); this.audio.setBreath(0); this.audio.setHeartbeat(0); this.audio.setHorror(0); this.audio.setAmbientNoise(0);
    }
    else { this.input.endFrame(); this._applyDread(0); this.audio.setBreath(0); this.audio.setHeartbeat(0); this.audio.setHorror(0); this.audio.setAmbientNoise(0); }  // flush + silence when not playing
    if (this.world && this.state !== 'menu' && this.state !== 'won' && this.state !== 'jumpscare') this.render();

    requestAnimationFrame(() => this.loop());
  }
}
